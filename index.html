// ── VISTA TIMELINE ──
function renderTimelineView(project, tasks, interactions, personas){
  var today = new Date();
  today.setHours(0,0,0,0);

  // Recolectar todas las fechas de items (tareas + interacciones)
  var itemsWithDate = [];
  var itemsWithoutDate = [];

  tasks.forEach(function(t){
    if(t.target_date){
      var d = new Date(t.target_date+'T00:00:00');
      itemsWithDate.push({kind:'task', item:t, time:d.getTime()});
    } else if(!t.done){
      itemsWithoutDate.push({kind:'task', item:t});
    }
  });
  interactions.forEach(function(it){
    if(it.date){
      var d = new Date(it.date+'T00:00:00');
      itemsWithDate.push({kind:'interaction', item:it, time:d.getTime()});
    }
  });

  if(itemsWithDate.length === 0 && itemsWithoutDate.length === 0){
    return '<div class="tl-wrap"><div style="text-align:center;padding:2rem;color:var(--text3);font-size:13px;">Sin tareas ni interacciones aún. Añade tareas con fecha para verlas en el timeline.</div></div>';
  }

  // El rango del timeline se calcula así:
  // - Empieza con la fecha más antigua de items o HOY (lo que sea antes)
  // - Termina con la fecha más lejana de items o la fecha objetivo del proyecto (lo que sea más tarde)
  // - Añade un pequeño margen
  var itemTimes = itemsWithDate.map(function(e){return e.time;});
  var targetTime = project.target_date ? new Date(project.target_date+'T00:00:00').getTime() : null;

  var minT, maxT;
  if(itemTimes.length > 0){
    minT = Math.min.apply(null, itemTimes);
    maxT = Math.max.apply(null, itemTimes);
  } else {
    minT = today.getTime();
    maxT = today.getTime();
  }
  // Incluir HOY en el rango
  minT = Math.min(minT, today.getTime());
  maxT = Math.max(maxT, today.getTime());
  // Incluir fecha objetivo si existe y está razonablemente cerca (< 6 meses del último item)
  // Si está muy lejos, no la usamos para el eje pero la mostramos como marcador
  var showTargetMarker = false;
  if(targetTime){
    var sixMonths = 86400000 * 180;
    if(targetTime <= maxT + sixMonths){
      maxT = Math.max(maxT, targetTime);
    } else {
      showTargetMarker = true; // fuera del rango: se muestra separado
    }
  }

  // Margen: si el rango total es menor de 60 días, forzar mínimo 60 días
  var minRange = 86400000 * 60;
  if(maxT - minT < minRange){
    var centro = (minT + maxT) / 2;
    minT = centro - minRange/2;
    maxT = centro + minRange/2;
  }
  // Padding suave en tiempo
  var range = maxT - minT;
  var pad = range * 0.05;
  minT -= pad;
  maxT += pad;
  range = maxT - minT;

  // Escala pintada del 5% al 95% del canvas
  function pctOf(t){ return 5 + ((t - minT) / range) * 90; }

  // Generar ticks mensuales
  var ticks = [];
  var tickDate = new Date(minT);
  tickDate.setDate(1);
  tickDate.setHours(0,0,0,0);
  while(tickDate.getTime() <= maxT){
    if(tickDate.getTime() >= minT){
      ticks.push({time: tickDate.getTime(), label: tickDate.toLocaleDateString('es-ES',{month:'short', year:'2-digit'})});
    }
    tickDate.setMonth(tickDate.getMonth()+1);
  }
  // Si hay demasiados ticks (>12), filtrar cada 2
  if(ticks.length > 12){
    ticks = ticks.filter(function(_, i){return i % 2 === 0;});
  }

  // Sort items por tiempo
  var sortedItems = itemsWithDate.slice().sort(function(a,b){return a.time - b.time;});

  // Ancho del canvas: adaptativo según número de items
  var canvasWidthPx = Math.max(900, sortedItems.length * 170);
  var canvasHeightPx = 460;
  // Separación mínima entre centros en la misma fila (px)
  // Como cada cajita mide ~200px, necesitamos ~220-240px de gap para que no se solapen
  var minGapPct = (240 / canvasWidthPx) * 100;

  // Filas alternando arriba/abajo del eje. Con cajitas de dos líneas (~50px alto) hace falta más separación
  var rowOffsets = [-70, 70, -135, 135, -200, 200];
  var rowLastX = {};
  rowOffsets.forEach(function(_, i){ rowLastX[i] = -Infinity; });

  var canvasHtml = '<div class="tl-canvas" style="min-width:'+canvasWidthPx+'px;height:'+canvasHeightPx+'px;">'+
    '<div class="tl-axis"></div>';

  // Ticks mensuales
  ticks.forEach(function(t){
    var left = pctOf(t.time);
    canvasHtml += '<div class="tl-tick" style="left:'+left+'%;top:calc(50% + 2px);">'+
      '<div class="tl-tick-line"></div>'+
      '<div class="tl-tick-label">'+esc(t.label)+'</div>'+
      '</div>';
  });

  // Línea de hoy
  var todayPct = pctOf(today.getTime());
  if(todayPct >= 5 && todayPct <= 95){
    canvasHtml += '<div class="tl-today-line" style="left:'+todayPct+'%;"><div class="tl-today-label">HOY</div></div>';
  }

  // Marcador de fecha objetivo (si está en el rango)
  if(targetTime && !showTargetMarker){
    var targetPct = pctOf(targetTime);
    if(targetPct >= 5 && targetPct <= 95){
      canvasHtml += '<div style="position:absolute;left:'+targetPct+'%;top:0;bottom:0;width:2px;background:var(--accent);opacity:.35;z-index:1;">'+
        '<div style="position:absolute;top:-8px;transform:translateX(-50%);font-size:9px;background:var(--accent);color:white;padding:1px 5px;border-radius:6px;font-weight:600;letter-spacing:.5px;white-space:nowrap;">OBJETIVO</div>'+
        '</div>';
    }
  }

  // Items: para cada uno, asignar fila que evite solape
  sortedItems.forEach(function(entry, idx){
    var left = pctOf(entry.time);
    var itemDate = new Date(entry.time);

    if(entry.kind === 'task'){
      var assignedRow = 0;
      var placed = false;
      for(var r=0; r<rowOffsets.length; r++){
        if(left - rowLastX[r] >= minGapPct){
          assignedRow = r;
          placed = true;
          break;
        }
      }
      if(!placed) assignedRow = rowOffsets.length - 1;
      rowLastX[assignedRow] = left;
      var offset = rowOffsets[assignedRow];
      var top = 'calc(50% + '+offset+'px)';
      var connectorTop = offset < 0 ? 'calc(50% + '+offset+'px)' : 'calc(50%)';
      var connectorHeight = Math.abs(offset);

      var t = entry.item;
      var cls = 'tl-task';
      if(t.done) cls += ' done';
      else if(t.status === 'blocked') cls += ' blocked';
      else if(entry.time < today.getTime()) cls += ' overdue';
      else if(entry.time === today.getTime()) cls += ' today';
      var dateStr = itemDate.toLocaleDateString('es-ES',{day:'numeric',month:'short'}).replace('.','');
      var respInitial = personaInitial(t.responsible_persona_id, personas);
      var avatarHtml = respInitial ? renderAvatar(t.responsible_persona_id, personas) : '';
      var fullTitle = t.title + ' — ' + dateStr + (respInitial ? ' · '+personaName(t.responsible_persona_id, personas) : '');

      canvasHtml += '<div class="tl-task-connector" style="left:'+left+'%;top:'+connectorTop+';height:'+connectorHeight+'px;"></div>';
      canvasHtml += '<div class="'+cls+'" style="left:'+left+'%;top:'+top+';" onclick="event.stopPropagation();openTaskDetail(event,\''+project.id+'\',\''+t.id+'\')" title="'+esc(fullTitle)+'">'+
        '<div class="tl-task-header">'+
          '<span class="tl-task-dot"></span>'+
          '<span class="tl-task-title">'+esc((t.title||'').substring(0,32)+((t.title||'').length>32?'…':''))+'</span>'+
        '</div>'+
        '<div class="tl-task-meta">'+
          avatarHtml+
          '<span class="tl-task-meta-date">📅 '+esc(dateStr)+'</span>'+
        '</div>'+
        '</div>';
    } else {
      var typeIcons = {meeting:'🤝', call:'📞', email:'✉️', visit:'🏢', note:'📝'};
      var icon = typeIcons[entry.item.type] || '💬';
      var interDateStr = itemDate.toLocaleDateString('es-ES',{day:'numeric',month:'short'}).replace('.','');
      var itTitle = (entry.item.title || 'Interacción') + ' — ' + interDateStr;
      canvasHtml += '<div class="tl-milestone" style="left:'+left+'%;top:50%;" onclick="event.stopPropagation();openInteractionDetail(event,\''+project.id+'\',\''+entry.item.id+'\')" title="'+esc(itTitle)+'">'+icon+
        '<div class="tl-milestone-date">'+esc(interDateStr)+'</div>'+
        '</div>';
    }
  });

  canvasHtml += '</div>';

  // Aviso de fecha objetivo lejana
  var targetOutHtml = '';
  if(showTargetMarker && targetTime){
    var targetDateStr = new Date(targetTime).toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'});
    targetOutHtml = '<div class="tl-nofecha" style="border-color:var(--accent);background:var(--accent-l);color:var(--accent);"><strong>🎯 Fecha objetivo del proyecto:</strong> '+esc(targetDateStr)+' <span style="opacity:.7;">(fuera del rango del timeline por estar lejos de las tareas actuales)</span></div>';
  }

  // Tareas sin fecha
  var noFechaHtml = '';
  if(itemsWithoutDate.length > 0){
    noFechaHtml = '<div class="tl-nofecha">'+
      '<strong style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;">Sin fecha aún:</strong> '+
      itemsWithoutDate.map(function(entry){
        return '<span class="tl-nofecha-item" onclick="editTaskModal(\''+project.id+'\',\''+entry.item.id+'\')">'+esc(entry.item.title||'')+'</span>';
      }).join(' ')+
      '</div>';
  }

  return '<div class="tl-wrap">'+
    '<div class="tl-header">'+
      '<span>📊 Timeline del proyecto</span>'+
      '<span>'+sortedItems.length+' hitos · '+itemsWithoutDate.length+' sin fecha</span>'+
    '</div>'+
    canvasHtml + targetOutHtml + noFechaHtml +
    '<div style="margin-top:1rem;padding-top:1rem;border-top:1px dashed var(--border);font-size:11px;color:var(--text3);display:flex;gap:1rem;flex-wrap:wrap;">'+
      '<span>🔵 Tarea pendiente</span>'+
      '<span style="color:var(--accent);">✅ Hecha</span>'+
      '<span style="color:var(--danger);">⚠️ Vencida</span>'+
      '<span>🤝📞✉️ Interacciones</span>'+
      (targetTime && !showTargetMarker ? '<span style="color:var(--accent);">🎯 Objetivo del proyecto</span>' : '')+
    '</div>'+
    '</div>';
}

// ── VISTA KANBAN ──
function renderKanbanView(project, tasks, personas){
  var cols = [
    {key:'pending', title:'🔵 Pendientes', filter:function(t){return !t.done && (!t.status || t.status==='pending');}},
    {key:'in_progress', title:'🟡 En curso', filter:function(t){return !t.done && t.status==='in_progress';}},
    {key:'blocked', title:'🔴 Bloqueadas', filter:function(t){return !t.done && t.status==='blocked';}},
    {key:'done', title:'✅ Hechas', filter:function(t){return t.done;}},
    {key:'discarded', title:'⚫ Descartadas', filter:function(t){return t.status==='discarded';}}
  ];

  if(tasks.length === 0){
    return '<div style="text-align:center;padding:2rem;color:var(--text3);font-size:13px;background:var(--surface2);border-radius:var(--rsm);">Sin tareas aún. Añade la primera para verla aquí en el board.</div>'+
      '<div style="text-align:center;margin-top:1rem;"><button class="btn bsm btnp" onclick="addTaskInline(\''+project.id+'\')">+ Añadir tarea</button></div>';
  }

  var today = new Date(); today.setHours(0,0,0,0);
  var totalActive = tasks.filter(function(t){return t.status !== 'discarded';}).length;

  var html = '<div style="font-size:11px;color:var(--text3);margin-bottom:8px;text-align:center;">💡 Arrastra las tarjetas entre columnas para cambiar su estado</div>'+
    '<div class="kb-wrap">';
  cols.forEach(function(col){
    var colTasks = tasks.filter(col.filter);
    var pct = totalActive > 0 && col.key !== 'discarded' ? Math.round((colTasks.length / totalActive) * 100) : 0;
    html += '<div class="kb-col" data-col="'+col.key+'" data-project="'+project.id+'" ondragover="kbDragOver(event)" ondragleave="kbDragLeave(event)" ondrop="kbDrop(event)">'+
      '<div class="kb-col-title">'+col.title+
        '<span class="kb-col-count">'+colTasks.length+(col.key !== 'discarded' && totalActive > 0 ? ' · '+pct+'%' : '')+'</span>'+
      '</div>'+
      '<div class="kb-col-drop-hint">↓ Soltar aquí</div>';
    if(colTasks.length === 0){
      html += '<div class="kb-empty">—</div>';
    } else {
      colTasks.forEach(function(t){
        var isOverdue = t.target_date && new Date(t.target_date+'T00:00:00') < today && !t.done;
        var dateStr = t.target_date ? shortDate(t.target_date) : '';
        var avatar = renderAvatar(t.responsible_persona_id, personas);
        html += '<div class="kb-card '+col.key+'" draggable="true" data-task="'+t.id+'" ondragstart="kbDragStart(event)" ondragend="kbDragEnd(event)" onclick="if(!event.defaultPrevented)openTaskDetail(event,\''+project.id+'\',\''+t.id+'\')">'+
          '<div class="kb-card-title">'+
            '<span class="kb-card-dot"></span>'+
            '<span class="kb-card-title-text">'+esc(t.title||'')+'</span>'+
          '</div>'+
          '<div class="kb-card-meta">'+
            avatar+
            (dateStr ? '<span'+(isOverdue?' style="color:var(--danger);font-weight:600;"':'')+'>📅 '+esc(dateStr)+(isOverdue?' ⚠️':'')+'</span>' : '')+
          '</div>'+
          '</div>';
      });
    }
    // Botón de añadir en las columnas activas
    if(col.key === 'pending' || col.key === 'in_progress'){
      html += '<button class="kb-add-btn" onclick="addTaskInline(\''+project.id+'\')">+ Añadir</button>';
    }
    html += '</div>';
  });
  html += '</div>';
  return html;
}

// ── DRAG & DROP KANBAN ──
var _kbDragTaskId = null;
var _kbDragProjectId = null;

function kbDragStart(e){
  var card = e.currentTarget;
  _kbDragTaskId = card.getAttribute('data-task');
  var col = card.closest('.kb-col');
  _kbDragProjectId = col ? col.getAttribute('data-project') : null;
  card.classList.add('dragging');
  if(e.dataTransfer){
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', _kbDragTaskId); } catch(_){}
  }
}

function kbDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.kb-col.drag-over').forEach(function(c){ c.classList.remove('drag-over'); });
}

function kbDragOver(e){
  e.preventDefault();
  if(e.dataTransfer) e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function kbDragLeave(e){
  // Solo quitar si estamos saliendo del contenedor (no de un hijo)
  if(!e.currentTarget.contains(e.relatedTarget)){
    e.currentTarget.classList.remove('drag-over');
  }
}

async function kbDrop(e){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  var targetCol = e.currentTarget.getAttribute('data-col');
  var projectId = e.currentTarget.getAttribute('data-project');
  if(!_kbDragTaskId || !projectId || !targetCol) return;
  // Prevenir que dispare el click luego
  e.stopPropagation();

  var project = (S.projects||[]).find(function(x){return x.id === projectId;});
  if(!project) return;
  var tasks = Array.isArray(project.tasks) ? project.tasks.slice() : [];
  var moved = false;
  tasks = tasks.map(function(t){
    if(t.id !== _kbDragTaskId) return t;
    // ¿Ya estaba en esa columna?
    var currentCol = t.done ? 'done' : (t.status || 'pending');
    if(currentCol === targetCol) return t;
    var updated = Object.assign({}, t, {updated_at: new Date().toISOString()});
    if(targetCol === 'done'){
      updated.done = true;
    } else {
      updated.done = false;
      updated.status = targetCol;
    }
    moved = true;
    return updated;
  });
  _kbDragTaskId = null;
  _kbDragProjectId = null;
  if(moved){
    project.tasks = tasks;
    await persistProject(project);
    renderProjectsList(getPersonas());
  }
}

// ── VISTA FOTO EJECUTIVA ──
function renderSummaryView(project, tasks, interactions, personas){
  var today = new Date(); today.setHours(0,0,0,0);

  // Progreso por responsable
  var byResp = {};
  tasks.forEach(function(t){
    var key = t.responsible_persona_id || 'unassigned';
    if(!byResp[key]) byResp[key] = {total:0, done:0, name:''};
    byResp[key].total++;
    if(t.done) byResp[key].done++;
  });
  var respCards = Object.keys(byResp).map(function(k){
    var d = byResp[k];
    var name = k === '__me__' ? 'Yo (consultora)' : (k === 'unassigned' ? 'Sin asignar' : (personas.find(function(p){return p.id===k;})||{}).nombre || 'Desconocido');
    var pct = d.total > 0 ? Math.round((d.done/d.total)*100) : 0;
    return {name:name, done:d.done, total:d.total, pct:pct, id:k};
  }).sort(function(a,b){return b.total - a.total;});

  // Próximas 5 tareas (por fecha ascendente)
  var upcoming = tasks.filter(function(t){
    return !t.done && t.status !== 'discarded' && t.target_date;
  }).sort(function(a,b){return (a.target_date||'').localeCompare(b.target_date||'');}).slice(0, 5);

  // Bloqueadas
  var blocked = tasks.filter(function(t){return !t.done && t.status === 'blocked';});

  // Actividad reciente: últimas 3 interacciones + últimas 3 tareas hechas
  var recentInter = interactions.slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');}).slice(0, 3);
  var recentDone = tasks.filter(function(t){return t.done;}).slice(0, 3);

  // Contar interacciones últimos 30 días
  var monthAgo = new Date(today); monthAgo.setDate(monthAgo.getDate()-30);
  var recentInterMonth = interactions.filter(function(it){
    if(!it.date) return false;
    return new Date(it.date+'T00:00:00') >= monthAgo;
  });

  var progress = computeProgress(project);
  var doneCount = tasks.filter(function(t){return t.done;}).length;
  var pendingCount = tasks.filter(function(t){return !t.done && t.status !== 'discarded';}).length;

  // Info del objetivo
  var daysToTarget = project.target_date ? daysUntil(project.target_date) : null;
  var targetHtml = '';
  if(project.target_date){
    var daysColor = daysToTarget < 0 ? 'var(--danger)' : (daysToTarget < 30 ? '#B8860B' : 'var(--accent)');
    var daysText = daysToTarget < 0 ? Math.abs(daysToTarget)+' día(s) de retraso' : (daysToTarget === 0 ? 'HOY' : 'en '+daysToTarget+' días');
    targetHtml = '<div style="margin-top:.5rem;font-size:12px;color:var(--text2);">🎯 <strong>Objetivo:</strong> '+esc(humanDate(project.target_date))+' <span style="color:'+daysColor+';font-weight:600;">('+daysText+')</span></div>';
  }

  return '<div class="sm-wrap">'+
    // Estado global
    '<div class="sm-card" style="grid-column:span 2;">'+
      '<div class="sm-card-title">Estado global</div>'+
      '<div style="display:flex;align-items:center;gap:1rem;margin-bottom:8px;">'+
        '<div style="font-size:42px;font-weight:300;color:'+statusColor(project.status)+';line-height:1;">'+progress+'%</div>'+
        '<div style="flex:1;">'+
          '<div class="pbar" style="margin-bottom:8px;"><div class="pfill" style="width:'+progress+'%;background:'+statusColor(project.status)+';"></div></div>'+
          '<div style="font-size:12px;color:var(--text2);">'+doneCount+' hechas · '+pendingCount+' pendientes · '+recentInterMonth.length+' interacciones último mes</div>'+
        '</div>'+
      '</div>'+
      targetHtml+
    '</div>'+

    // Bloqueos
    '<div class="sm-card">'+
      '<div class="sm-card-title">🔴 Bloqueos ('+blocked.length+')</div>'+
      (blocked.length === 0
        ? '<div style="font-size:12px;color:var(--text3);font-style:italic;">Sin bloqueos. ✨</div>'
        : blocked.map(function(t){
            var resp = personas.find(function(p){return p.id===t.responsible_persona_id;});
            return '<div class="sm-blocked" onclick="openTaskDetail(event,\''+project.id+'\',\''+t.id+'\')" style="cursor:pointer;">'+
              '<div class="sm-blocked-title">'+esc(t.title)+'</div>'+
              (resp ? '<div style="font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px;">'+renderAvatar(t.responsible_persona_id, personas)+' '+esc(resp.nombre)+'</div>' : '')+
              '</div>';
          }).join(''))+
    '</div>'+

    // Próximas fechas
    '<div class="sm-card">'+
      '<div class="sm-card-title">⏰ Próximas fechas ('+upcoming.length+')</div>'+
      (upcoming.length === 0
        ? '<div style="font-size:12px;color:var(--text3);font-style:italic;">Sin tareas con fecha próxima.</div>'
        : upcoming.map(function(t){
            var d = new Date(t.target_date+'T00:00:00');
            var isPast = d < today;
            var daysLeft = daysUntil(t.target_date);
            var badgeText = isPast ? Math.abs(daysLeft)+'d atraso' : (daysLeft === 0 ? 'HOY' : daysLeft+'d');
            var badgeColor = isPast ? 'var(--danger)' : (daysLeft < 8 ? '#B8860B' : 'var(--text3)');
            return '<div onclick="openTaskDetail(event,\''+project.id+'\',\''+t.id+'\')" style="cursor:pointer;display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--surface);border-radius:var(--rsm);margin-bottom:4px;font-size:12px;">'+
              renderAvatar(t.responsible_persona_id, personas)+
              '<span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(t.title)+'</span>'+
              '<span style="font-size:10px;padding:2px 7px;background:var(--surface2);color:'+badgeColor+';border-radius:8px;font-weight:600;white-space:nowrap;">'+esc(badgeText)+'</span>'+
              '</div>';
          }).join(''))+
    '</div>'+

    // Por responsable
    '<div class="sm-card" style="grid-column:span 2;">'+
      '<div class="sm-card-title">👥 Progreso por responsable</div>'+
      (respCards.length === 0
        ? '<div style="font-size:12px;color:var(--text3);font-style:italic;">Sin tareas asignadas.</div>'
        : respCards.map(function(rc){
            return '<div class="sm-person">'+
              '<div class="sm-person-circle" style="--pct:'+(rc.pct*3.6)+'deg;">'+
                '<span class="sm-person-circle-text">'+rc.pct+'%</span>'+
              '</div>'+
              '<div class="sm-person-info">'+
                '<div class="sm-person-name">'+esc(rc.name)+'</div>'+
                '<div class="sm-person-stats">'+rc.done+' de '+rc.total+' tareas completadas</div>'+
              '</div>'+
              '</div>';
          }).join(''))+
    '</div>'+

    // Actividad reciente
    ((recentInter.length > 0 || recentDone.length > 0)
      ? '<div class="sm-card" style="grid-column:span 2;">'+
        '<div class="sm-card-title">✨ Actividad reciente</div>'+
        (recentDone.length > 0
          ? '<div style="margin-bottom:.5rem;"><div style="font-size:11px;color:var(--text3);margin-bottom:4px;">Últimas completadas:</div>'+
            recentDone.map(function(t){
              return '<div onclick="openTaskDetail(event,\''+project.id+'\',\''+t.id+'\')" style="cursor:pointer;font-size:12px;padding:3px 0;color:var(--text2);">✅ '+esc(t.title)+'</div>';
            }).join('')+
            '</div>'
          : '')+
        (recentInter.length > 0
          ? '<div><div style="font-size:11px;color:var(--text3);margin-bottom:4px;">Últimas interacciones:</div>'+
            recentInter.map(function(it){
              var typeIcons = {meeting:'🤝', call:'📞', email:'✉️', visit:'🏢', note:'📝'};
              var icon = typeIcons[it.type] || '💬';
              return '<div onclick="openInteractionDetail(event,\''+project.id+'\',\''+it.id+'\')" style="cursor:pointer;font-size:12px;padding:3px 0;color:var(--text2);">'+icon+' '+esc(it.title || it.type || 'Interacción')+(it.date?' <span style="color:var(--text3);">· '+shortDate(it.date)+'</span>':'')+'</div>';
            }).join('')+
            '</div>'
          : '')+
        '</div>'
      : '')+
    '</div>';
}

async function createProposedProjects(){
  var selected = [];
  document.querySelectorAll('.proposal-check:checked').forEach(function(el){
    var idx = parseInt(el.getAttribute('data-idx'));
    var titleEl = document.querySelector('.proposal-title[data-idx="'+idx+'"]');
    var descEl = document.querySelector('.proposal-desc[data-idx="'+idx+'"]');
    var priEl = document.querySelector('.proposal-priority[data-idx="'+idx+'"]');
    var respEl = document.querySelector('.proposal-responsible[data-idx="'+idx+'"]');

    // Recoger tareas marcadas para este proyecto
    var proposedTasks = [];
    document.querySelectorAll('.proposal-task-check[data-pidx="'+idx+'"]:checked').forEach(function(tel){
      var tidx = tel.getAttribute('data-tidx');
      var tTitleEl = document.querySelector('.proposal-task-title[data-pidx="'+idx+'"][data-tidx="'+tidx+'"]');
      var tRespEl = document.querySelector('.proposal-task-resp[data-pidx="'+idx+'"][data-tidx="'+tidx+'"]');
      var tTitle = (tTitleEl ? tTitleEl.value.trim() : '');
      if(!tTitle) return;
      proposedTasks.push({
        id: 't_' + Date.now() + '_' + Math.random().toString(36).substr(2,4) + '_' + tidx,
        title: tTitle,
        done: false,
        responsible_persona_id: tRespEl ? tRespEl.value : '',
        target_date: null,
        notes: '',
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString()
      });
    });

    selected.push({
      title: titleEl.value.trim(),
      description: descEl.value.trim(),
      priority: priEl.value,
      responsible_persona_id: respEl.value || null,
      status: 'pending',
      progress: 0,
      tasks: proposedTasks,
      interactions: [],
      progress_manual: false
    });
  });
  if(selected.length === 0){ alert('No has seleccionado ningún proyecto.'); return; }
  var totalTasks = selected.reduce(function(sum, p){ return sum + p.tasks.length; }, 0);
  closeModal();
  showLoadingModal('Creando '+selected.length+' proyecto(s)'+(totalTasks>0?' con '+totalTasks+' tarea(s)':'')+'…');
  try {
    for(var i=0;i<selected.length;i++){
      await api('/api/consultancies/'+S.current.id+'/projects', {method:'POST', body:selected[i]});
    }
    closeModal();
    renderProyectos(document.getElementById('appContent'));
  } catch(e){
    closeModal();
    alert('Error creando proyectos: '+e.message);
  }
}

async function saveTask(pid, tid){
  var title = document.getElementById('tk_title').value.trim();
  if(!title){ alert('La descripción de la tarea es obligatoria'); return; }
  var project = (S.projects||[]).find(function(x){return x.id === pid;});
  if(!project) return;
  var tasks = Array.isArray(project.tasks) ? project.tasks.slice() : [];
  var isDone = document.getElementById('tk_done').checked;
  var status = document.getElementById('tk_status').value || 'pending';
  var newTask = {
    id: tid || 't_' + Date.now() + '_' + Math.random().toString(36).substr(2,4),
    title: title,
    done: isDone,
    status: status,
    responsible_persona_id: document.getElementById('tk_responsible').value,
    target_date: document.getElementById('tk_date').value || null,
    notes: document.getElementById('tk_notes').value.trim(),
    created_at: tid ? (tasks.find(function(x){return x.id===tid;})||{}).created_at : new Date().toISOString(),
    updated_at: new Date().toISOString()
  };
  if(tid){
    tasks = tasks.map(function(t){ return t.id === tid ? newTask : t; });
  } else {
    tasks.push(newTask);
  }
  project.tasks = tasks;
  await persistProject(project);
  closeModal();
  renderProjectsList(getPersonas());
}

async function toggleTaskDone(pid, tid, done){
  var project = (S.projects||[]).find(function(x){return x.id === pid;});
  if(!project) return;
  var tasks = Array.isArray(project.tasks) ? project.tasks.slice() : [];
  tasks = tasks.map(function(t){ return t.id === tid ? Object.assign({}, t, {done: done, updated_at: new Date().toISOString()}) : t; });
  project.tasks = tasks;
  await persistProject(project);
  renderProjectsList(getPersonas());
}

async function deleteTask(pid, tid){
  if(!confirm('¿Eliminar esta tarea?')) return;
  var project = (S.projects||[]).find(function(x){return x.id === pid;});
  if(!project) return;
  project.tasks = (project.tasks || []).filter(function(t){return t.id !== tid;});
  await persistProject(project);
  renderProjectsList(getPersonas());
}

var searchTimer = null;
var lastSearchQuery = '';

function onSearchInput(q){
  q = (q || '').trim();
  if(searchTimer) clearTimeout(searchTimer);

    if(document.getElementById('modalOv').style.display === 'flex' && document.getElementById('searchResultsModal')){

    return;
  }

async function runSearch(q){
  if(!S.current) return;
  showModal('<div id="searchResultsModal"><h2>🔍 Buscando "'+esc(q)+'"…</h2><div style="text-align:center;padding:2rem;"><div class="dots"><span></span><span></span><span></span></div></div></div>');
  try {
    var data = await api('/api/consultancies/'+S.current.id+'/search', {method:'POST', body:{query: q}});
    // Si mientras buscábamos el usuario cambió la búsqueda, no reemplazamos
    if(lastSearchQuery !== q) return;
    renderSearchResults(q, data.results || []);
  } catch(e){
    var modal = document.getElementById('searchResultsModal');
    if(modal) modal.innerHTML = '<h2>🔍 Búsqueda</h2><div class="alert alert-danger">Error: '+esc(e.message)+'</div><div class="modal-act"><button class="btn" onclick="closeModal()">Cerrar</button></div>';
  }
}

function highlightMatch(text, q){
  if(!text || !q) return esc(text || '');
  var escaped = esc(text);
  var qEsc = esc(q).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  var rx = new RegExp('('+qEsc+')', 'gi');
  return escaped.replace(rx, '<mark>$1</mark>');
}

function renderSearchResults(q, results){
  var modal = document.getElementById('searchResultsModal');
  if(!modal) return;

  var header = '<h2>🔍 Resultados para "'+esc(q)+'"</h2>'+
    '<p style="font-size:13px;color:var(--text2);margin-bottom:1.25rem;">'+results.length+(results.length===1?' coincidencia encontrada':' coincidencias encontradas')+'</p>';

  if(results.length === 0){
    modal.innerHTML = header + '<div class="search-empty">Sin coincidencias. Prueba con otras palabras o menos específicas.</div><div class="modal-act"><button class="btn" onclick="closeModal()">Cerrar</button></div>';
    return;
  }

  // Agrupar por categoría
  var categories = {};
  results.forEach(function(r){
    if(!categories[r.category]) categories[r.category] = [];
    categories[r.category].push(r);
  });

  var order = ['Personas','Sesiones de entrevista','Campos de entrevista','Secciones','Proyectos','Tareas','Interacciones','Informes','Archivos'];
  var body = '';
  order.forEach(function(cat){
    if(!categories[cat]) return;
    var items = categories[cat];
    body += '<div class="search-cat">'+
      '<div class="search-cat-title">'+esc(cat)+' <span class="search-cat-count">'+items.length+'</span></div>'+
      items.map(function(r){
        var payload = JSON.stringify(r).replace(/"/g,'&quot;');
        return '<div class="search-item" onclick=\'navigateToSearchResult('+payload+')\'>'+
          '<div class="search-item-title">'+highlightMatch(r.title, q)+'</div>'+
          '<div class="search-item-snippet">'+highlightMatch(r.snippet, q)+'</div>'+
          '</div>';
      }).join('')+
      '</div>';
  });

  modal.innerHTML = header + body + '<div class="modal-act"><button class="btn" onclick="closeModal()">Cerrar</button></div>';
}

function navigateToSearchResult(r){
  closeModal();
  // Limpiar la búsqueda
  var input = document.getElementById('searchInput');
  if(input) input.value = '';
  // Navegar
  if(r.nav === 'entrevistas' && r.personaId){
    S.persona = r.personaId;
    nav('entrevistas');
  } else if(r.nav === 'informe' && r.reportId){
    nav('informe');
    setTimeout(function(){ openReport(r.reportId); }, 100);
  } else if(r.nav === 'archivos'){
    nav('archivos');
  } else if(r.nav === 'proyectos'){
    if(r.projectId){
      if(!S.expandedProjects) S.expandedProjects = {};
      S.expandedProjects[r.projectId] = true;
    }
    nav('proyectos');
  } else {
    nav(r.nav || 'dashboard');
  }
}

// Parsea el texto de notas y separa bloques normales de bloques IA
function parseNoteText(text){
  if(!text) return [];
  var parts = [];
  var rx = /\[\[AI_NOTE_START:([^:]+):([^:]+):([^\]]*)\]\]([\s\S]*?)\[\[AI_NOTE_END\]\]/g;
  var lastIndex = 0;
  var m;
  while((m = rx.exec(text)) !== null){
    // Todo lo anterior es texto normal
    if(m.index > lastIndex){
      var before = text.substring(lastIndex, m.index).trim();
      if(before) parts.push({type:'text', content: before});
    }
    parts.push({
      type: 'ai',
      id: m[1],
      timestamp: m[2],
      question: (m[3] || '').trim(),
      content: (m[4] || '').trim()
    });
    lastIndex = rx.lastIndex;
  }
  // Cola de texto
  if(lastIndex < text.length){
    var tail = text.substring(lastIndex).trim();
    if(tail) parts.push({type:'text', content: tail});
  }
  return parts;
}

// Devuelve el HTML para mostrar notas con bloques IA plegados
function renderNotesWithAIBlocks(text, scope, entityId, parentProjectId){
  var parts = parseNoteText(text);
  if(parts.length === 0) return '';
  return parts.map(function(part){
    if(part.type === 'text'){
      return '<div style="font-size:12px;color:var(--text2);white-space:pre-wrap;line-height:1.5;">'+esc(part.content)+'</div>';
    }
    // Bloque IA colapsado
    var payload = JSON.stringify({scope:scope, entityId:entityId, parentProjectId:parentProjectId||null, noteId:part.id}).replace(/"/g,'&quot;');
    var titlePreview = part.question ? '<strong>'+esc(part.question)+'</strong>' : '<em>consulta libre</em>';
    return '<div class="ai-note-block" data-note-id="'+esc(part.id)+'">'+
      '<div class="ai-note-header">'+
        '<div class="ai-note-header-main" onclick="toggleAINoteBlock(this)">'+
          '<span class="ai-note-caret">▶</span>'+
          '<span class="ai-note-title">💬 '+titlePreview+' <span style="color:var(--text3);">· '+esc(part.timestamp)+'</span></span>'+
        '</div>'+
        '<div class="ai-note-actions">'+
          '<button title="Eliminar esta consulta" onclick=\'deleteAINoteBlock('+payload+')\'>🗑️</button>'+
        '</div>'+
      '</div>'+
      '<div class="ai-note-body">'+esc(part.content)+'</div>'+
      '</div>';
  }).join('');
}

function toggleAINoteBlock(headerEl){
  var block = headerEl.closest('.ai-note-block');
  if(!block) return;
  var caret = block.querySelector('.ai-note-caret');
  var body = block.querySelector('.ai-note-body');
  var isOpen = body.classList.contains('open');
  if(isOpen){
    body.classList.remove('open');
    caret.classList.remove('open');
  } else {
    body.classList.add('open');
    caret.classList.add('open');
  }
}

async function deleteAINoteBlock(params){
  if(!confirm('¿Eliminar esta consulta a la IA de las notas?')) return;
  try {
    await api('/api/ai/delete-note-block', {method:'POST', body: params});
    // Refresh según scope
    if(params.scope === 'project' || params.scope === 'task'){
      var projs = await api('/api/consultancies/'+S.current.id+'/projects');

    }
  } catch(e){ alert('Error: '+e.message); }
}

async function _runAskAI(payload){

  var ctx = _aiCurrentContext;
  var area = document.getElementById('ai_answer_area');
  if(area) area.innerHTML = '<div class="ai-loading"><div class="dots" style="justify-content:center;margin-bottom:.5rem;"><span></span><span></span><span></span></div>La IA está pensando…</div>';
  try {
    var body = Object.assign({
      scope: ctx.scope,
      entityId: ctx.entityId,
      parentProjectId: ctx.parentProjectId
    }, payload);
    var data = await api('/api/ask-ai', {method:'POST', body: body});
    var answer = data.answer || '';
    // Guardar temporalmente en window para acciones
    window._lastAIAnswer = answer;
    window._lastAIQuestion = payload.question || (AI_PRESETS[ctx.scope]||[]).find(function(p){return p.key === payload.presetKey;});
    window._lastAIQuestion = typeof window._lastAIQuestion === 'object' ? window._lastAIQuestion.title : window._lastAIQuestion;

    if(area){
      // Detectar propuestas de tareas
      var proposedTasks = extractProposedTasks(answer);
      var createTasksBtn = '';
      if(proposedTasks.length > 0 && (ctx.scope === 'project' || ctx.scope === 'task')){
        createTasksBtn = '<button class="btn bsm" style="background:var(--accent);color:white;border-color:var(--accent);" onclick="showCreateTasksFromAI()">➕ Crear como tareas ('+proposedTasks.length+')</button>';
      }

      area.innerHTML = '<div class="ai-answer">'+answer+'</div>'+

    var btns = document.querySelectorAll('.ai-actions .btn');

function extractProposedTasks(htmlAnswer){
  if(!htmlAnswer) return [];
  var tasks = [];
  var tmp = document.createElement('div');
  tmp.innerHTML = htmlAnswer;
  var items = tmp.querySelectorAll('li[data-task]');
  items.forEach(function(li){
    var raw = li.getAttribute('data-task') || '';

    var title = (parts[0] || '').trim();
    var respId = (parts[1] || '').trim();

      title = (li.textContent || '').trim();
    }
    if(title){
      tasks.push({title: title.substring(0, 200), responsible_persona_id: respId});
    }
  });
  return tasks;
}

async function createTasksFromAI(projectId){
  var project = (S.projects||[]).find(function(x){return x.id === projectId;});
  if(!project){ alert('Proyecto no encontrado.'); return; }
  var tasks = Array.isArray(project.tasks) ? project.tasks.slice() : [];
  var newTasks = [];

  document.querySelectorAll('.ai-task-check:checked').forEach(function(el){
    var idx = el.getAttribute('data-idx');
    var titleEl = document.querySelector('.ai-task-title[data-idx="'+idx+'"]');
    var respEl = document.querySelector('.ai-task-resp[data-idx="'+idx+'"]');
    var dateEl = document.querySelector('.ai-task-date[data-idx="'+idx+'"]');
    var title = (titleEl ? titleEl.value.trim() : '');
    if(!title) return;
    newTasks.push({
      id: 't_' + Date.now() + '_' + Math.random().toString(36).substr(2,4) + '_' + idx,
      title: title,
      done: false,
      status: 'pending',
      responsible_persona_id: respEl ? respEl.value : '',
      target_date: dateEl && dateEl.value ? dateEl.value : null,
      notes: '',
      created_at: new Date().toISOString(),
      updated_at: new Date().toISOString()
    });
  });

  if(newTasks.length === 0){ alert('No has seleccionado ninguna tarea.'); return; }
  project.tasks = tasks.concat(newTasks);
  closeModal();
  showLoadingModal('Creando '+newTasks.length+' tarea(s)…');
  try {
    await persistProject(project);
    closeModal();
    // Cerrar el chat de IA también
    closeAskAI();
    // Refrescar la vista
    renderProjectsList(getPersonas());
    // Feedback discreto
    var status = document.createElement('div');
    status.style.cssText = 'position:fixed;bottom:24px;right:24px;background:var(--accent);color:white;padding:12px 18px;border-radius:var(--rsm);box-shadow:0 4px 16px rgba(0,0,0,.16);z-index:9999;font-size:13px;font-weight:600;';
    status.textContent = '✓ '+newTasks.length+' tarea(s) creada(s)';
    document.body.appendChild(status);

async function saveProject(pid){
  var manual = document.getElementById('pj_progressManual').checked;
  var existing = pid ? (S.projects||[]).find(function(x){return x.id === pid;}) : null;
  var data = {
    title: document.getElementById('pj_title').value.trim(),
    description: document.getElementById('pj_desc').value.trim(),
    status: document.getElementById('pj_status').value,
    priority: document.getElementById('pj_priority').value,
    responsible_persona_id: document.getElementById('pj_responsible').value,
    target_date: document.getElementById('pj_date').value || null,
    progress: manual ? (parseInt(document.getElementById('pj_progress').value) || 0) : 0,
    progress_manual: manual,
    notes: document.getElementById('pj_notes').value.trim(),
    tasks: existing ? (existing.tasks || []) : [],
    interactions: existing ? (existing.interactions || []) : []
  };
  if(!data.title){ alert('El título es obligatorio'); return; }
  try {
    if(pid){
      await api('/api/projects/'+pid, {method:'PUT', body:data});
    } else {
      await api('/api/consultancies/'+S.current.id+'/projects', {method:'POST', body:data});
    }
    closeModal();
    renderProyectos(document.getElementById('appContent'));
  } catch(e){ alert('Error: '+e.message); }
}

  });

function formatSessionDate(d){
  if(!d) return '';
  try {
    var dt = new Date(d + 'T00:00:00');
    if(isNaN(dt.getTime())) return '';
    var dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    var meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    return dias[dt.getDay()] + ', ' + dt.getDate() + ' de ' + meses[dt.getMonth()];
  } catch(e){ return ''; }
}

// ── PROGRESS ──
function hasData(c,s){
  if(s==='entrevistas')return c.data.entrevistas&&c.data.entrevistas.length>0;
  if(s==='archivos')return(c.archivos||[]).length>0;
  var d=(c.data&&c.data[s])||{};
  return Object.keys(d).some(function(k){var v=d[k];return v&&(Array.isArray(v)?v.length>0:String(v).trim()!='');});
}
function calcProg(c){var secs=['contexto','estructura','entrevistas','procesos','herramientas','sintesis'];return Math.round((secs.filter(function(s){return hasData(c,s);}).length/secs.length)*100);}

// ── RENDER ──
function renderContent(){
  var el=document.getElementById('appContent');
  if(!el)return;
  // Mostrar/ocultar buscador
  var sb = document.getElementById('searchBox');
  if(sb) sb.style.display = S.current ? 'block' : 'none';
  // Admin y calendario son globales (no requieren consultoría activa)
  if(S.page==='admin'){renderAdmin(el);return;}
  if(S.page==='calendario'){renderCalendario(el);return;}
  if(!S.current){
    el.innerHTML='<div class="empty"><h2>Bienvenida, Eva María</h2><p>Crea tu primera consultoría para empezar.</p><button class="btn btnp" onclick="showNewModal()">+ Nueva consultoría</button></div>';
    return;
  }
  switch(S.page){
    case 'dashboard':renderDash(el);break;
    case 'contexto':renderContexto(el);break;
    case 'estructura':renderEstructura(el);break;
    case 'entrevistas':renderEntrevistas(el);break;
    case 'procesos':renderProcesos(el);break;
    case 'herramientas':renderHerramientas(el);break;
    case 'archivos':renderArchivos(el);break;
    case 'sintesis':renderSintesis(el);break;
    case 'informe':renderInforme(el);break;
    case 'proyectos':renderProyectos(el);break;
    default:renderDash(el);
  }
}

function renderMentionsReceived(targetId){
  var hits = findMentionsOf(targetId);
  if(hits.length === 0) return '';
  // Extraer fragmento alrededor de la primera mención a esta persona
  function fragment(text){
    var matches = findMentionMatchesInText(text);
    var m = matches.find(function(x){return x.personaId === targetId;});
    if(!m) return text.length > 200 ? text.substring(0,200)+'…' : text;
    var start = Math.max(0, m.start - 80);
    var end = Math.min(text.length, m.end + 80);
    var prefix = start > 0 ? '…' : '';
    var suffix = end < text.length ? '…' : '';
    return prefix + text.substring(start, end) + suffix;
  }
  return '<div class="mentions-section">'+
    '<h3>📌 Cómo le ven sus compañeros <span style="font-weight:400;color:var(--text3);">('+hits.length+' '+(hits.length===1?'mención':'menciones')+')</span></h3>'+
    hits.map(function(h){
      var when = h.when ? ' · '+formatSessionDate(h.when) : '';
      var frag = fragment(h.text);
      return '<div class="mention-item">'+
        '<div class="mention-item-from">'+esc(h.sourceLabel)+when+'</div>'+
        '<div class="mention-item-text">«'+renderMentions(frag)+'»</div>'+
        '</div>';
    }).join('')+
    '</div>';
}

var descTimers = {};
function updateFileDescription(fid, desc){
  // Actualizar en estado local
  var f = S.current.archivos.find(function(x){return x.id===fid;});
  if(f) f.description = desc;
  // Guardar en servidor con debounce
  if(descTimers[fid]) clearTimeout(descTimers[fid]);
  setSync('saving');
  descTimers[fid] = setTimeout(async function(){
    try {
      await api('/api/files/'+fid+'/description', {method:'PUT', body:{description: desc}});
      await saveCurrent();
      setSync('ok');
    } catch(e){setSync('err');}
  }, 800);
}

function formatSize(b){if(!b)return'';if(b<1024)return b+'B';if(b<1048576)return Math.round(b/1024)+'KB';return(b/1048576).toFixed(1)+'MB';}

function handleDrop(e){e.preventDefault();handleFiles(e.dataTransfer.files);}

async function handleFiles(files, linkContext){
  if(!files||files.length===0)return;
  linkContext = linkContext || {};
  var us=document.getElementById('uploadStatus');
  for(var i=0;i<files.length;i++){
    var f=files[i];
    if(us)us.innerHTML='<div class="alert alert-blue" style="margin-top:1rem;"><div class="dots"><span></span><span></span><span></span></div> Subiendo '+esc(f.name)+'...</div>';
    try {
      var b64=await fileToBase64(f);
      var fid='f_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
      await api('/api/consultancies/'+S.current.id+'/files',{method:'POST',body:{
        id:fid, name:f.name, mimeType:f.type, size:f.size, base64:b64,
        linkedProjectId: linkContext.projectId || null,
        linkedTaskId: linkContext.taskId || null,
        linkedInteractionId: linkContext.interactionId || null
      }});
      S.current.archivos.push({
        id:fid, name:f.name, mimeType:f.type, size:f.size,
        linked_project_id: linkContext.projectId || null,
        linked_task_id: linkContext.taskId || null,
        linked_interaction_id: linkContext.interactionId || null
      });
      await api('/api/consultancies/'+S.current.id,{method:'PUT',body:S.current});
    } catch(e){alert('Error subiendo '+f.name+': '+e.message);}
  }
  if(us)us.innerHTML='';
  renderContent();
}

// Subir archivos vinculados a un proyecto, tarea o interacción (desde su ficha)
function pickAndUploadForProject(projectId, taskId, interactionId){
  var input = document.createElement('input');
  input.type = 'file';
  input.multiple = true;
  input.onchange = async function(){
    if(!input.files || input.files.length === 0) return;
    // Mostrar indicador simple
    var oldStatus = document.getElementById('uploadStatus');
    if(!oldStatus){
      var tmp = document.createElement('div');
      tmp.id = 'uploadStatus';
      tmp.style.position = 'fixed';
      tmp.style.bottom = '20px';
      tmp.style.right = '20px';
      tmp.style.zIndex = '9999';
      tmp.style.background = 'var(--surface)';
      tmp.style.border = '1px solid var(--border)';
      tmp.style.borderRadius = 'var(--rsm)';
      tmp.style.padding = '10px 14px';
      tmp.style.boxShadow = '0 4px 16px rgba(0,0,0,.12)';
      document.body.appendChild(tmp);
    }
    await handleFiles(input.files, {projectId: projectId, taskId: taskId || null, interactionId: interactionId || null});
    // Recargar archivos y re-render de proyectos
    try {
      var freshFiles = await api('/api/consultancies/'+S.current.id+'/files');
      S.current.archivos = freshFiles;
    } catch(e){}
    var status = document.getElementById('uploadStatus');
    if(status && status.parentElement === document.body) status.remove();
    // Si estamos en la vista de proyectos, refrescar
    if(S.page === 'proyectos'){
      renderProjectsList(getPersonas());
    }
  };
  input.click();
}

function fileToBase64(file){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(e){res(e.target.result.split(',')[1]);};r.onerror=rej;r.readAsDataURL(file);});}

async function delArchivo(fid){
  if(!confirm('¿Eliminar este archivo?'))return;
  try {
    await api('/api/files/'+fid,{method:'DELETE'});
    S.current.archivos=(S.current.archivos||[]).filter(function(f){return f.id!==fid;});
    await api('/api/consultancies/'+S.current.id,{method:'PUT',body:S.current});
    renderContent();
  } catch(e){alert('Error: '+e.message);}
}

async function viewFile(fid, fname){
  try {
    var r = await fetch('/api/files/'+fid+'/download', { headers: { 'x-app-password': PWD } });
    if(!r.ok) throw new Error('No se pudo descargar');
    var blob = await r.blob();
    var url = URL.createObjectURL(blob);
    var w = window.open(url, '_blank');
    if(!w){
      var a = document.createElement('a');
      a.href = url; a.download = fname; document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }
    setTimeout(function(){URL.revokeObjectURL(url);}, 60000);
  } catch(e){alert('Error al abrir el archivo: '+e.message);}
}

function renderFileSelector(){
  var archivos = S.current.archivos || [];
  if(archivos.length === 0){
    return '<div class="alert alert-blue" style="font-size:12px;">No hay archivos adjuntos en esta consultoría. El informe se generará solo con los datos del formulario.</div>';
  }
  return '<div class="field"><label>Archivos a incluir <span style="color:var(--text3);font-weight:400;">(marca los que quieres que Claude tenga en cuenta)</span></label>'+
    '<div style="display:flex;gap:6px;margin-bottom:8px;"><button class="btn bsm" onclick="toggleAllFiles(true)">Seleccionar todos</button><button class="btn bsm" onclick="toggleAllFiles(false)">Ninguno</button></div>'+
    '<div style="display:flex;flex-direction:column;gap:5px;border:1px solid var(--border);border-radius:var(--rsm);padding:8px;max-height:240px;overflow-y:auto;">'+
    archivos.map(function(f){
      var ext=(f.name||'').split('.').pop().substring(0,4).toUpperCase();
      var isSupported = isExtractable(f);
      var desc = f.description ? '<div style="font-size:11px;color:var(--text2);margin-top:2px;font-style:italic;">📝 '+esc(f.description)+'</div>' : '<div style="font-size:11px;color:var(--text3);margin-top:2px;font-style:italic;">Sin descripción</div>';
      return '<label style="display:flex;align-items:flex-start;gap:8px;padding:6px;cursor:'+(isSupported?'pointer':'not-allowed')+';opacity:'+(isSupported?'1':'0.5')+';border-bottom:1px solid var(--border);">'+
        '<input type="checkbox" class="file-check" data-id="'+f.id+'" '+(isSupported?'checked':'disabled')+' style="width:16px;height:16px;margin-top:6px;cursor:'+(isSupported?'pointer':'not-allowed')+';" />'+
        '<div class="file-ext" style="width:26px;height:26px;font-size:8px;margin-top:2px;">'+esc(ext)+'</div>'+
        '<div style="flex:1;min-width:0;">'+
          '<div style="font-size:13px;display:flex;align-items:center;gap:8px;"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(f.name)+'</span><span style="font-size:11px;color:'+(isSupported?'var(--accent)':'var(--text3)')+';white-space:nowrap;">'+(isSupported?'✓ legible':'no procesable')+'</span></div>'+
          desc+
        '</div>'+
        '</label>';
    }).join('')+
    '</div></div>';
}

function isExtractable(f){
  if(!f.mimeType && !f.name) return false;
  var name = (f.name||'').toLowerCase();
  var mt = f.mimeType || '';
  if(mt === 'application/pdf' || name.endsWith('.pdf')) return true;
  if(mt.includes('wordprocessingml') || name.endsWith('.docx')) return true;
  if(mt.startsWith('text/') || name.endsWith('.txt') || name.endsWith('.md') || name.endsWith('.csv')) return true;
  if(['image/jpeg','image/png','image/gif','image/webp'].includes(mt)) return true;
  return false;
}

function doRegenerate(){
  if(!S.activeReport) return;
  var newType = document.getElementById('rg_type').value;
  var newTitle = document.getElementById('rg_title').value.trim();
  var newInstructions = document.getElementById('rg_instructions').value.trim();
  var personaSel = document.getElementById('rg_persona');
  var newPersonaId = personaSel ? personaSel.value : '';
  var newFiles = Array.from(document.querySelectorAll('.rg-file-check:checked')).map(function(el){return el.getAttribute('data-id');});
  var newRefs = Array.from(document.querySelectorAll('.rg-ref-check:checked')).map(function(el){return el.getAttribute('data-id');});

  if(newType === 'personalizado' && !newInstructions){
    alert('Para un informe personalizado necesito que escribas las instrucciones.');
    return;
  }
  if(newType === 'informe_individual' && !newPersonaId){
    alert('Para un informe individual selecciona la persona del equipo.');
    return;
  }

  closeModal();
  var finalTitle = newTitle || (S.activeReport.title || '').replace(/\s*\(regenerado[^)]*\)\s*$/,'') + ' (regenerado ' + new Date().toLocaleDateString('es-ES') + ')';
  generateReport({
    regenerateFrom: {
      id: S.activeReport.id,
      report_type: newType,
      title: finalTitle,
      custom_instructions: newInstructions,
      files_used: newFiles,
      target_persona_id: newPersonaId,
      reference_report_ids: newRefs
    }
  });
}

// Detecta cambios en los datos posteriores a la creación del informe
function getFreshnessChanges(){
  if(!S.activeReport || !S.activeReport.created_at || !S.current) return null;
  var reportDate = new Date(S.activeReport.created_at).getTime();
  if(isNaN(reportDate)) return null;
  var changes = { newSessions: 0, newFiles: 0, hasUpdates: false };

  // Sesiones nuevas
  (S.current.data.entrevistas||[]).forEach(function(p){
    (p.sesiones||[]).forEach(function(s){
      // Sesiones: comparamos fecha registrada (puede ser anterior a la creación si es retroactiva)
      // Mejor: comparamos por el ID que incluye timestamp
      var sid = s.id || '';
      var match = sid.match(/s_(\d+)/);
      if(match){
        var sTime = parseInt(match[1]);
        if(sTime > reportDate) changes.newSessions++;
      }
    });
  });

  // Archivos nuevos (comparamos por ID que incluye timestamp)
  (S.current.archivos||[]).forEach(function(f){
    var fid = f.id || '';
    var match = fid.match(/f_(\d+)/);
    if(match){
      var fTime = parseInt(match[1]);
      if(fTime > reportDate) changes.newFiles++;
    }
  });

  changes.hasUpdates = changes.newSessions > 0 || changes.newFiles > 0;
  return changes;
}

function renderFreshnessAlert(){
  var ch = getFreshnessChanges();
  if(!ch || !ch.hasUpdates) return '';
  var parts = [];
  if(ch.newSessions > 0) parts.push(ch.newSessions + (ch.newSessions===1?' sesión nueva':' sesiones nuevas'));
  if(ch.newFiles > 0) parts.push(ch.newFiles + (ch.newFiles===1?' archivo nuevo':' archivos nuevos'));
  return '<div class="alert no-print" style="background:#FEF9E7;color:#B8860B;border:1px solid #f1d57c;padding:12px 14px;margin-bottom:1rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">'+
    '<span style="font-size:18px;">⚡</span>'+
    '<span style="flex:1;min-width:200px;">Hay '+parts.join(' y ')+' desde que se generó este informe. ¿Quieres regenerar para incorporar lo nuevo?</span>'+
    '<button class="btn bsm" onclick="confirmRegenerate()" style="background:#B8860B;color:white;border-color:#B8860B;">Regenerar</button>'+
    '</div>';
}

ca\n- Comportamiento directivo real: ¿dirige, entrena, apoya, delega según la etapa de madurez de cada colaborador? ¿O aplica el mismo estilo a todos?\n- ¿Delega de verdad o retiene el control?\n- ¿Da autonomía con acompañamiento, o soledad?\n- ¿Cómo maneja el error de su gente?\n- Cita evangélica\n- Palanca de crecimiento\n\n5. LOS HÁBITOS DEL LÍDER — Cómo se sostiene\n- ¿Qué prácticas de renovación tiene (o le faltan): tiempo para pensar, silencio, escuchar voces incómodas, comunidad de apoyo, mentores?\n- ¿Se rodea de gente que le dice la verdad o solo de quien confirma?\n- Señales de agotamiento o de plenitud\n- Cita evangélica\n- Palanca de crecimiento\n\n6. FORTALEZAS DEL LÍDER\nLista honesta y sustentada de lo que este líder aporta. Sin adulación, con evidencias. Dónde ya está siendo servidor y dónde se ve su mejor versión.\n\n7. RIESGOS SI NO EVOLUCIONA\nQué puede pasar en el equipo/departamento si el líder no crece en las dimensiones señaladas. Riesgos concretos, no genéricos.\n\n8. PRÓXIMOS PASOS ATERRIZADOS\n3-5 acciones muy concretas, prácticas, implementables desde mañana. Nada místico ni abstracto. Ejemplos del tipo:\n- "Instaurar una reunión semanal 1-a-1 de 20 min con cada miembro del equipo para escucharles sin agenda"\n- "Bloquear 30 min los viernes para revisar decisiones tomadas y hacer autoexamen"\n- "Delegar completamente [proceso concreto] a [nombre real] antes de X fecha"\n- "Tener una conversación con [nombre] sobre [tema concreto detectado]"\n\n=== REGLAS CRÍTICAS ===\n- Las citas evangélicas se eligen SIEMPRE en función de lo observado, nunca al revés. Si no encuentras una cita que encaje honestamente con una dimensión, no la pongas — mejor omitirla que forzarla.\n- Cero moralismo, cero sermón. Es lectura profesional con profundidad humana, no catequesis.\n- Solo lo sustentado por los datos. Si no hay evidencia para una dimensión, dilo con honestidad.\n- Discreción total: escribe como si el informe pudiera llegar al propio líder. Nada gratuitamente hiriente, todo constructivo, pero sin edulcorar las verdades.\n- Cita evidencias específicas cuando puedas (una frase textual de una entrevista, un patrón detectado en varias sesiones...). Cuida la confidencialidad si es información delicada.\n- Si el líder no cree en Jesús, el informe funciona igual: son principios universales sobre el servicio, la humildad y el propósito.\n- Tono profesional, cercano, humanista. Ni distante ni condescendiente.\n- Usa la 3ª persona para hablar del líder, salvo en la reflexión final si sale natural la primera persona.'

async function generateReport(opts){
  opts = opts || {};
  var isRegenerate = !!opts.regenerateFrom;
  var reportType, customTitle, customInstructions, selectedFiles, targetPersonaId, previousReportId, referenceReportIds;

  if(isRegenerate){
    // Regenerar: usamos la configuración del informe anterior (con posibles ediciones del modal)
    var prev = opts.regenerateFrom;
    reportType = prev.report_type || 'diagnostico_completo';
    customTitle = prev.title || ((prev.title || '').replace(/\s*\(v\d+\)\s*$/,'') + ' (regenerado ' + new Date().toLocaleDateString('es-ES') + ')');
    customInstructions = prev.custom_instructions || '';
    selectedFiles = Array.isArray(prev.files_used) ? prev.files_used : (typeof prev.files_used === 'string' ? JSON.parse(prev.files_used || '[]') : []);
    targetPersonaId = prev.target_persona_id || '';
    previousReportId = prev.id;
    referenceReportIds = Array.isArray(prev.reference_report_ids) ? prev.reference_report_ids : [];
  } else {
    reportType = document.getElementById('reportTypeSel').value;
    customTitle = document.getElementById('reportTitle').value.trim();
    customInstructions = (document.getElementById('customInstructions').value || '').trim();
    selectedFiles = Array.from(document.querySelectorAll('.file-check:checked')).map(function(el){return el.getAttribute('data-id');});
    var personaSel = document.getElementById('targetPersonaSel');
    targetPersonaId = personaSel ? personaSel.value : '';
    previousReportId = null;

// Detecta si el contenido viene en Markdown y lo convierte a HTML
function ensureHtml(content){
  if(!content) return '';
  // Si ya contiene etiquetas HTML del informe, lo dejamos tal cual
  if(/<div\s+class=["']report-section/i.test(content) || /<h2[\s>]/i.test(content)) {
    return content;
  }
  // Si no, parece Markdown — lo convertimos
  var lines = content.split('\n');
  var html = '';
  var inList = false;
  var listType = '';
  var inSection = false;

  function closeList(){
    if(inList){ html += '</'+listType+'>'; inList = false; }
  }
  function closeSection(){
    if(inSection){ html += '</div>'; inSection = false; }
  }
  function openSection(){
    closeSection();
    html += '<div class="report-section">';
    inSection = true;
  }

  for(var i=0;i<lines.length;i++){
    var line = lines[i];
    // H1 con # → ignoramos (es el título global, ya está fuera)
    var m;
    if((m = line.match(/^#\s+(.+)$/))){
      closeList();
      openSection();
      html += '<h2>' + applyInline(m[1].trim()) + '</h2>';
    } else if((m = line.match(/^##\s+(.+)$/))){
      closeList();
      openSection();
      html += '<h2>' + applyInline(m[1].trim()) + '</h2>';
    } else if((m = line.match(/^###\s+(.+)$/))){
      closeList();
      if(!inSection) openSection();
      html += '<h3>' + applyInline(m[1].trim()) + '</h3>';
    } else if((m = line.match(/^####\s+(.+)$/))){
      closeList();
      if(!inSection) openSection();
      html += '<h3>' + applyInline(m[1].trim()) + '</h3>';
    } else if((m = line.match(/^[\-\*]\s+(.+)$/))){
      if(!inSection) openSection();
      if(!inList || listType !== 'ul'){ closeList(); html += '<ul>'; inList = true; listType = 'ul'; }
      html += '<li>' + applyInline(m[1].trim()) + '</li>';
    } else if((m = line.match(/^\d+\.\s+(.+)$/))){
      if(!inSection) openSection();
      if(!inList || listType !== 'ol'){ closeList(); html += '<ol>'; inList = true; listType = 'ol'; }
      html += '<li>' + applyInline(m[1].trim()) + '</li>';
    } else if(line.trim() === '' || line.trim() === '---'){
      closeList();
    } else {
      closeList();
      if(!inSection) openSection();
      html += '<p>' + applyInline(line.trim()) + '</p>';
    }
  }
  closeList();
  closeSection();
  return html || ('<div class="report-section"><p>' + content + '</p></div>');
}

// Convierte **negrita** e _itálica_ inline
function applyInline(s){
  return s
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/__([^_]+)__/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>');
}

async function loadCalBookings(force){
  if(_calState.loading) return;
  if(_calState.loaded && !force) return;
  _calState.loading = true;
  try {
    // Rango: desde hace 30 días hasta dentro de 180 días
    var from = new Date(); from.setDate(from.getDate()-30);
    var to = new Date(); to.setDate(to.getDate()+180);
    var qs = 'from='+from.toISOString()+'&to='+to.toISOString()+'&includeConverted=1';
    var r = await api('/api/bookings?'+qs);
    _calState.bookings = Array.isArray(r) ? r : [];
    _calState.loaded = true;
  } catch(e){
    console.error(e);
  } finally {
    _calState.loading = false;
  }
}

function renderCalListView(){
  var bookings = _calState.bookings.slice();
  if(bookings.length === 0){
    return '<div style="text-align:center;padding:3rem;color:var(--text3);font-size:13px;background:var(--surface2);border-radius:var(--rmd);">Sin citas todavía. Cuando alguien reserve en tu Cal.com, aparecerá aquí.</div>';
  }

  var now = new Date();
  // Separar futuras y pasadas
  var futuras = bookings.filter(function(b){ return b.starts_at && new Date(b.starts_at) >= now; });
  var pasadas = bookings.filter(function(b){ return b.starts_at && new Date(b.starts_at) < now; }).reverse();

  function renderBookingCard(b){
    var starts = b.starts_at ? new Date(b.starts_at) : null;
    var isPast = starts && starts < now;
    var isCancelled = b.status === 'cancelled';
    var cls = 'cal-booking';
    if(isCancelled) cls += ' cancelled';
    else if(isPast) cls += ' past';
    else if(!b.linked_project_id) cls += ' pending';

    var whenStr = starts ? starts.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : 'Sin fecha';

    var badge = '';
    if(isCancelled) badge = '<span class="cal-booking-badge" style="background:var(--danger);color:white;">Cancelada</span>';
    else if(b.converted) badge = '<span class="cal-booking-badge converted">✓ En proyecto</span>';
    else if(b.linked_project_id) badge = '<span class="cal-booking-badge assigned">Asignada</span>';
    else if(!isPast) badge = '<span class="cal-booking-badge new">⚡ Nueva</span>';

    return '<div class="'+cls+'" onclick="openBookingDetail(\''+b.id+'\')">'+
      '<div class="cal-booking-header">'+
        '<div>'+
          '<div class="cal-booking-title">'+esc(b.title || b.event_type || 'Reserva')+' '+badge+'</div>'+
          '<div class="cal-booking-when">'+esc(whenStr)+(b.duration_min?' · '+b.duration_min+' min':'')+'</div>'+
        '</div>'+
      '</div>'+
      '<div class="cal-booking-body">'+
        '<span class="cal-booking-attendee">👤 '+esc(b.attendee_name || 'sin nombre')+'</span>'+
        (b.attendee_company ? '<span>🏢 '+esc(b.attendee_company)+'</span>' : '')+
        (b.attendee_email ? '<span style="color:var(--text3);">📧 '+esc(b.attendee_email)+'</span>' : '')+
      '</div>'+
      '</div>';
  }

  var html = '';
  if(futuras.length > 0){
    html += '<div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;">Próximas ('+futuras.length+')</div>';
    html += '<div class="cal-bookings-list">' + futuras.map(renderBookingCard).join('') + '</div>';
  }
  if(pasadas.length > 0){
    html += '<div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;margin:1.5rem 0 8px;">Recientes ('+pasadas.length+')</div>';
    html += '<div class="cal-bookings-list">' + pasadas.slice(0, 20).map(renderBookingCard).join('') + '</div>';
  }
  if(futuras.length === 0 && pasadas.length === 0){
    html = '<div style="text-align:center;padding:3rem;color:var(--text3);font-size:13px;background:var(--surface2);border-radius:var(--rmd);">Sin citas todavía.</div>';
  }
  return html;
}

function renderCalMonthView(){
  var cursor = _calState.monthCursor || new Date();
  var year = cursor.getFullYear();
  var month = cursor.getMonth();
  var monthName = cursor.toLocaleDateString('es-ES',{month:'long',year:'numeric'});

  // Primer día visible (lunes anterior o igual al día 1)
  var firstDay = new Date(year, month, 1);
  var offset = (firstDay.getDay() + 6) % 7; // lunes = 0
  var gridStart = new Date(year, month, 1 - offset);
  var days = [];
  for(var i=0; i<42; i++){
    var d = new Date(gridStart.getFullYear(), gridStart.getMonth(), gridStart.getDate()+i);
    days.push(d);
  }

  var today = new Date(); today.setHours(0,0,0,0);

  // Agrupar bookings por día
  var byDate = {};
  _calState.bookings.forEach(function(b){
    if(!b.starts_at) return;
    var d = new Date(b.starts_at);
    var key = d.toISOString().substring(0,10);
    if(!byDate[key]) byDate[key] = [];
    byDate[key].push(b);
  });

  var html = '<div class="cal-mini-calendar">'+
    '<div class="cal-nav">'+
      '<button class="cal-nav-btn" onclick="changeCalMonth(-1)">◀ Anterior</button>'+
      '<div class="cal-nav-title">'+esc(monthName.charAt(0).toUpperCase()+monthName.slice(1))+'</div>'+
      '<button class="cal-nav-btn" onclick="changeCalMonth(1)">Siguiente ▶</button>'+
    '</div>'+
    '<div class="cal-month-grid">'+
      ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map(function(d){return '<div class="cal-month-header">'+d+'</div>';}).join('')+
      days.map(function(d){
        var otherMonth = d.getMonth() !== month;
        var isToday = d.getTime() === today.getTime();
        var key = d.toISOString().substring(0,10);
        var evs = byDate[key] || [];
        var evsHtml = '';
        var maxVisible = 2;
        evs.slice(0, maxVisible).forEach(function(b){
          var time = b.starts_at ? new Date(b.starts_at).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}) : '';
          evsHtml += '<div class="cal-day-event" onclick="event.stopPropagation();openBookingDetail(\''+b.id+'\')" title="'+esc((b.title||'')+' — '+(b.attendee_name||''))+'">'+esc(time)+' '+esc((b.attendee_name||'').substring(0,10))+'</div>';
        });
        if(evs.length > maxVisible){
          evsHtml += '<div class="cal-day-more">+'+(evs.length - maxVisible)+' más</div>';
        }
        return '<div class="cal-day '+(otherMonth?'other-month':'')+' '+(isToday?'today':'')+'">'+
          '<div class="cal-day-num">'+d.getDate()+'</div>'+
          '<div class="cal-day-events">'+evsHtml+'</div>'+
          '</div>';
      }).join('')+
    '</div>'+
    '</div>';
  return html;
}

function changeCalMonth(delta){
  var d = _calState.monthCursor || new Date();
  var newD = new Date(d.getFullYear(), d.getMonth()+delta, 1);
  _calState.monthCursor = newD;
  renderCalContent();
}

async function openBookingDetail(bookingId){
  var booking = _calState.bookings.find(function(b){return b.id === bookingId;});
  if(!booking) return;

  // Cargar consultorías + proyectos activos para poder asignar
  var allConsultancies = [];
  try {
    allConsultancies = await api('/api/consultancies');
  } catch(e){}

  var starts = booking.starts_at ? new Date(booking.starts_at) : null;
  var whenStr = starts ? starts.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}) : 'Sin fecha';
  var form = booking.form_data || {};

  var statusInfo = booking.status === 'cancelled' ? {label:'Cancelada', color:'var(--danger)'} : (booking.converted ? {label:'✓ En proyecto', color:'var(--accent)'} : (booking.linked_project_id ? {label:'Asignada', color:'var(--accent)'} : {label:'⚡ Nueva', color:'#B8860B'}));

  // Mostrar todas las consultorías (con badge de estado). Las de seguimiento aparecen primero.
  var sortedConsultancies = allConsultancies.slice().sort(function(a,b){
    // Follow-up antes que activas
    if((a.status === 'follow_up') && (b.status !== 'follow_up')) return -1;
    if((b.status === 'follow_up') && (a.status !== 'follow_up')) return 1;
    return 0;
  });

  var convertHtml = '';
  if(booking.status !== 'cancelled' && !booking.converted){
    convertHtml = '<div style="background:var(--accent-l);border:1px solid var(--accent);border-radius:var(--rsm);padding:12px;margin-top:1rem;">'+
      '<h3 style="font-size:13px;color:var(--accent);margin:0 0 8px 0;">✨ Convertir en interacción del proyecto</h3>'+
      '<p style="font-size:11px;color:var(--text2);margin-bottom:8px;">Asigna esta cita a un proyecto. Se creará como interacción con todos los datos del formulario.</p>'+
      '<div style="display:flex;gap:6px;flex-wrap:wrap;">'+
        '<select id="bk_consultancy" onchange="updateBkProjectSelect()" style="flex:1;min-width:150px;font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--surface);">'+
          '<option value="">-- Elige consultoría --</option>'+
          sortedConsultancies.map(function(c){
            var label = c.nombre + (c.empresa?' — '+c.empresa:'');
            var badge = c.status === 'follow_up' ? ' [seguimiento]' : ' [activa]';
            return '<option value="'+esc(c.id)+'">'+esc(label + badge)+'</option>';
          }).join('')+
        '</select>'+
        '<select id="bk_project" disabled style="flex:1;min-width:150px;font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--surface);">'+
          '<option value="">-- Proyecto --</option>'+
        '</select>'+
      '</div>'+
      '<p style="font-size:10px;color:var(--text3);margin-top:6px;">💡 Solo verás proyectos si la consultoría tiene alguno. Si no aparecen, tendrás que crearlo primero.</p>'+
      '<div style="text-align:right;margin-top:8px;">'+
        '<button class="btn bsm btnp" onclick="doConvertBooking(\''+booking.id+'\')">✓ Convertir en interacción</button>'+
      '</div>'+
      '</div>';
  }

  showModal('<h2 style="margin-bottom:.25rem;">'+esc(booking.title || 'Reserva')+'</h2>'+
    '<div style="font-size:11px;font-weight:600;color:'+statusInfo.color+';text-transform:uppercase;letter-spacing:1px;margin-bottom:1rem;">'+esc(statusInfo.label)+'</div>'+

    '<div class="detail-pop-row"><strong>Cuándo</strong> <span>'+esc(whenStr)+(booking.duration_min?' · '+booking.duration_min+' min':'')+'</span></div>'+
    '<div class="detail-pop-row"><strong>Participante</strong> <span>'+esc(booking.attendee_name || 'sin nombre')+'</span></div>'+
    (booking.attendee_email ? '<div class="detail-pop-row"><strong>Email</strong> <span style="font-family:monospace;font-size:11px;">'+esc(booking.attendee_email)+'</span></div>' : '')+
    (booking.attendee_company || form.empresa ? '<div class="detail-pop-row"><strong>Empresa</strong> <span>'+esc(booking.attendee_company || form.empresa)+'</span></div>' : '')+
    (booking.event_type ? '<div class="detail-pop-row"><strong>Tipo</strong> <span>'+esc(booking.event_type)+'</span></div>' : '')+

    (form.proyecto_texto || form.motivo || form.telefono || (form.all_fields && Object.keys(form.all_fields).length > 0)
      ? (function(){
          // Extraer campos "extra" (no reconocidos automáticamente) que sí tienen valor
          var extras = [];
          if(form.all_fields){
            Object.keys(form.all_fields).forEach(function(k){
              var v = form.all_fields[k];
              if(!v || !String(v).trim()) return; // vacíos fuera
              var nk = k.toLowerCase().replace(/[\s_\-]/g,'');
              // Excluir los ya reconocidos y mostrados arriba
              if(nk.indexOf('proyect') >= 0 || nk.indexOf('project') >= 0) return;
              if(nk === 'empresa' || nk === 'company' || nk === 'organization' || nk === 'organizacion') return;
              if(nk === 'motivo' || nk === 'reason' || nk === 'motivoreunion') return;
              if(nk === 'telefono' || nk === 'phone' || nk === 'tel') return;
              extras.push({key: k, value: v});
            });
          }
          var hasAnything = form.proyecto_texto || form.motivo || form.telefono || extras.length > 0;
          if(!hasAnything) return '';
          return '<div class="cal-form-data">'+
            '<div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600;">📝 Datos del formulario</div>'+
            (form.proyecto_texto ? '<div class="cal-form-data-row"><strong>Proyecto</strong> <span>'+esc(form.proyecto_texto)+'</span></div>' : '')+
            (form.telefono ? '<div class="cal-form-data-row"><strong>Teléfono</strong> <span>'+esc(form.telefono)+'</span></div>' : '')+
            (form.motivo ? '<div class="cal-form-data-row" style="flex-direction:column;align-items:flex-start;"><strong>Motivo</strong> <span style="margin-top:4px;">'+esc(form.motivo)+'</span></div>' : '')+
            extras.map(function(x){
              return '<div class="cal-form-data-row" style="flex-direction:column;align-items:flex-start;"><strong>'+esc(x.key)+'</strong> <span style="margin-top:2px;">'+esc(String(x.value))+'</span></div>';
            }).join('')+
          '</div>';
        })()
      : '')+

    (booking.meeting_url ? '<div style="margin-top:.75rem;"><a href="'+esc(booking.meeting_url)+'" target="_blank" style="font-size:12px;color:var(--accent);text-decoration:none;">🎥 Abrir enlace de la reunión ↗</a></div>' : '')+

    (booking.converted && booking.linked_project_id ? '<div style="background:var(--surface2);border-radius:var(--rsm);padding:10px 12px;margin-top:1rem;font-size:12px;color:var(--text2);">✓ Ya convertida en interacción del proyecto.</div>' : '')+

    convertHtml+

    '<div class="modal-act">'+
      '<button class="btn" onclick="closeModal()">Cerrar</button>'+
      '<button class="btn btndanger" onclick="deleteBooking(\''+booking.id+'\')" style="margin-right:auto;">🗑 Eliminar</button>'+
      '<button class="btn bsm" style="font-size:11px;color:var(--text3);" onclick="showBookingRaw(\''+booking.id+'\')" title="Ver datos técnicos que envió Cal.com (para diagnóstico)">🔍 Datos raw</button>'+
    '</div>');

  // Cargar proyectos si hay consultoría seleccionada por defecto
  window._bkAllProjects = {}; // cache
}

async function updateBkProjectSelect(){
  var cid = document.getElementById('bk_consultancy').value;
  var sel = document.getElementById('bk_project');
  if(!cid){ sel.innerHTML = '<option value="">-- Proyecto --</option>'; sel.disabled = true; return; }
  try {
    var projs = window._bkAllProjects[cid];
    if(!projs){
      projs = await api('/api/consultancies/'+cid+'/projects');
      window._bkAllProjects[cid] = projs;
    }
    sel.innerHTML = '<option value="">-- Proyecto --</option>'+
      projs.map(function(p){return '<option value="'+esc(p.id)+'">'+esc(p.title)+'</option>';}).join('');
    sel.disabled = false;
  } catch(e){
    sel.innerHTML = '<option value="">Error cargando</option>';
  }
}

async function doConvertBooking(bookingId){
  var pid = document.getElementById('bk_project').value;
  if(!pid){ alert('Elige un proyecto de destino.'); return; }
  try {
    await api('/api/bookings/'+bookingId+'/convert-to-interaction', {method:'POST', body:{projectId: pid}});
    closeModal();
    await loadCalBookings(true);
    renderCalContent();
    // Feedback
    var s = document.createElement('div');
    s.style.cssText = 'position:fixed;bottom:24px;right:24px;background:var(--accent);color:white;padding:12px 18px;border-radius:var(--rsm);box-shadow:0 4px 16px rgba(0,0,0,.16);z-index:9999;font-size:13px;font-weight:600;';
    s.textContent = '✓ Convertida en interacción';
    document.body.appendChild(s);
    setTimeout(function(){ s.remove(); }, 2500);
  } catch(e){
    alert('Error: '+e.message);
  }
}

async function deleteBooking(id){
  if(!confirm('¿Eliminar esta cita del registro? (No cancela la reserva en Cal.com, solo la quita de aquí)')) return;
  try {
    await api('/api/bookings/'+id, {method:'DELETE'});
    closeModal();
    await loadCalBookings(true);
    renderCalContent();
  } catch(e){ alert('Error: '+e.message); }
}

function copyBookingRaw(bookingId){
  var booking = _calState.bookings.find(function(b){return b.id === bookingId;});
  if(!booking) return;
  var txt = JSON.stringify(booking.raw_payload, null, 2);
  navigator.clipboard.writeText(txt).then(function(){
    var s = document.createElement('div');
    s.style.cssText = 'position:fixed;bottom:24px;right:24px;background:var(--accent);color:white;padding:12px 18px;border-radius:var(--rsm);box-shadow:0 4px 16px rgba(0,0,0,.16);z-index:9999;font-size:13px;font-weight:600;';
    s.textContent = '✓ Payload copiado';
    document.body.appendChild(s);
    setTimeout(function(){ s.remove(); }, 2000);
  });
}

      '<thead><tr style="border-bottom:1px solid var(--border);"><th style="text-align:left;padding:8px 6px;font-weight:500;color:var(--text2);">Título</th><th style="text-align:left;padding:8px 6px;font-weight:500;color:var(--text2);">Tipo</th><th style="text-align:left;padding:8px 6px;font-weight:500;color:var(--text2);">Consultoría</th><th style="text-align:left;padding:8px 6px;font-weight:500;color:var(--text2);">Tamaño</th><th style="text-align:left;padding:8px 6px;font-weight:500;color:var(--text2);">Fecha</th></tr></thead><tbody>'+
      list.map(function(r){
        return '<tr style="border-bottom:1px solid var(--border);"><td style="padding:8px 6px;">'+esc(r.title)+'</td><td style="padding:8px 6px;color:var(--text2);">'+(typeLabels[r.report_type]||r.report_type)+'</td><td style="padding:8px 6px;color:var(--text2);">'+esc(r.consultancy_name||'-')+'</td><td style="padding:8px 6px;color:var(--text2);">'+formatSize(r.content_size)+'</td><td style="padding:8px 6px;color:var(--text2);">'+formatDate(r.created_at)+'</td></tr>';
      }).join('')+
      '</tbody></table></div>';
    document.getElementById('adminReports').innerHTML = html;
  } catch(e) {
    document.getElementById('adminReports').innerHTML = '<div class="alert alert-danger">Error: '+e.message+'</div>';
  }
}

function formatDate(d){
  if(!d) return '-';
  var dt = new Date(d);
  return dt.toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'})+' '+dt.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
}

checkAuth();
