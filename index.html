<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consultoría con Propósito</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F5F0;--surface:#FFF;--surface2:#F0EDE6;--border:#E2DDD5;--text:#1A1814;--text2:#6B6560;--text3:#A09A92;--accent:#2D5016;--accent-l:#EAF0E1;--accent2:#1a4a8a;--accent2-l:#E8F0FB;--danger:#C0392B;--danger-l:#FDECEA;--amber:#B8860B;--amber-l:#FEF9E7;--r:12px;--rsm:8px;--sh:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;}
.app{display:flex;min-height:100vh;}
.sidebar{width:255px;background:var(--text);color:#F7F5F0;padding:1.75rem 1.25rem;display:flex;flex-direction:column;gap:1.5rem;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100;}
.main{margin-left:255px;flex:1;padding:2.25rem 2.5rem;max-width:calc(100vw - 255px);}
.logo{font-family:'DM Serif Display',serif;font-size:19px;line-height:1.25;}
.logo em{color:#8FC45A;font-style:normal;}
.slabel{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:#4A5A3A;margin-bottom:6px;}
.ci{padding:7px 10px;border-radius:var(--rsm);cursor:pointer;font-size:13px;color:#C8C4BC;border:1px solid transparent;margin-bottom:3px;display:flex;align-items:center;gap:7px;transition:all .15s;}
.ci:hover{background:rgba(255,255,255,.07);color:#F7F5F0;}
.ci.on{background:rgba(143,196,90,.15);border-color:rgba(143,196,90,.3);color:#8FC45A;}
.ci .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
.ci-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.btn-new-s{width:100%;padding:8px 10px;background:rgba(255,255,255,.07);border:1px dashed rgba(255,255,255,.18);border-radius:var(--rsm);color:#C8C4BC;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:left;transition:all .15s;}
.btn-new-s:hover{background:rgba(255,255,255,.12);color:#F7F5F0;}
.nl{display:flex;flex-direction:column;gap:2px;}
.nl-item{padding:7px 9px;border-radius:var(--rsm);cursor:pointer;font-size:13px;color:#C8C4BC;display:flex;align-items:center;gap:8px;transition:all .15s;}
.nl-item:hover{background:rgba(255,255,255,.07);color:#F7F5F0;}
.nl-item.on{background:rgba(255,255,255,.1);color:#F7F5F0;}
.nl-item svg{width:15px;height:15px;flex-shrink:0;opacity:.75;}
.ph{margin-bottom:1.75rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.ph h1{font-family:'DM Serif Display',serif;font-size:26px;font-weight:400;line-height:1.2;}
.ph p{font-size:13px;color:var(--text2);margin-top:3px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.35rem 1.4rem;margin-bottom:1.1rem;box-shadow:var(--sh);}
.ct{font-family:'DM Serif Display',serif;font-size:17px;font-weight:400;margin-bottom:3px;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:13px;font-weight:500;margin-bottom:5px;}
input[type=text],input[type=password],textarea,select{width:100%;padding:9px 11px;font-size:14px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;line-height:1.5;transition:border-color .15s;}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-l);}
textarea{min-height:78px;resize:vertical;}
input::placeholder,textarea::placeholder{color:var(--text3);}
.stars-row{display:flex;gap:5px;margin-top:4px;}
.star{width:36px;height:36px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--surface);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;}
.star:hover{border-color:var(--accent);color:var(--accent);}
.star.on{background:var(--accent-l);border-color:var(--accent);color:var(--accent);}
.tags-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.tag{padding:4px 11px;border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text2);cursor:pointer;background:var(--surface);transition:all .12s;}
.tag:hover{border-color:var(--accent);color:var(--accent);}
.tag.on{background:var(--accent-l);border-color:var(--accent);color:var(--accent);}
.btn{padding:8px 18px;font-size:13px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--surface);color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{background:var(--surface2);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btnp{background:var(--accent);color:#fff;border-color:var(--accent);}
.btnp:hover{background:#223D0F;}
.btnd{background:var(--accent2-l);color:var(--accent2);border-color:var(--accent2);}
.btndanger{background:var(--danger-l);color:var(--danger);border-color:var(--danger);}
.btndanger:hover{background:var(--danger);color:#fff;}
.bsm{padding:5px 13px;font-size:12px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:.9rem;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem 1.2rem;box-shadow:var(--sh);}
.stat .sl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:5px;}
.stat .sv{font-family:'DM Serif Display',serif;font-size:26px;}
.stat .sd{font-size:12px;color:var(--text2);margin-top:3px;}
.pbar{height:3px;background:var(--surface2);border-radius:2px;margin-bottom:1.75rem;overflow:hidden;}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent),#8FC45A);border-radius:2px;transition:width .4s ease;}
hr{border:none;border-top:1px solid var(--border);margin:1.25rem 0;}
.empty{text-align:center;padding:4rem 2rem;color:var(--text2);}
.empty h2{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;margin-bottom:8px;color:var(--text);}
.alert{padding:11px 14px;border-radius:var(--rsm);font-size:13px;margin-bottom:1rem;display:flex;align-items:flex-start;gap:8px;}
.alert-info{background:var(--accent-l);color:var(--accent);}
.alert-blue{background:var(--accent2-l);color:var(--accent2);}
.alert-amber{background:var(--amber-l);color:var(--amber);}
.alert-danger{background:var(--danger-l);color:var(--danger);}
.modal-ov{position:fixed;inset:0;background:rgba(26,24,20,.5);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(2px);}
.modal{background:var(--surface);border-radius:var(--r);padding:1.75rem;width:90%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal h2{font-family:'DM Serif Display',serif;font-size:21px;font-weight:400;margin-bottom:1rem;}
.modal-act{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;}
.ptabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1.25rem;}
.ptab{padding:6px 13px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--surface);color:var(--text2);cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;transition:all .12s;}
.ptab.on{background:var(--text);color:#fff;border-color:var(--text);}
.avatar{width:22px;height:22px;border-radius:50%;background:var(--accent-l);color:var(--accent);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;}
.ptab.on .avatar{background:rgba(255,255,255,.2);color:#fff;}
.st{font-family:'DM Serif Display',serif;font-size:14px;color:var(--text2);margin:1.1rem 0 .75rem;display:flex;align-items:center;gap:8px;}
.st::after{content:'';flex:1;height:1px;background:var(--border);}
.file-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--rsm);margin-bottom:6px;background:var(--surface);font-size:13px;}
.file-item .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.file-item .fsize{color:var(--text3);font-size:11px;}
.file-ext{width:30px;height:30px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--text2);text-transform:uppercase;}
.drop-zone{border:2px dashed var(--border);border-radius:var(--r);padding:2rem;text-align:center;cursor:pointer;background:var(--surface);transition:all .15s;}
.drop-zone:hover,.drop-zone.drag{border-color:var(--accent);background:var(--accent-l);}
.drop-zone p{font-size:13px;color:var(--text2);margin-top:6px;}
.dots{display:inline-flex;gap:4px;align-items:center;}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:bk 1.2s infinite ease-in-out;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes bk{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.report-section{margin-bottom:1.75rem;}
.report-section h2{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:.65rem;padding-bottom:.5rem;border-bottom:2px solid var(--accent-l);}
.report-section h3{font-size:14px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin:1rem 0 .4rem;}
.report-section p{font-size:14px;line-height:1.85;margin-bottom:.65rem;}
.report-section ul{padding-left:1.2rem;}
.report-section ul li{font-size:14px;margin-bottom:3px;}
.sync-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;}
.sync-ok{background:var(--accent-l);color:var(--accent);}
.sync-saving{background:var(--amber-l);color:var(--amber);}
.sync-err{background:var(--danger-l);color:var(--danger);}
.mh{display:none;background:var(--text);color:#F7F5F0;padding:.9rem 1.25rem;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:150;}
.hbg{background:none;border:none;color:#F7F5F0;cursor:pointer;font-size:22px;}
.sov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.login-card{background:var(--surface);border-radius:var(--r);padding:2.5rem;max-width:400px;width:100%;box-shadow:var(--sh);}
.login-card h1{font-family:'DM Serif Display',serif;font-size:28px;margin-bottom:.5rem;}
.login-card p{color:var(--text2);font-size:14px;margin-bottom:1.5rem;}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .25s;}
  .sidebar.open{transform:translateX(0);}
  .sov.open{display:block;}
  .main{margin-left:0;max-width:100vw;padding:1.1rem;}
  .mh{display:flex;}
  .g2,.g3{grid-template-columns:1fr;}
  .ph{flex-direction:column;}
}
@media print{
  .sidebar,.mh,.btn,.no-print,input,textarea,.drop-zone,.ptabs,.nl,.pbar{display:none!important;}
  .main{margin-left:0;padding:0;}
  .card{box-shadow:none;break-inside:avoid;}
}
</style>
</head>
<body>

<div id="loginView" style="display:none;">
  <div class="login-wrap">
    <div class="login-card">
      <h1>Consultoría con Propósito</h1>
      <p>Introduce la contraseña para acceder a tu espacio de trabajo.</p>
      <div class="field">
        <input type="password" id="passInput" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn btnp" style="width:100%;justify-content:center;" onclick="doLogin()">Entrar</button>
      <div id="loginErr" style="color:var(--danger);font-size:13px;margin-top:1rem;text-align:center;display:none;">Contraseña incorrecta</div>
    </div>
  </div>
</div>

<div id="appView" style="display:none;">
<div class="mh">
  <button class="hbg" onclick="toggleSidebar()">☰</button>
  <span style="font-family:'DM Serif Display',serif;font-size:16px;">Consultoría</span>
  <span></span>
</div>
<div class="sov" id="sov" onclick="toggleSidebar()"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="logo">Consultoría<br><em>con Propósito</em></div>
    <div>
      <div class="slabel">Consultorías</div>
      <div id="clist"></div>
      <button class="btn-new-s" onclick="showNewModal()">+ Nueva consultoría</button>
    </div>
    <div style="margin-top:auto;">
      <div id="syncStatus"></div>
      <div class="nl" id="navLinks" style="margin-top:1rem;"></div>
    </div>
  </aside>
  <main class="main"><div id="appContent"></div></main>
</div>
</div>

<div class="modal-ov" id="modalOv" style="display:none;">
  <div class="modal" id="modalBox"></div>
</div>

<script>
// ── AUTH ──
var PWD = sessionStorage.getItem('cwp_pwd') || '';

async function doLogin() {
  var v = document.getElementById('passInput').value;
  try {
    var r = await fetch('/check-auth', { headers: { 'x-app-password': v } });
    var d = await r.json();
    if (d.ok) {
      PWD = v;
      sessionStorage.setItem('cwp_pwd', v);
      showApp();
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  } catch (e) {
    document.getElementById('loginErr').textContent = 'Error de conexión';
    document.getElementById('loginErr').style.display = 'block';
  }
}

function showApp() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('appView').style.display = 'block';
  loadConsultancies();
}

async function checkAuth() {
  if (!PWD) {
    document.getElementById('loginView').style.display = 'block';
    return false;
  }
  try {
    var r = await fetch('/check-auth', { headers: { 'x-app-password': PWD } });
    var d = await r.json();
    if (d.ok) { showApp(); return true; }
    sessionStorage.removeItem('cwp_pwd');
    document.getElementById('loginView').style.display = 'block';
    return false;
  } catch (e) {
    document.getElementById('loginView').style.display = 'block';
    return false;
  }
}

// ── API ──
async function api(path, opts) {
  opts = opts || {};
  opts.headers = opts.headers || {};
  opts.headers['x-app-password'] = PWD;
  if (opts.body && typeof opts.body === 'object') {
    opts.body = JSON.stringify(opts.body);
    opts.headers['Content-Type'] = 'application/json';
  }
  var r = await fetch(path, opts);
  if (!r.ok) {
    var err = await r.json().catch(() => ({ error: 'Error' }));
    throw new Error(err.error || 'Error ' + r.status);
  }
  return r.json();
}

// ── STATE ──
var S = {
  list: [],
  active: null,
  current: null,
  page: 'dashboard',
  persona: null,
  reportLoading: false,
  syncStatus: 'ok',
  saveTimer: null
};

function setSync(s) {
  S.syncStatus = s;
  var el = document.getElementById('syncStatus');
  if (!el) return;
  var labels = { ok: '✓ Sincronizado', saving: '⟳ Guardando...', err: '✗ Error al guardar' };
  var classes = { ok: 'sync-ok', saving: 'sync-saving', err: 'sync-err' };
  el.innerHTML = '<span class="sync-badge ' + classes[s] + '">' + labels[s] + '</span>';
}

async function loadConsultancies() {
  try {
    S.list = await api('/api/consultancies');
    if (S.list.length > 0 && !S.active) {
      await selectC(S.list[0].id);
    }
    renderSidebar();
    if (!S.current) renderContent();
  } catch (e) {
    alert('Error cargando datos: ' + e.message);
  }
}

async function selectC(id) {
  S.active = id;
  S.page = 'dashboard';
  S.persona = null;
  try {
    S.current = await api('/api/consultancies/' + id);
    if (!S.current.data) S.current.data = {};
    if (!S.current.data.contexto) S.current.data.contexto = {};
    if (!S.current.data.estructura) S.current.data.estructura = {};
    if (!Array.isArray(S.current.data.entrevistas)) S.current.data.entrevistas = [];
    if (!S.current.data.procesos) S.current.data.procesos = {};
    if (!S.current.data.herramientas) S.current.data.herramientas = {};
    if (!S.current.data.sintesis) S.current.data.sintesis = {};
    if (!Array.isArray(S.current.archivos)) S.current.archivos = [];
    renderSidebar();
    renderContent();
    if (window.innerWidth < 768) toggleSidebar();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

function debouncedSave() {
  setSync('saving');
  if (S.saveTimer) clearTimeout(S.saveTimer);
  S.saveTimer = setTimeout(saveCurrent, 800);
}

async function saveCurrent() {
  if (!S.current) return;
  try {
    await api('/api/consultancies/' + S.current.id, { method: 'PUT', body: S.current });
    setSync('ok');
  } catch (e) {
    setSync('err');
  }
}

// ── NAV ──
var NAV=[
  {id:'dashboard',label:'Vista general',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>'},
  {id:'contexto',label:'Contexto previo',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>'},
  {id:'estructura',label:'Estructura',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7h18M3 12h18M3 17h18"/></svg>'},
  {id:'entrevistas',label:'Entrevistas',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>'},
  {id:'procesos',label:'Procesos',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>'},
  {id:'herramientas',label:'Herramientas',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>'},
  {id:'archivos',label:'Archivos',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>'},
  {id:'sintesis',label:'Síntesis',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"/><path d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"/></svg>'},
  {id:'informe',label:'Informe final',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>'}
];

function nav(p){S.page=p;renderSidebar();renderContent();if(window.innerWidth<768)toggleSidebar();}

function renderSidebar(){
  var cl=document.getElementById('clist');
  if(cl) cl.innerHTML=S.list.length===0
    ?'<div style="font-size:12px;color:#4A5040;padding:4px 0;">Sin consultorías aún</div>'
    :S.list.map(function(c){

async function createC(){
  var emp=document.getElementById('m_emp').value.trim();

  var dep=document.getElementById('m_dep').value.trim();
  var c={
    id:'c_'+Date.now(),
    nombre:emp+(dep?' — '+dep:''),

function fInput(sid,id,label,ph,val){return '<div class="field"><label>'+label+'</label><input type="text" value="'+esc(val||'')+'" placeholder="'+esc(ph||'')+'" oninput="setD(\''+sid+'\',\''+id+'\',this.value)" /></div>';}
function fTA(sid,id,label,ph,val){return '<div class="field"><label>'+label+'</label><textarea placeholder="'+esc(ph||'')+'" oninput="setD(\''+sid+'\',\''+id+'\',this.value)">'+esc(val||'')+'</textarea></div>';}
function fStars(sid,id,label,val){var v=val||0;var h='<div class="field"><label>'+label+'</label><div class="stars-row">';for(var n=1;n<=5;n++)h+='<button class="star '+(v==n?'on':'')+'" onclick="setD(\''+sid+'\',\''+id+'\','+n+');renderContent()">'+n+'</button>';return h+'</div></div>';}
function fTags(sid,id,label,opts,val){var v=val||[];var h='<div class="field"><label>'+label+'</label><div class="tags-row">';opts.forEach(function(o){h+='<span class="tag '+(v.indexOf(o)>-1?'on':'')+'" onclick="toggleTag(\''+sid+'\',\''+id+'\',\''+o+'\')">'+o+'</span>';});return h+'</div></div>';}

function setD(sec,key,val){if(!S.current)return;if(!S.current.data[sec])S.current.data[sec]={};S.current.data[sec][key]=val;debouncedSave();}
function toggleTag(sec,key,opt){if(!S.current)return;if(!S.current.data[sec])S.current.data[sec]={};var arr=S.current.data[sec][key]?S.current.data[sec][key].slice():[];var i=arr.indexOf(opt);if(i>-1)arr.splice(i,1);else arr.push(opt);S.current.data[sec][key]=arr;debouncedSave();renderContent();}

// ── PROGRESS ──
function hasData(c,s){
  if(s==='entrevistas')return c.data.entrevistas&&c.data.entrevistas.length>0;
  if(s==='archivos')return(c.archivos||[]).length>0;
  var d=(c.data&&c.data[s])||{};
  return Object.keys(d).some(function(k){var v=d[k];return v&&(Array.isArray(v)?v.length>0:String(v).trim()!='');});
}
function calcProg(c){var secs=['contexto','estructura','entrevistas','procesos','herramientas','sintesis'];return Math.round((secs.filter(function(s){return hasData(c,s);}).length/secs.length)*100);}

// ── RENDER ──
function renderContent(){
  var el=document.getElementById('appContent');
  if(!el)return;
  if(!S.current){
    el.innerHTML='<div class="empty"><h2>Bienvenida, Eva María</h2><p>Crea tu primera consultoría para empezar.</p><button class="btn btnp" onclick="showNewModal()">+ Nueva consultoría</button></div>';
    return;
  }
  switch(S.page){
    case 'dashboard':renderDash(el);break;
    case 'contexto':renderContexto(el);break;
    case 'estructura':renderEstructura(el);break;
    case 'entrevistas':renderEntrevistas(el);break;
    case 'procesos':renderProcesos(el);break;
    case 'herramientas':renderHerramientas(el);break;
    case 'archivos':renderArchivos(el);break;
    case 'sintesis':renderSintesis(el);break;
    case 'informe':renderInforme(el);break;
    default:renderDash(el);
  }
}

function formatSize(b){if(!b)return'';if(b<1024)return b+'B';if(b<1048576)return Math.round(b/1024)+'KB';return(b/1048576).toFixed(1)+'MB';}

function handleDrop(e){e.preventDefault();handleFiles(e.dataTransfer.files);}

async function handleFiles(files){
  if(!files||files.length===0)return;
  var us=document.getElementById('uploadStatus');
  for(var i=0;i<files.length;i++){
    var f=files[i];
    if(us)us.innerHTML='<div class="alert alert-blue" style="margin-top:1rem;"><div class="dots"><span></span><span></span><span></span></div> Subiendo '+esc(f.name)+'...</div>';
    try {
      var b64=await fileToBase64(f);
      var fid='f_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
      await api('/api/consultancies/'+S.current.id+'/files',{method:'POST',body:{id:fid,name:f.name,mimeType:f.type,size:f.size,base64:b64}});
      S.current.archivos.push({id:fid,name:f.name,mimeType:f.type,size:f.size});
      await api('/api/consultancies/'+S.current.id,{method:'PUT',body:S.current});
    } catch(e){alert('Error subiendo '+f.name+': '+e.message);}
  }
  if(us)us.innerHTML='';
  renderContent();
}

function fileToBase64(file){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(e){res(e.target.result.split(',')[1]);};r.onerror=rej;r.readAsDataURL(file);});}

async function delArchivo(fid){
  if(!confirm('¿Eliminar este archivo?'))return;
  try {
    await api('/api/files/'+fid,{method:'DELETE'});
    S.current.archivos=(S.current.archivos||[]).filter(function(f){return f.id!==fid;});
    await api('/api/consultancies/'+S.current.id,{method:'PUT',body:S.current});
    renderContent();
  } catch(e){alert('Error: '+e.message);}
}

function renderSintesis(el){
  var d=S.current.data.sintesis||{};
  el.innerHTML='<div class="ph"><div><h1>Síntesis y cierre</h1><p>Valoración global antes del informe</p></div></div>'+
    '<div class="card"><div class="ct">Valoración global</div>'+
    fTA('sintesis','impresion','Impresión general (en caliente)','Escribe libremente...',d.impresion)+
    fTA('sintesis','fortalezas','Fortalezas detectadas','Ej: Equipo con mucha experiencia...',d.fortalezas)+
    fTA('sintesis','urgente','¿Qué es lo más urgente de resolver?','Ej: Falta de proceso de onboarding...',d.urgente)+
    fTA('sintesis','resistencias','Resistencias al cambio detectadas','Ej: El responsable parece reticente...',d.resistencias)+
    '</div>'+
    '<div class="card"><div class="ct">Clasificación y prioridades</div>'+
    fStars('sintesis','nivel_disfuncion','Nivel de disfunción global (1=leve / 5=crítico)',d.nivel_disfuncion)+
    fTags('sintesis','areas_mejora','Áreas prioritarias de mejora',['Definición de roles','Documentación de procesos','Formación','Tecnología/herramientas','Comunicación interna','Liderazgo','Clima y cultura','Gestión de datos','Coordinación interdepartamental','Gestión del tiempo'],d.areas_mejora)+
    fTA('sintesis','quick_wins','Quick wins (mejoras rápidas, 0-30 días)','Ej: Bandeja compartida, reunión semanal...',d.quick_wins)+
    fTA('sintesis','cambios','Cambios estructurales necesarios','Ej: Nuevo organigrama, software RRHH, manual...',d.cambios)+
    '</div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;"><button class="btn btnp" onclick="nav(\'informe\')">Generar informe →</button></div>';
}

function renderInforme(el){
  if(S.reportLoading){
    el.innerHTML='<div class="ph"><div><h1>Generando informe...</h1></div></div><div class="card" style="text-align:center;padding:3rem;"><div class="dots"><span></span><span></span><span></span></div><p style="margin-top:1rem;color:var(--text2);font-size:14px;">Analizando todos los datos y elaborando el diagnóstico...</p></div>';
    return;
  }
  if(S.current.report){
    el.innerHTML='<div class="ph"><div><h1>Informe de diagnóstico</h1><p>'+esc(S.current.nombre)+(S.current.fecha?' · '+esc(S.current.fecha):'')+'</p></div><div class="no-print" style="display:flex;gap:7px;flex-wrap:wrap;"><button class="btn btnp bsm" onclick="window.print()">Imprimir / PDF</button><button class="btn bsm" onclick="S.current.report=null;saveCurrent();renderContent()">Regenerar</button></div></div><div id="reportContent">'+S.current.report+'</div>';
    return;
  }
  el.innerHTML='<div class="ph"><div><h1>Informe final</h1><p>Genera el diagnóstico con todos los datos recogidos</p></div></div>'+
    (!hasData(S.current,'contexto')&&!hasData(S.current,'entrevistas')?'<div class="alert alert-amber">Rellena al menos algunas secciones antes de generar el informe.</div>':'')+
    '<div class="card"><div class="ct">Listo para generar</div><p style="font-size:14px;color:var(--text2);margin-bottom:1.25rem;">El informe incluirá resumen ejecutivo, análisis por área, diagnóstico de disfunciones, fortalezas y recomendaciones priorizadas.</p><button class="btn btnp" onclick="generateReport()">Generar informe →</button></div>';
}

function buildSummary(c){
  var d=c.data;var o='=== CONSULTORÍA: '+c.nombre+' ===\nEmpresa: '+(c.empresa||'')+'\nDepartamento: '+(c.depto||'')+'\nFecha: '+(c.fecha||'')+'\nConsultora: '+(c.consultora||'')+'\n\n';
  o+='--- CONTEXTO ---\n';['empresa','depto','personas','problema','objetivo','docs'].forEach(function(k){if(d.contexto&&d.contexto[k])o+=k+': '+d.contexto[k]+'\n';});
  if(d.contexto&&d.contexto.software)o+='Software: '+d.contexto.software.join(', ')+'\n';
  o+='\n--- ESTRUCTURA ---\n';['organigrama','roles','reporte','expectativas'].forEach(function(k){if(d.estructura&&d.estructura[k])o+=k+': '+d.estructura[k]+'\n';});
  if(d.estructura&&d.estructura.clima)o+='Clima inicial (1-5): '+d.estructura.clima+'\n';
  o+='\n--- ENTREVISTAS ---\n';(d.entrevistas||[]).forEach(function(p){o+='\nPersona: '+p.nombre+(p.cargo?' ('+p.cargo+')':'')+(p.antiguedad?', antig: '+p.antiguedad:'')+'\n';var r=p.resp||{};['trabajo','info_llega','frustracion','informal','mejora','obs'].forEach(function(k){if(r[k])o+=k+': '+r[k]+'\n';});if(r.actitud)o+='Actitud cambio (1-5): '+r.actitud+'\n';if(r.senales&&r.senales.length)o+='Señales: '+r.senales.join(', ')+'\n';});
  o+='\n--- PROCESOS ---\n';['procesos_principales','cuellos','duplicidades','manual','flujo_real'].forEach(function(k){if(d.procesos&&d.procesos[k])o+=k+': '+d.procesos[k]+'\n';});
  if(d.procesos&&d.procesos.documentado)o+='Documentación (1-5): '+d.procesos.documentado+'\n';
  if(d.procesos&&d.procesos.tipos_disfuncion&&d.procesos.tipos_disfuncion.length)o+='Disfunciones: '+d.procesos.tipos_disfuncion.join(', ')+'\n';
  o+='\n--- HERRAMIENTAS ---\n';['software_real','duplicidad','procedimientos','formacion'].forEach(function(k){if(d.herramientas&&d.herramientas[k])o+=k+': '+d.herramientas[k]+'\n';});
  if(d.herramientas&&d.herramientas.calidad_datos)o+='Calidad datos (1-5): '+d.herramientas.calidad_datos+'\n';
  if(d.herramientas&&d.herramientas.problemas&&d.herramientas.problemas.length)o+='Problemas: '+d.herramientas.problemas.join(', ')+'\n';
  o+='\n--- SÍNTESIS ---\n';['impresion','fortalezas','urgente','resistencias','quick_wins','cambios'].forEach(function(k){if(d.sintesis&&d.sintesis[k])o+=k+': '+d.sintesis[k]+'\n';});
  if(d.sintesis&&d.sintesis.nivel_disfuncion)o+='Nivel disfunción (1-5): '+d.sintesis.nivel_disfuncion+'\n';
  if(d.sintesis&&d.sintesis.areas_mejora&&d.sintesis.areas_mejora.length)o+='Áreas mejora: '+d.sintesis.areas_mejora.join(', ')+'\n';
  o+='\n--- ARCHIVOS ---\n'+(c.archivos||[]).map(function(f){return '- '+f.name;}).join('\n');
  return o;
}

async function generateReport(){
  S.reportLoading=true;renderContent();
  var summary=buildSummary(S.current);
  var prompt='Eres una consultora de procesos organizacionales con amplia experiencia. Basándote en los siguientes datos de campo recogidos en una consultoría real, genera un informe de diagnóstico organizacional completo, profesional, creativo y muy personalizado.\n\n'+summary+'\n\nEl informe debe estar en HTML (solo el contenido, sin DOCTYPE ni html/head/body) con estas secciones usando clases CSS report-section:\n1. Resumen ejecutivo (directo, con cifras si las hay)\n2. Análisis por área: Estructura y roles / Procesos / Personas y cultura / Herramientas y datos\n3. Diagnóstico de disfunciones (problemas reales con impacto)\n4. Fortalezas detectadas\n5. Recomendaciones priorizadas: Quick wins (0-30 días) / Medio plazo (1-3 meses) / Cambios estructurales (3-12 meses)\n6. Conclusión\n\nTono: profesional, directo, honesto y empático. Nada de lenguaje corporativo vacío. Sé muy específico usando los datos reales. Usa los nombres reales de las personas cuando aporte valor. El informe debe sentirse escrito para ESTA organización concreta.';
  try {
    var data=await api('/api/generate-report',{method:'POST',body:{prompt:prompt}});
    S.current.report=data.report;
    await saveCurrent();
  } catch(e){S.current.report='<div class="report-section"><h2>Error</h2><p>'+e.message+'</p></div>';}
  S.reportLoading=false;renderContent();
}

function delConsultConfirm(){
  showModal('<h2>¿Eliminar consultoría?</h2><p style="color:var(--text2);font-size:14px;margin-bottom:1.5rem;">Se borrarán todos los datos y archivos. Esta acción no se puede deshacer.</p><div class="modal-act"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btndanger" onclick="doDelConsult()">Sí, eliminar</button></div>');
}

async function doDelConsult(){
  try {
    await api('/api/consultancies/'+S.current.id,{method:'DELETE'});
    closeModal();
    S.current=null;S.active=null;
    await loadConsultancies();
    renderContent();
  } catch(e){alert('Error: '+e.message);}
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sov').classList.toggle('open');
}

checkAuth();
