function renderMentionsReceived(targetId){
  var hits = findMentionsOf(targetId);
  if(hits.length === 0) return '';
  // Extraer fragmento alrededor de la primera menciГіn a esta persona
  function fragment(text){
    var matches = findMentionMatchesInText(text);
    var m = matches.find(function(x){return x.personaId === targetId;});
    if(!m) return text.length > 200 ? text.substring(0,200)+'вҖҰ' : text;
    var start = Math.max(0, m.start - 80);
    var end = Math.min(text.length, m.end + 80);
    var prefix = start > 0 ? 'вҖҰ' : '';
    var suffix = end < text.length ? 'вҖҰ' : '';
    return prefix + text.substring(start, end) + suffix;
  }
  return '<div class="mentions-section">'+
    '<h3>рҹ“Ң CГіmo le ven sus compaГұeros <span style="font-weight:400;color:var(--text3);">('+hits.length+' '+(hits.length===1?'menciГіn':'menciones')+')</span></h3>'+
    hits.map(function(h){
      var when = h.when ? ' В· '+formatSessionDate(h.when) : '';
      var frag = fragment(h.text);
      return '<div class="mention-item">'+
        '<div class="mention-item-from">'+esc(h.sourceLabel)+when+'</div>'+
        '<div class="mention-item-text">В«'+renderMentions(frag)+'В»</div>'+
        '</div>';
    }).join('')+
    '</div>';
}

var descTimers = {};
function updateFileDescription(fid, desc){
  // Actualizar en estado local
  var f = S.current.archivos.find(function(x){return x.id===fid;});
  if(f) f.description = desc;
  // Guardar en servidor con debounce
  if(descTimers[fid]) clearTimeout(descTimers[fid]);
  setSync('saving');
  descTimers[fid] = setTimeout(async function(){
    try {
      await api('/api/files/'+fid+'/description', {method:'PUT', body:{description: desc}});
      await saveCurrent();
      setSync('ok');
    } catch(e){setSync('err');}
  }, 800);
}

function formatSize(b){if(!b)return'';if(b<1024)return b+'B';if(b<1048576)return Math.round(b/1024)+'KB';return(b/1048576).toFixed(1)+'MB';}

function handleDrop(e){e.preventDefault();handleFiles(e.dataTransfer.files);}

async function handleFiles(files, linkContext){
  if(!files||files.length===0)return;
  linkContext = linkContext || {};
  var us=document.getElementById('uploadStatus');
  for(var i=0;i<files.length;i++){
    var f=files[i];
    if(us)us.innerHTML='<div class="alert alert-blue" style="margin-top:1rem;"><div class="dots"><span></span><span></span><span></span></div> Subiendo '+esc(f.name)+'...</div>';
    try {
      var b64=await fileToBase64(f);
      var fid='f_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
      await api('/api/consultancies/'+S.current.id+'/files',{method:'POST',body:{
        id:fid, name:f.name, mimeType:f.type, size:f.size, base64:b64,
        linkedProjectId: linkContext.projectId || null,
        linkedTaskId: linkContext.taskId || null,
        linkedInteractionId: linkContext.interactionId || null
      }});
      S.current.archivos.push({
        id:fid, name:f.name, mimeType:f.type, size:f.size,
        linked_project_id: linkContext.projectId || null,
        linked_task_id: linkContext.taskId || null,
        linked_interaction_id: linkContext.interactionId || null
      });
      await api('/api/consultancies/'+S.current.id,{method:'PUT',body:S.current});
    } catch(e){alert('Error subiendo '+f.name+': '+e.message);}
  }
  if(us)us.innerHTML='';
  renderContent();
}

function pickAndUploadForProject(projectId, taskId, interactionId){
  var input = document.createElement('input');
  input.type = 'file';
  input.multiple = true;
  input.onchange = async function(){
    if(!input.files || input.files.length === 0) return;
    // Mostrar indicador simple
    var oldStatus = document.getElementById('uploadStatus');
    if(!oldStatus){
      var tmp = document.createElement('div');
      tmp.id = 'uploadStatus';
      tmp.style.position = 'fixed';
      tmp.style.bottom = '20px';
      tmp.style.right = '20px';
      tmp.style.zIndex = '9999';
      tmp.style.background = 'var(--surface)';
      tmp.style.border = '1px solid var(--border)';
      tmp.style.borderRadius = 'var(--rsm)';
      tmp.style.padding = '10px 14px';
      tmp.style.boxShadow = '0 4px 16px rgba(0,0,0,.12)';
      document.body.appendChild(tmp);
    }
    await handleFiles(input.files, {projectId: projectId, taskId: taskId || null, interactionId: interactionId || null});
    // Recargar archivos y re-render de proyectos
    try {
      var freshFiles = await api('/api/consultancies/'+S.current.id+'/files');
      S.current.archivos = freshFiles;
    } catch(e){}
    var status = document.getElementById('uploadStatus');
    if(status && status.parentElement === document.body) status.remove();
    // Si estamos en la vista de proyectos, refrescar
    if(S.page === 'proyectos'){
      renderProjectsList(getPersonas());
    }
  };
  input.click();
}

function fileToBase64(file){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(e){res(e.target.result.split(',')[1]);};r.onerror=rej;r.readAsDataURL(file);});}

async function delArchivo(fid){
  if(!confirm('ВҝEliminar este archivo?'))return;
  try {
    await api('/api/files/'+fid,{method:'DELETE'});
    S.current.archivos=(S.current.archivos||[]).filter(function(f){return f.id!==fid;});
    await api('/api/consultancies/'+S.current.id,{method:'PUT',body:S.current});
    renderContent();
  } catch(e){alert('Error: '+e.message);}
}

async function viewFile(fid, fname){
  try {
    var r = await fetch('/api/files/'+fid+'/download', { headers: { 'x-app-password': PWD } });
    if(!r.ok) throw new Error('No se pudo descargar');
    var blob = await r.blob();
    var url = URL.createObjectURL(blob);
    var w = window.open(url, '_blank');
    if(!w){
      var a = document.createElement('a');
      a.href = url; a.download = fname; document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }
    setTimeout(function(){URL.revokeObjectURL(url);}, 60000);
  } catch(e){alert('Error al abrir el archivo: '+e.message);}
}

function renderFileSelector(){
  var archivos = S.current.archivos || [];
  if(archivos.length === 0){
    return '<div class="alert alert-blue" style="font-size:12px;">No hay archivos adjuntos en esta consultorГӯa. El informe se generarГЎ solo con los datos del formulario.</div>';
  }
  return '<div class="field"><label>Archivos a incluir <span style="color:var(--text3);font-weight:400;">(marca los que quieres que Claude tenga en cuenta)</span></label>'+
    '<div style="display:flex;gap:6px;margin-bottom:8px;"><button class="btn bsm" onclick="toggleAllFiles(true)">Seleccionar todos</button><button class="btn bsm" onclick="toggleAllFiles(false)">Ninguno</button></div>'+
    '<div style="display:flex;flex-direction:column;gap:5px;border:1px solid var(--border);border-radius:var(--rsm);padding:8px;max-height:240px;overflow-y:auto;">'+
    archivos.map(function(f){
      var ext=(f.name||'').split('.').pop().substring(0,4).toUpperCase();
      var isSupported = isExtractable(f);
      var desc = f.description ? '<div style="font-size:11px;color:var(--text2);margin-top:2px;font-style:italic;">рҹ“қ '+esc(f.description)+'</div>' : '<div style="font-size:11px;color:var(--text3);margin-top:2px;font-style:italic;">Sin descripciГіn</div>';
      return '<label style="display:flex;align-items:flex-start;gap:8px;padding:6px;cursor:'+(isSupported?'pointer':'not-allowed')+';opacity:'+(isSupported?'1':'0.5')+';border-bottom:1px solid var(--border);">'+
        '<input type="checkbox" class="file-check" data-id="'+f.id+'" '+(isSupported?'checked':'disabled')+' style="width:16px;height:16px;margin-top:6px;cursor:'+(isSupported?'pointer':'not-allowed')+';" />'+
        '<div class="file-ext" style="width:26px;height:26px;font-size:8px;margin-top:2px;">'+esc(ext)+'</div>'+
        '<div style="flex:1;min-width:0;">'+
          '<div style="font-size:13px;display:flex;align-items:center;gap:8px;"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(f.name)+'</span><span style="font-size:11px;color:'+(isSupported?'var(--accent)':'var(--text3)')+';white-space:nowrap;">'+(isSupported?'вң“ legible':'no procesable')+'</span></div>'+
          desc+
        '</div>'+
        '</label>';
    }).join('')+
    '</div></div>';
}

function isExtractable(f){
  if(!f.mimeType && !f.name) return false;
  var name = (f.name||'').toLowerCase();
  var mt = f.mimeType || '';
  if(mt === 'application/pdf' || name.endsWith('.pdf')) return true;
  if(mt.includes('wordprocessingml') || name.endsWith('.docx')) return true;
  if(mt.startsWith('text/') || name.endsWith('.txt') || name.endsWith('.md') || name.endsWith('.csv')) return true;
  if(['image/jpeg','image/png','image/gif','image/webp'].includes(mt)) return true;
  return false;
}

  document.querySelectorAll('.file-check:not(:disabled)').forEach(function(el){ el.checked = check; });
}

function doRegenerate(){
  if(!S.activeReport) return;
  var newType = document.getElementById('rg_type').value;
  var newTitle = document.getElementById('rg_title').value.trim();
  var newInstructions = document.getElementById('rg_instructions').value.trim();
  var personaSel = document.getElementById('rg_persona');
  var newPersonaId = personaSel ? personaSel.value : '';
  var newFiles = Array.from(document.querySelectorAll('.rg-file-check:checked')).map(function(el){return el.getAttribute('data-id');});
  var newRefs = Array.from(document.querySelectorAll('.rg-ref-check:checked')).map(function(el){return el.getAttribute('data-id');});

  if(newType === 'personalizado' && !newInstructions){
    alert('Para un informe personalizado necesito que escribas las instrucciones.');
    return;
  }
  if(newType === 'informe_individual' && !newPersonaId){
    alert('Para un informe individual selecciona la persona del equipo.');
    return;
  }

  closeModal();
  var finalTitle = newTitle || (S.activeReport.title || '').replace(/\s*\(regenerado[^)]*\)\s*$/,'') + ' (regenerado ' + new Date().toLocaleDateString('es-ES') + ')';
  generateReport({
    regenerateFrom: {
      id: S.activeReport.id,
      report_type: newType,
      title: finalTitle,
      custom_instructions: newInstructions,
      files_used: newFiles,
      target_persona_id: newPersonaId,
      reference_report_ids: newRefs
    }
  });
}

// Detecta cambios en los datos posteriores a la creaciГіn del informe
function getFreshnessChanges(){
  if(!S.activeReport || !S.activeReport.created_at || !S.current) return null;
  var reportDate = new Date(S.activeReport.created_at).getTime();
  if(isNaN(reportDate)) return null;
  var changes = { newSessions: 0, newFiles: 0, hasUpdates: false };

  // Sesiones nuevas
  (S.current.data.entrevistas||[]).forEach(function(p){
    (p.sesiones||[]).forEach(function(s){
      // Sesiones: comparamos fecha registrada (puede ser anterior a la creaciГіn si es retroactiva)
      // Mejor: comparamos por el ID que incluye timestamp
      var sid = s.id || '';
      var match = sid.match(/s_(\d+)/);
      if(match){
        var sTime = parseInt(match[1]);
        if(sTime > reportDate) changes.newSessions++;
      }
    });
  });

  // Archivos nuevos (comparamos por ID que incluye timestamp)
  (S.current.archivos||[]).forEach(function(f){
    var fid = f.id || '';
    var match = fid.match(/f_(\d+)/);
    if(match){
      var fTime = parseInt(match[1]);
      if(fTime > reportDate) changes.newFiles++;
    }
  });

  changes.hasUpdates = changes.newSessions > 0 || changes.newFiles > 0;
  return changes;
}

function renderFreshnessAlert(){
  var ch = getFreshnessChanges();
  if(!ch || !ch.hasUpdates) return '';
  var parts = [];
  if(ch.newSessions > 0) parts.push(ch.newSessions + (ch.newSessions===1?' sesiГіn nueva':' sesiones nuevas'));
  if(ch.newFiles > 0) parts.push(ch.newFiles + (ch.newFiles===1?' archivo nuevo':' archivos nuevos'));
  return '<div class="alert no-print" style="background:#FEF9E7;color:#B8860B;border:1px solid #f1d57c;padding:12px 14px;margin-bottom:1rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">'+
    '<span style="font-size:18px;">вҡЎ</span>'+
    '<span style="flex:1;min-width:200px;">Hay '+parts.join(' y ')+' desde que se generГі este informe. ВҝQuieres regenerar para incorporar lo nuevo?</span>'+
    '<button class="btn bsm" onclick="confirmRegenerate()" style="background:#B8860B;color:white;border-color:#B8860B;">Regenerar</button>'+
    '</div>';
}

async function downloadWord(rid){
  try {
    var r = await fetch('/api/reports/'+rid+'/docx', { headers: { 'x-app-password': PWD } });
    if(!r.ok) {
      var errMsg = 'Error ' + r.status;
      try {
        var errData = await r.json();
        errMsg = errData.error || errMsg;
      } catch(_) {}
      throw new Error(errMsg);
    }
    var blob = await r.blob();
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = (S.activeReport.title || 'informe').replace(/[^a-z0-9ГЎГ©ГӯГіГәГұ\s\-_]/gi,'').replace(/\s+/g,'_') + '.docx';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);}, 60000);
  } catch(e){alert('Error al descargar Word: '+e.message);}
}

  lider_como_jesus: 'Genera un DIAGNГ“STICO DE LIDERAZGO bajo el prisma del libro "Un lГӯder como JesГәs" de Ken Blanchard y Phil Hodges. Analiza al responsable/directivo (indicado en PERSONA OBJETIVO si aparece, o al principal lГӯder detectable en los datos si no) desde las cuatro dimensiones del liderazgo servidor.\n\n=== ESTRUCTURA OBLIGATORIA DEL INFORME ===\n\n1. PREГҒMBULO вҖ” "Desde dГіnde miramos"\nUn pГЎrrafo breve (150-200 palabras) que abra el informe explicando el marco. Debe incluir:\n- Que se apoya en el modelo de liderazgo servidor propuesto por Ken Blanchard y Phil Hodges en "Un lГӯder como JesГәs"\n- Las cuatro dimensiones que se van a analizar: corazГіn (motivaciГіn), mente (perspectiva sobre las personas), manos (comportamiento directivo) y hГЎbitos (renovaciГіn personal)\n- El concepto de EGO en su doble sentido: "Edging God Out" (apartar el propГіsito superior, el ego egocГ©ntrico) frente a "Exalting God Only" (poner el servicio y el propГіsito en el centro)\n- Aclara con delicadeza que estos principios son universales, no dogmГЎticos: funcionan como sabidurГӯa sobre el servicio, independientemente de la fe personal del lГӯder analizado\n\n2. EL CORAZГ“N DEL LГҚDER вҖ” MotivaciГіn de fondo\n- ВҝDesde dГіnde dirige esta persona? ВҝServicio o ego? ВҝQuГ© seГұales lo indican en las entrevistas, en cГіmo habla de su equipo, en cГіmo se comporta?\n- ВҝHay orgullo o miedo operando de forma detectable?\n- Cita evangГ©lica que ilumine lo observado (elige la cita segГәn lo que veas, no al revГ©s). Formato: "[cita textual]" вҖ” [referencia evangГ©lica]\n- Palanca de crecimiento en esta dimensiГіn\n\n3. LA MENTE DEL LГҚDER вҖ” CГіmo ve a su gente\n- ВҝQuГ© modelo mental tiene sobre sus colaboradores? ВҝLos ve como recursos o como personas con potencial?\n- ВҝCree en el crecimiento de su equipo o los tiene encasillados?\n- ВҝQuГ© creencias sobre el poder maneja: acumular o compartir?\n- Cita evangГ©lica que resuene con lo observado\n- Palanca de crecimiento\n\n4. LAS MANOS DEL LГҚDER вҖ” CГіmo dirige en la prГЎctica\n- Comportamiento directivo real: Вҝdirige, entrena, apoya, delega segГәn la etapa de madurez de cada colaborador? ВҝO aplica el mismo estilo a todos?\n- ВҝDelega de verdad o retiene el control?\n- ВҝDa autonomГӯa con acompaГұamiento, o soledad?\n- ВҝCГіmo maneja el error de su gente?\n- Cita evangГ©lica\n- Palanca de crecimiento\n\n5. LOS HГҒBITOS DEL LГҚDER вҖ” CГіmo se sostiene\n- ВҝQuГ© prГЎcticas de renovaciГіn tiene (o le faltan): tiempo para pensar, silencio, escuchar voces incГіmodas, comunidad de apoyo, mentores?\n- ВҝSe rodea de gente que le dice la verdad o solo de quien confirma?\n- SeГұales de agotamiento o de plenitud\n- Cita evangГ©lica\n- Palanca de crecimiento\n\n6. FORTALEZAS DEL LГҚDER\nLista honesta y sustentada de lo que este lГӯder aporta. Sin adulaciГіn, con evidencias. DГіnde ya estГЎ siendo servidor y dГіnde se ve su mejor versiГіn.\n\n7. RIESGOS SI NO EVOLUCIONA\nQuГ© puede pasar en el equipo/departamento si el lГӯder no crece en las dimensiones seГұaladas. Riesgos concretos, no genГ©ricos.\n\n8. PRГ“XIMOS PASOS ATERRIZADOS\n3-5 acciones muy concretas, prГЎcticas, implementables desde maГұana. Nada mГӯstico ni abstracto. Ejemplos del tipo:\n- "Instaurar una reuniГіn semanal 1-a-1 de 20 min con cada miembro del equipo para escucharles sin agenda"\n- "Bloquear 30 min los viernes para revisar decisiones tomadas y hacer autoexamen"\n- "Delegar completamente [proceso concreto] a [nombre real] antes de X fecha"\n- "Tener una conversaciГіn con [nombre] sobre [tema concreto detectado]"\n\n=== REGLAS CRГҚTICAS ===\n- Las citas evangГ©licas se eligen SIEMPRE en funciГіn de lo observado, nunca al revГ©s. Si no encuentras una cita que encaje honestamente con una dimensiГіn, no la pongas вҖ” mejor omitirla que forzarla.\n- Cero moralismo, cero sermГіn. Es lectura profesional con profundidad humana, no catequesis.\n- Solo lo sustentado por los datos. Si no hay evidencia para una dimensiГіn, dilo con honestidad.\n- DiscreciГіn total: escribe como si el informe pudiera llegar al propio lГӯder. Nada gratuitamente hiriente, todo constructivo, pero sin edulcorar las verdades.\n- Cita evidencias especГӯficas cuando puedas (una frase textual de una entrevista, un patrГіn detectado en varias sesiones...). Cuida la confidencialidad si es informaciГіn delicada.\n- Si el lГӯder no cree en JesГәs, el informe funciona igual: son principios universales sobre el servicio, la humildad y el propГіsito.\n- Tono profesional, cercano, humanista. Ni distante ni condescendiente.\n- Usa la 3ВӘ persona para hablar del lГӯder, salvo en la reflexiГіn final si sale natural la primera persona.'

async function generateReport(opts){
  opts = opts || {};
  var isRegenerate = !!opts.regenerateFrom;
  var reportType, customTitle, customInstructions, selectedFiles, targetPersonaId, previousReportId, referenceReportIds;

  if(isRegenerate){
    // Regenerar: usamos la configuraciГіn del informe anterior (con posibles ediciones del modal)
    var prev = opts.regenerateFrom;
    reportType = prev.report_type || 'diagnostico_completo';
    customTitle = prev.title || ((prev.title || '').replace(/\s*\(v\d+\)\s*$/,'') + ' (regenerado ' + new Date().toLocaleDateString('es-ES') + ')');
    customInstructions = prev.custom_instructions || '';
    selectedFiles = Array.isArray(prev.files_used) ? prev.files_used : (typeof prev.files_used === 'string' ? JSON.parse(prev.files_used || '[]') : []);
    targetPersonaId = prev.target_persona_id || '';
    previousReportId = prev.id;
    referenceReportIds = Array.isArray(prev.reference_report_ids) ? prev.reference_report_ids : [];
  } else {
    reportType = document.getElementById('reportTypeSel').value;
    customTitle = document.getElementById('reportTitle').value.trim();
    customInstructions = (document.getElementById('customInstructions').value || '').trim();
    selectedFiles = Array.from(document.querySelectorAll('.file-check:checked')).map(function(el){return el.getAttribute('data-id');});
    var personaSel = document.getElementById('targetPersonaSel');
    targetPersonaId = personaSel ? personaSel.value : '';
    previousReportId = null;
    referenceReportIds = Array.from(document.querySelectorAll('.ref-report-check:checked')).map(function(el){return el.getAttribute('data-id');});

    if(reportType === 'personalizado' && !customInstructions){
      alert('Para un informe personalizado necesito que escribas las instrucciones de quГ© quieres que genere.');
      return;
    }
    if(reportType === 'informe_individual' && !targetPersonaId){
      alert('Para un informe individual selecciona primero la persona del equipo.');
      return;
    }
  }

  S.reportLoading=true;renderContent();
  var summary=buildSummary(S.current);
  var typeInstructions = REPORT_PROMPTS[reportType] || REPORT_PROMPTS.diagnostico_completo;

  var instructionsBlock = '';
  if(customInstructions){
    instructionsBlock = '\n\n--- INSTRUCCIONES DE LA CONSULTORA (prioritarias, respГ©talas estrictamente) ---\n'+customInstructions+'\n';
  }

  var personaBlock = '';
  if(reportType === 'informe_individual' && targetPersonaId){
    var persona = getPersonas().find(function(p){return p.id===targetPersonaId;});
    if(persona){
      personaBlock = '\n\n--- PERSONA OBJETIVO ---\nEste informe individual es sobre: '+persona.nombre + (persona.cargo?' ('+persona.cargo+')':'') + (persona.antiguedad?', antigГјedad: '+persona.antiguedad:'') + '\nCentra TODO el anГЎlisis en esta persona concreta. Usa el resto de informaciГіn del departamento solo como contexto para entenderla mejor.\n';
    }
  }

  var prompt='Eres una consultora de procesos organizacionales con amplia experiencia y mirada humanista. BasГЎndote en los datos de campo de una consultorГӯa real (y en los archivos adjuntos si los hay), genera un informe profesional, creativo, muy personalizado y verdaderamente Гәtil.\n\n'+summary+personaBlock+'\n\n--- TIPO DE INFORME SOLICITADO ---\n'+typeInstructions+instructionsBlock+'\n\n--- FORMATO DE SALIDA (OBLIGATORIO E INNEGOCIABLE) ---\nDevuelve el informe en HTML puro. NUNCA uses Markdown bajo ningГәn concepto: ni almohadillas (#), ni asteriscos dobles (**), ni guiones para listas (-), ni triples backticks. Todo el formato se hace ГҡNICAMENTE con etiquetas HTML.\n\nReglas estrictas:\n- Cada secciГіn principal va envuelta en <div class="report-section">...</div>\n- TГӯtulos de secciГіn: <h2>Texto</h2>\n- SubtГӯtulos: <h3>Texto</h3>\n- PГЎrrafos: <p>Texto</p>\n- Listas con viГұetas: <ul><li>Item</li><li>Item</li></ul>\n- Listas numeradas: <ol><li>Item</li></ol>\n- Negritas: <strong>texto</strong>\n- NO incluyas DOCTYPE, ni <html>, ni <head>, ni <body>, ni ```html, ni ```. Solo los divs con el contenido.\n- Empieza directamente con <div class="report-section"><h2>...\n\nEjemplo de inicio CORRECTO:\n<div class="report-section"><h2>Resumen ejecutivo</h2><p>El departamento presenta...</p></div>\n\nEjemplo INCORRECTO (no hagas esto NUNCA):\n# Resumen ejecutivo\n**Punto clave:** El departamento...\n\n--- TONO ---\nProfesional, directo, honesto y empГЎtico. Nada de lenguaje corporativo vacГӯo. SГ© muy especГӯfico usando los datos reales. Usa los nombres reales de las personas cuando aporte valor. El informe debe sentirse escrito para ESTA organizaciГіn concreta, no genГ©rico. Si hay archivos adjuntos, intГ©gralos naturalmente en el anГЎlisis.';

  try {
    var data=await api('/api/generate-report',{method:'POST',body:{
      consultancyId: S.current.id,
      prompt: prompt,
      fileIds: selectedFiles,
      reportType: reportType,
      title: customTitle || null,
      customInstructions: customInstructions || null,
      targetPersonaId: targetPersonaId || null,
      previousReportId: previousReportId || null,
      referenceReportIds: referenceReportIds || []
    }});
    var content = data.report || '';
    content = ensureHtml(content);
    S.activeReport = { id: data.reportId, title: data.title, content: content, report_type: reportType, custom_instructions: customInstructions, target_persona_id: targetPersonaId, files_used: selectedFiles, created_at: new Date().toISOString() };
  } catch(e){
    S.activeReport = { title: 'Error', content: '<div class="report-section"><h2>Error</h2><p>'+e.message+'</p></div>' };
  }
  S.reportLoading=false;renderContent();
}

// Detecta si el contenido viene en Markdown y lo convierte a HTML
function ensureHtml(content){
  if(!content) return '';
  // Si ya contiene etiquetas HTML del informe, lo dejamos tal cual
  if(/<div\s+class=["']report-section/i.test(content) || /<h2[\s>]/i.test(content)) {
    return content;
  }
  // Si no, parece Markdown вҖ” lo convertimos
  var lines = content.split('\n');
  var html = '';
  var inList = false;
  var listType = '';
  var inSection = false;

  function closeList(){
    if(inList){ html += '</'+listType+'>'; inList = false; }
  }
  function closeSection(){
    if(inSection){ html += '</div>'; inSection = false; }
  }
  function openSection(){
    closeSection();
    html += '<div class="report-section">';
    inSection = true;
  }

  for(var i=0;i<lines.length;i++){
    var line = lines[i];
    // H1 con # вҶ’ ignoramos (es el tГӯtulo global, ya estГЎ fuera)
    var m;
    if((m = line.match(/^#\s+(.+)$/))){
      closeList();
      openSection();
      html += '<h2>' + applyInline(m[1].trim()) + '</h2>';
    } else if((m = line.match(/^##\s+(.+)$/))){
      closeList();
      openSection();
      html += '<h2>' + applyInline(m[1].trim()) + '</h2>';
    } else if((m = line.match(/^###\s+(.+)$/))){
      closeList();
      if(!inSection) openSection();
      html += '<h3>' + applyInline(m[1].trim()) + '</h3>';
    } else if((m = line.match(/^####\s+(.+)$/))){
      closeList();
      if(!inSection) openSection();
      html += '<h3>' + applyInline(m[1].trim()) + '</h3>';
    } else if((m = line.match(/^[\-\*]\s+(.+)$/))){
      if(!inSection) openSection();
      if(!inList || listType !== 'ul'){ closeList(); html += '<ul>'; inList = true; listType = 'ul'; }
      html += '<li>' + applyInline(m[1].trim()) + '</li>';
    } else if((m = line.match(/^\d+\.\s+(.+)$/))){
      if(!inSection) openSection();
      if(!inList || listType !== 'ol'){ closeList(); html += '<ol>'; inList = true; listType = 'ol'; }
      html += '<li>' + applyInline(m[1].trim()) + '</li>';
    } else if(line.trim() === '' || line.trim() === '---'){
      closeList();
    } else {
      closeList();
      if(!inSection) openSection();
      html += '<p>' + applyInline(line.trim()) + '</p>';
    }
  }
  closeList();
  closeSection();
  return html || ('<div class="report-section"><p>' + content + '</p></div>');
}

// Convierte **negrita** e _itГЎlica_ inline
function applyInline(s){
  return s
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/__([^_]+)__/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>');
}

      diagnostico_completo: 'DiagnГіstico completo',
      resumen_ejecutivo: 'Resumen ejecutivo',
      plan_accion: 'Plan de acciГіn',
      devolucion_equipo: 'DevoluciГіn al equipo',
      tecnico_procesos: 'TГ©cnico de procesos',
      analisis_herramientas: 'AnГЎlisis de herramientas',
      informe_individual: 'Informe individual',
      lider_como_jesus: 'DiagnГіstico de liderazgo',
      personalizado: 'Personalizado',
      acta_interaccion: 'Acta de interacciГіn',
      seguimiento_proyecto: 'Seguimiento de proyecto',
      seguimiento_global: 'Seguimiento global'
    };
    var html = '<div style="overflow-x:auto;"><table style="width:100%;font-size:12px;border-collapse:collapse;">'+
      '<thead><tr style="border-bottom:1px solid var(--border);"><th style="text-align:left;padding:8px 6px;font-weight:500;color:var(--text2);">TГӯtulo</th><th style="text-align:left;padding:8px 6px;font-weight:500;color:var(--text2);">Tipo</th><th style="text-align:left;padding:8px 6px;font-weight:500;color:var(--text2);">ConsultorГӯa</th><th style="text-align:left;padding:8px 6px;font-weight:500;color:var(--text2);">TamaГұo</th><th style="text-align:left;padding:8px 6px;font-weight:500;color:var(--text2);">Fecha</th></tr></thead><tbody>'+

        return '<tr style="border-bottom:1px solid var(--border);"><td style="padding:8px 6px;">'+esc(r.title)+'</td><td style="padding:8px 6px;color:var(--text2);">'+(typeLabels[r.report_type]||r.report_type)+'</td><td style="padding:8px 6px;color:var(--text2);">'+esc(r.consultancy_name||'-')+'</td><td style="padding:8px 6px;color:var(--text2);">'+formatSize(r.content_size)+'</td><td style="padding:8px 6px;color:var(--text2);">'+formatDate(r.created_at)+'</td></tr>';
      }).join('')+

function formatDate(d){
  if(!d) return '-';
  var dt = new Date(d);
  return dt.toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'})+' '+dt.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
}
