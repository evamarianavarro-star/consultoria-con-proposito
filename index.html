<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConsultorГӯa con PropГіsito</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F5F0;--surface:#FFF;--surface2:#F0EDE6;--border:#E2DDD5;--text:#1A1814;--text2:#6B6560;--text3:#A09A92;--accent:#2D5016;--accent-l:#EAF0E1;--accent2:#1a4a8a;--accent2-l:#E8F0FB;--danger:#C0392B;--danger-l:#FDECEA;--amber:#B8860B;--amber-l:#FEF9E7;--r:12px;--rsm:8px;--sh:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;}
.app{display:flex;min-height:100vh;}
.sidebar{width:255px;background:var(--text);color:#F7F5F0;padding:1.75rem 1.25rem;display:flex;flex-direction:column;gap:1.5rem;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100;}
.main{margin-left:255px;flex:1;padding:2.25rem 2.5rem;max-width:calc(100vw - 255px);}
.logo{font-family:'DM Serif Display',serif;font-size:19px;line-height:1.25;}
.logo em{color:#8FC45A;font-style:normal;}
.slabel{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:#4A5A3A;margin-bottom:6px;}
.ci{padding:7px 10px;border-radius:var(--rsm);cursor:pointer;font-size:13px;color:#C8C4BC;border:1px solid transparent;margin-bottom:3px;display:flex;align-items:center;gap:7px;transition:all .15s;}
.ci:hover{background:rgba(255,255,255,.07);color:#F7F5F0;}
.ci.on{background:rgba(143,196,90,.15);border-color:rgba(143,196,90,.3);color:#8FC45A;}
.ci .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
.ci-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.btn-new-s{width:100%;padding:8px 10px;background:rgba(255,255,255,.07);border:1px dashed rgba(255,255,255,.18);border-radius:var(--rsm);color:#C8C4BC;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:left;transition:all .15s;}
.btn-new-s:hover{background:rgba(255,255,255,.12);color:#F7F5F0;}
.nl{display:flex;flex-direction:column;gap:2px;}
.nl-item{padding:7px 9px;border-radius:var(--rsm);cursor:pointer;font-size:13px;color:#C8C4BC;display:flex;align-items:center;gap:8px;transition:all .15s;}
.nl-item:hover{background:rgba(255,255,255,.07);color:#F7F5F0;}
.nl-item.on{background:rgba(255,255,255,.1);color:#F7F5F0;}
.nl-item svg{width:15px;height:15px;flex-shrink:0;opacity:.75;}
.ph{margin-bottom:1.75rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.ph h1{font-family:'DM Serif Display',serif;font-size:26px;font-weight:400;line-height:1.2;}
.ph p{font-size:13px;color:var(--text2);margin-top:3px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.35rem 1.4rem;margin-bottom:1.1rem;box-shadow:var(--sh);}
.ct{font-family:'DM Serif Display',serif;font-size:17px;font-weight:400;margin-bottom:3px;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:13px;font-weight:500;margin-bottom:5px;}
input[type=text],input[type=password],textarea,select{width:100%;padding:9px 11px;font-size:14px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;line-height:1.5;transition:border-color .15s;}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-l);}
textarea{min-height:78px;resize:vertical;}
input::placeholder,textarea::placeholder{color:var(--text3);}
.stars-row{display:flex;gap:5px;margin-top:4px;}
.star{width:36px;height:36px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--surface);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;}
.star:hover{border-color:var(--accent);color:var(--accent);}
.star.on{background:var(--accent-l);border-color:var(--accent);color:var(--accent);}
.tags-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.tag{padding:4px 11px;border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text2);cursor:pointer;background:var(--surface);transition:all .12s;}
.tag:hover{border-color:var(--accent);color:var(--accent);}
.tag.on{background:var(--accent-l);border-color:var(--accent);color:var(--accent);}
.btn{padding:8px 18px;font-size:13px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--surface);color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{background:var(--surface2);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btnp{background:var(--accent);color:#fff;border-color:var(--accent);}
.btnp:hover{background:#223D0F;}
.btnd{background:var(--accent2-l);color:var(--accent2);border-color:var(--accent2);}
.btndanger{background:var(--danger-l);color:var(--danger);border-color:var(--danger);}
.btndanger:hover{background:var(--danger);color:#fff;}
.bsm{padding:5px 13px;font-size:12px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:.9rem;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem 1.2rem;box-shadow:var(--sh);}
.stat .sl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:5px;}
.stat .sv{font-family:'DM Serif Display',serif;font-size:26px;}
.stat .sd{font-size:12px;color:var(--text2);margin-top:3px;}
.pbar{height:3px;background:var(--surface2);border-radius:2px;margin-bottom:1.75rem;overflow:hidden;}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent),#8FC45A);border-radius:2px;transition:width .4s ease;}
hr{border:none;border-top:1px solid var(--border);margin:1.25rem 0;}
.empty{text-align:center;padding:4rem 2rem;color:var(--text2);}
.empty h2{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;margin-bottom:8px;color:var(--text);}
.alert{padding:11px 14px;border-radius:var(--rsm);font-size:13px;margin-bottom:1rem;display:flex;align-items:flex-start;gap:8px;}
.alert-info{background:var(--accent-l);color:var(--accent);}
.alert-blue{background:var(--accent2-l);color:var(--accent2);}
.alert-amber{background:var(--amber-l);color:var(--amber);}
.alert-danger{background:var(--danger-l);color:var(--danger);}
.modal-ov{position:fixed;inset:0;background:rgba(26,24,20,.5);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(2px);}
.modal{background:var(--surface);border-radius:var(--r);padding:1.75rem;width:90%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal h2{font-family:'DM Serif Display',serif;font-size:21px;font-weight:400;margin-bottom:1rem;}
.modal-act{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;}
.ptabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1.25rem;}
.ptab{padding:6px 13px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--surface);color:var(--text2);cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;transition:all .12s;}
.ptab.on{background:var(--text);color:#fff;border-color:var(--text);}
.avatar{width:22px;height:22px;border-radius:50%;background:var(--accent-l);color:var(--accent);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;}
.ptab.on .avatar{background:rgba(255,255,255,.2);color:#fff;}
.st{font-family:'DM Serif Display',serif;font-size:14px;color:var(--text2);margin:1.1rem 0 .75rem;display:flex;align-items:center;gap:8px;}
.st::after{content:'';flex:1;height:1px;background:var(--border);}
.file-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--rsm);margin-bottom:6px;background:var(--surface);font-size:13px;}
.file-item .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.file-item .fsize{color:var(--text3);font-size:11px;}
.file-ext{width:30px;height:30px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--text2);text-transform:uppercase;}
.drop-zone{border:2px dashed var(--border);border-radius:var(--r);padding:2rem;text-align:center;cursor:pointer;background:var(--surface);transition:all .15s;}
.drop-zone:hover,.drop-zone.drag{border-color:var(--accent);background:var(--accent-l);}
.drop-zone p{font-size:13px;color:var(--text2);margin-top:6px;}
.dots{display:inline-flex;gap:4px;align-items:center;}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:bk 1.2s infinite ease-in-out;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes bk{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
/* === MENTIONS === */
.mention{display:inline-block;padding:1px 7px;border-radius:10px;background:var(--accent-l);color:var(--accent);font-weight:500;font-size:.95em;text-decoration:none;}
.mention-broken{background:var(--danger-l);color:var(--danger);font-style:italic;}
.mention-suggest{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:200px;max-height:240px;overflow-y:auto;z-index:1000;font-family:'DM Sans',sans-serif;}
.mention-suggest-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);}
.mention-suggest-item:last-child{border-bottom:none;}
.mention-suggest-item:hover,.mention-suggest-item.on{background:var(--accent-l);color:var(--accent);}
.mention-suggest-empty{padding:10px 12px;font-size:12px;color:var(--text3);font-style:italic;text-align:center;}
.mention-cargo{font-size:11px;color:var(--text3);font-weight:400;}
.mention-suggest-item.on .mention-cargo{color:var(--accent);}
.mentions-section{margin-top:1.25rem;padding-top:1rem;border-top:1px dashed var(--border);}
.mentions-section h3{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:.75rem;display:flex;align-items:center;gap:6px;}
.mention-item{background:var(--surface2);border-left:3px solid var(--accent);padding:8px 12px;margin-bottom:8px;border-radius:0 var(--rsm) var(--rsm) 0;font-size:13px;line-height:1.55;}
.mention-item-from{font-size:11px;color:var(--text2);margin-bottom:3px;font-weight:500;}
.mention-item-text{color:var(--text);}
.mention-item-text .mention{font-size:12px;}

/* === SEARCH RESULTS === */
.search-cat{margin-bottom:1.25rem;}
.search-cat-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:.6rem;display:flex;align-items:center;gap:6px;}
.search-cat-count{background:var(--surface2);color:var(--text2);padding:1px 8px;border-radius:10px;font-size:10px;font-weight:600;letter-spacing:0;}
.search-item{background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 var(--rsm) var(--rsm) 0;padding:10px 14px;margin-bottom:6px;cursor:pointer;transition:background .12s;}
.search-item:hover{background:var(--accent-l);}
.search-item-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px;}
.search-item-snippet{font-size:12px;color:var(--text2);line-height:1.55;}
.search-item-snippet mark{background:#FEF3C7;padding:1px 3px;border-radius:3px;color:var(--text);font-weight:500;}
.search-empty{text-align:center;padding:2rem;color:var(--text3);font-size:13px;font-style:italic;}

/* === PROJECT VIEWS (Timeline, Kanban, Summary) === */
.pv-tabs{display:flex;gap:4px;margin-bottom:1rem;flex-wrap:wrap;background:var(--surface2);padding:4px;border-radius:var(--rsm);}
.pv-tab{padding:6px 14px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;border-radius:calc(var(--rsm) - 2px);transition:all .15s;background:transparent;border:none;font-family:inherit;}
.pv-tab:hover{background:var(--surface);color:var(--text);}
.pv-tab.on{background:var(--surface);color:var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.06);}

/* Timeline */
.tl-wrap{background:var(--surface2);border-radius:var(--rsm);padding:1rem;overflow-x:auto;overflow-y:hidden;}
.tl-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;font-size:11px;color:var(--text3);}
.tl-canvas{position:relative;padding:20px 5%;box-sizing:border-box;}
.tl-axis{position:absolute;left:5%;right:5%;top:50%;height:2px;background:var(--border);}
.tl-tick{position:absolute;top:50%;transform:translateX(-50%);}
.tl-tick-line{width:1px;height:8px;background:var(--border);margin:0 auto;}
.tl-tick-label{font-size:9px;color:var(--text3);margin-top:4px;white-space:nowrap;text-align:center;letter-spacing:.5px;text-transform:uppercase;font-weight:600;}
.tl-task{position:absolute;transform:translate(-50%,-50%);background:var(--surface);border:2px solid #4A6FA5;border-radius:10px;padding:6px 10px 5px;font-size:11px;font-weight:500;color:var(--text);cursor:pointer;transition:all .15s;box-shadow:0 2px 6px rgba(0,0,0,.08);width:200px;box-sizing:border-box;}
.tl-task:hover{transform:translate(-50%,-50%) scale(1.06);z-index:10;box-shadow:0 4px 14px rgba(0,0,0,.18);}
.tl-task-header{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.tl-task-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#4A6FA5;}
.tl-task-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;font-size:11px;line-height:1.25;}
.tl-task-meta{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text3);font-weight:400;white-space:nowrap;}
.tl-task-meta-date{white-space:nowrap;}
.tl-avatar{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:var(--accent);color:white;font-size:10px;font-weight:700;flex-shrink:0;line-height:1;}
.tl-avatar.me{background:#B8860B;}
.tl-task.done{background:var(--accent);color:white;border-color:var(--accent);}
.tl-task.done .tl-task-dot{background:white;}
.tl-task.done .tl-task-title{text-decoration:line-through;opacity:.9;}
.tl-task.done .tl-task-meta{color:rgba(255,255,255,.85);}
.tl-task.done .tl-avatar{background:white;color:var(--accent);}
.tl-task.overdue{border-color:var(--danger);background:#FDF2F2;color:var(--danger);}
.tl-task.overdue .tl-task-dot{background:var(--danger);}
.tl-task.overdue .tl-avatar{background:var(--danger);}
.tl-task.today{border-color:#B8860B;background:#FEF9E7;}
.tl-task.today .tl-task-dot{background:#B8860B;}
.tl-task.blocked{border-color:var(--danger);background:var(--surface);color:var(--text);}
.tl-task.blocked .tl-task-dot{background:var(--danger);}
.tl-task-connector{position:absolute;width:2px;background:var(--border);z-index:0;}
.tl-milestone{position:absolute;transform:translate(-50%,-50%);cursor:pointer;font-size:16px;transition:all .15s;z-index:5;background:var(--surface);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border:2px solid var(--accent);box-shadow:0 2px 6px rgba(0,0,0,.08);}
.tl-milestone:hover{transform:translate(-50%,-50%) scale(1.15);z-index:11;box-shadow:0 4px 12px rgba(0,0,0,.15);}
.tl-milestone-date{position:absolute;top:calc(100% + 4px);left:50%;transform:translateX(-50%);font-size:9px;color:var(--text3);white-space:nowrap;font-weight:600;}
.tl-nofecha{background:var(--surface);border:1px dashed var(--border);border-radius:var(--rsm);padding:8px 12px;margin-top:1rem;font-size:12px;color:var(--text2);}
.tl-nofecha-item{display:inline-block;background:var(--surface2);padding:3px 10px;border-radius:10px;margin:2px;font-size:11px;cursor:pointer;}
.tl-nofecha-item:hover{background:var(--accent-l);color:var(--accent);}
.tl-today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--danger);opacity:.4;z-index:1;}
.tl-today-label{position:absolute;top:-8px;transform:translateX(-50%);font-size:9px;background:var(--danger);color:white;padding:1px 5px;border-radius:6px;font-weight:600;letter-spacing:.5px;}

/* Kanban */
.kb-wrap{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;}
.kb-col{background:var(--surface2);border-radius:var(--rsm);padding:10px;min-height:150px;}
.kb-col-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.kb-col-count{background:var(--surface);color:var(--text2);padding:1px 8px;border-radius:10px;font-size:10px;font-weight:600;letter-spacing:0;}
.kb-card{background:var(--surface);border-radius:var(--rsm);padding:8px 10px;margin-bottom:6px;font-size:12px;cursor:pointer;transition:all .15s;box-shadow:0 1px 2px rgba(0,0,0,.04);border-left:4px solid var(--border);}
.kb-card:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.1);}
.kb-card.pending{border-left-color:#4A6FA5;}
.kb-card.in_progress{border-left-color:#B8860B;background:linear-gradient(90deg,#FEF9E7 0,var(--surface) 15%);}
.kb-card.blocked{border-left-color:var(--danger);background:linear-gradient(90deg,#FDF2F2 0,var(--surface) 15%);}
.kb-card.done{border-left-color:var(--accent);opacity:.7;}
.kb-card.discarded{border-left-color:var(--text3);opacity:.5;}
.kb-card-title{font-weight:500;color:var(--text);margin-bottom:3px;font-size:12px;line-height:1.3;display:flex;align-items:flex-start;gap:6px;}
.kb-card-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;background:#4A6FA5;}
.kb-card.pending .kb-card-dot{background:#4A6FA5;}
.kb-card.in_progress .kb-card-dot{background:#B8860B;}
.kb-card.blocked .kb-card-dot{background:var(--danger);}
.kb-card.done .kb-card-dot{background:var(--accent);}
.kb-card.discarded .kb-card-dot{background:var(--text3);}
.kb-card-title-text{flex:1;min-width:0;}
.kb-card.done .kb-card-title-text{text-decoration:line-through;opacity:.7;}
.kb-card-meta{font-size:10px;color:var(--text3);display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.kb-card-meta .tl-avatar{width:16px;height:16px;font-size:9px;}
.kb-empty{text-align:center;padding:1rem;color:var(--text3);font-size:11px;font-style:italic;}
.kb-add-btn{width:100%;background:transparent;border:1px dashed var(--border);border-radius:var(--rsm);padding:6px;font-size:11px;color:var(--text3);cursor:pointer;margin-top:6px;transition:all .15s;font-family:inherit;}
.kb-add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-l);}
.kb-card{cursor:grab;}
.kb-card.dragging{opacity:.4;cursor:grabbing;}
.kb-col.drag-over{background:var(--accent-l);box-shadow:inset 0 0 0 2px var(--accent);}
.kb-col-drop-hint{text-align:center;padding:.75rem;color:var(--accent);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;display:none;}
.kb-col.drag-over .kb-col-drop-hint{display:block;}

/* Detail popover */
.detail-pop{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);box-shadow:0 8px 32px rgba(0,0,0,.16);padding:1rem 1.25rem;z-index:9999;max-width:380px;min-width:280px;animation:popIn .15s ease-out;}
@keyframes popIn{from{opacity:0;transform:translateY(4px) scale(.98);} to{opacity:1;transform:translateY(0) scale(1);}}
.detail-pop-close{position:absolute;top:8px;right:10px;background:transparent;border:none;font-size:16px;color:var(--text3);cursor:pointer;padding:0;line-height:1;}
.detail-pop-close:hover{color:var(--text);}
.detail-pop-tag{display:inline-block;font-size:9px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:.5rem;}

/* Summary */

/* === ASK AI PANEL === */
.ai-presets{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:1rem;}

.ai-loading{text-align:center;padding:2rem;color:var(--text3);font-size:13px;}
.ai-question-input{width:100%;padding:10px 12px;font-size:13px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--surface);color:var(--text);min-height:70px;resize:vertical;font-family:inherit;}

/* Bloques de nota IA guardados (plegables) */

<body>

<script>
// в”Җв”Җ AUTH в”Җв”Җ
var PWD = sessionStorage.getItem('cwp_pwd') || '';

async function doLogin() {
  var v = document.getElementById('passInput').value;
  try {
    var r = await fetch('/check-auth', { headers: { 'x-app-password': v } });
    var d = await r.json();
    if (d.ok) {
      PWD = v;
      sessionStorage.setItem('cwp_pwd', v);
      showApp();
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  } catch (e) {
    document.getElementById('loginErr').textContent = 'Error de conexiГіn';
    document.getElementById('loginErr').style.display = 'block';
  }
}

function showApp() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('appView').style.display = 'block';
  loadConsultancies();
}

async function checkAuth() {
  if (!PWD) {
    document.getElementById('loginView').style.display = 'block';
    return false;
  }
  try {
    var r = await fetch('/check-auth', { headers: { 'x-app-password': PWD } });
    var d = await r.json();
    if (d.ok) { showApp(); return true; }
    sessionStorage.removeItem('cwp_pwd');
    document.getElementById('loginView').style.display = 'block';
    return false;
  } catch (e) {
    document.getElementById('loginView').style.display = 'block';
    return false;
  }
}

// в”Җв”Җ API в”Җв”Җ
async function api(path, opts) {
  opts = opts || {};
  opts.headers = opts.headers || {};
  opts.headers['x-app-password'] = PWD;
  if (opts.body && typeof opts.body === 'object') {
    opts.body = JSON.stringify(opts.body);
    opts.headers['Content-Type'] = 'application/json';
  }
  var r = await fetch(path, opts);
  if (!r.ok) {
    var err = await r.json().catch(() => ({ error: 'Error' }));
    throw new Error(err.error || 'Error ' + r.status);
  }
  return r.json();
}

// в”Җв”Җ STATE в”Җв”Җ
var S = {
  list: [],
  active: null,
  current: null,
  page: 'dashboard',
  persona: null,
  reportLoading: false,
  activeReport: null,
  syncStatus: 'ok',
  saveTimer: null
};

function setSync(s) {
  S.syncStatus = s;
  var el = document.getElementById('syncStatus');
  if (!el) return;
  var labels = { ok: 'вң“ Sincronizado', saving: 'вҹі Guardando...', err: 'вң— Error al guardar' };
  var classes = { ok: 'sync-ok', saving: 'sync-saving', err: 'sync-err' };
  el.innerHTML = '<span class="sync-badge ' + classes[s] + '">' + labels[s] + '</span>';
}

async function loadConsultancies() {
  try {
    S.list = await api('/api/consultancies');
    if (S.list.length > 0 && !S.active) {
      await selectC(S.list[0].id);
    }
    renderSidebar();
    if (!S.current) renderContent();
  } catch (e) {
    alert('Error cargando datos: ' + e.message);
  }
}

async function selectC(id) {
  S.active = id;
  S.page = 'dashboard';
  S.persona = null;
  S.activeReport = null;
  S.projects = [];
  S.expandedProjects = {};
  try {
    S.current = await api('/api/consultancies/' + id);
    if (!S.current.data) S.current.data = {};
    if (!S.current.data.contexto) S.current.data.contexto = {};
    if (!S.current.data.estructura) S.current.data.estructura = {};
    if (!Array.isArray(S.current.data.entrevistas)) S.current.data.entrevistas = [];
    if (!S.current.data.procesos) S.current.data.procesos = {};
    if (!S.current.data.herramientas) S.current.data.herramientas = {};
    if (!S.current.data.sintesis) S.current.data.sintesis = {};
    if (!Array.isArray(S.current.archivos)) S.current.archivos = [];
    // Cargar proyectos en paralelo para que "Archivos" pueda mostrar sus etiquetas
    try {
      var projs = await api('/api/consultancies/' + id + '/projects');
      S.projects = projs || [];
    } catch(e){ S.projects = []; }
    renderSidebar();
    renderContent();
    if (window.innerWidth < 768) toggleSidebar();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

function debouncedSave() {
  setSync('saving');
  if (S.saveTimer) clearTimeout(S.saveTimer);
  S.saveTimer = setTimeout(saveCurrent, 800);
}

async function saveCurrent() {
  if (!S.current) return;
  try {
    await api('/api/consultancies/' + S.current.id, { method: 'PUT', body: S.current });
    setSync('ok');
  } catch (e) {
    setSync('err');
  }
}

  {id:'dashboard',label:'Vista general',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>'},

  {id:'archivos',label:'Archivos',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>'},

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// в”Җв”Җ MENTION SYSTEM в”Җв”Җ
// Simplificado: las menciones se guardan como texto plano @Nombre.
// La detecciГіn busca @ seguido de un nombre que coincida con alguna persona del equipo (greedy: nombre mГЎs largo gana).
// Si se renombra a alguien, las menciones a su nombre anterior dejan de detectarse hasta que se actualicen manualmente.

function getPersonas(){
  if(!S.current || !S.current.data) return [];
  return S.current.data.entrevistas || [];
}

// Busca todas las menciones a personas dentro de un texto.
// Devuelve [{start, end, personaId, nombre, text}]
function findMentionMatchesInText(text){
  if(!text) return [];
  var personas = getPersonas();
  // Orden descendente por longitud para que "@Ana GarcГӯa" gane a "@Ana"
  var sortedByLen = personas.slice().sort(function(a,b){return (b.nombre||'').length - (a.nombre||'').length;});
  var matches = [];
  var i = 0;
  while(i < text.length){
    if(text[i] === '@' && (i === 0 || /[\s.,;:!?ВЎВҝ()"'В«В»\-\n]/.test(text[i-1]))){
      var matched = false;
      for(var k=0;k<sortedByLen.length;k++){
        var p = sortedByLen[k];
        var n = '@'+(p.nombre||'');
        if(!n || n === '@') continue;
        if(text.substr(i, n.length).toLowerCase() === n.toLowerCase()){
          var after = text[i + n.length];
          if(!after || /[\s.,;:!?ВЎВҝ()"'В«В»\-\n]/.test(after)){
            matches.push({start: i, end: i + n.length, personaId: p.id, nombre: p.nombre, text: text.substr(i, n.length)});
            i += n.length;
            matched = true;
            break;
          }
        }
      }
      if(!matched) i++;
    } else {
      i++;
    }
  }
  return matches;
}

// Convierte un texto plano con @Nombre a HTML con menciones estilizadas
function renderMentions(text){
  if(!text) return '';
  var matches = findMentionMatchesInText(text);
  if(matches.length === 0) return esc(text);
  var out = '';
  var lastEnd = 0;
  matches.forEach(function(m){
    out += esc(text.substring(lastEnd, m.start));
    out += '<span class="mention" title="'+esc(m.nombre)+'">'+esc(m.text)+'</span>';
    lastEnd = m.end;
  });
  out += esc(text.substring(lastEnd));
  return out;
}

// Busca textos donde aparece una menciГіn a la persona targetId
function findMentionsOf(targetId){
  var hits = [];
  if(!S.current || !S.current.data) return hits;
  var d = S.current.data;

  function scanText(text, meta){
    if(!text || typeof text !== 'string') return;
    var matches = findMentionMatchesInText(text);
    var hit = matches.some(function(m){return m.personaId === targetId;});
    if(hit) hits.push(Object.assign({text: text}, meta));
  }

  // 1) Sesiones y campos de entrevistas de OTRAS personas
  (d.entrevistas||[]).forEach(function(p){
    if(p.id === targetId) return;
    (p.sesiones||[]).forEach(function(s){
      scanText(s.notas, {from:p.nombre, fromId:p.id, when:s.fecha, title:s.titulo, sourceType:'session', sourceLabel:'SesiГіn de '+p.nombre+(s.titulo?' вҖ” '+s.titulo:'')});
    });
    var r = p.resp || {};
    var fieldLabels = {
      trabajo:'Trabajo y funciones',
      info_llega:'Llegada de informaciГіn',
      frustracion:'Frustraciones',
      informal:'Funcionamiento real',
      mejora:'Propuestas de mejora',
      obs:'Observaciones'
    };
    Object.keys(fieldLabels).forEach(function(k){
      scanText(r[k], {from:p.nombre, fromId:p.id, when:null, sourceType:'field', sourceLabel:'Resumen de '+p.nombre+' вҖ” '+fieldLabels[k]});
    });
  });

  // 2) Otras secciones
  var sectionLabels = {
    contexto:'Contexto',
    estructura:'Estructura',
    procesos:'Procesos',
    herramientas:'Herramientas',
    sintesis:'SГӯntesis'
  };
  Object.keys(sectionLabels).forEach(function(sec){
    var data = d[sec] || {};
    Object.keys(data).forEach(function(k){
      var v = data[k];
      if(typeof v === 'string'){
        scanText(v, {from:sectionLabels[sec], fromId:null, when:null, sourceType:'section', sourceLabel:sectionLabels[sec]});
      }
    });
  });

  return hits;
}

// в”Җв”Җ MENTION SUGGEST UI в”Җв”Җ
var MS = { active: null, items: [], index: 0, query: '', startPos: 0, textarea: null };

function attachMentionSupport(){
  // Hooks globales вҖ” los textareas usarГЎn onkeyup en su HTML
  document.addEventListener('click', function(e){
    if(MS.active && !MS.active.contains(e.target) && e.target !== MS.textarea){
      closeMentionSuggest();
    }
  });
}

function onMentionKey(e){
  var ta = e.target;
  if(!ta || ta.tagName !== 'TEXTAREA') return;
  // Si estГЎ abierto el suggest, gestionamos navegaciГіn
  if(MS.active){
    if(e.key === 'ArrowDown'){e.preventDefault(); MS.index = Math.min(MS.index+1, MS.items.length-1); refreshMentionSuggest(); return;}
    if(e.key === 'ArrowUp'){e.preventDefault(); MS.index = Math.max(MS.index-1, 0); refreshMentionSuggest(); return;}
    if(e.key === 'Enter' || e.key === 'Tab'){
      if(MS.items.length>0){ e.preventDefault(); selectMention(MS.items[MS.index]); return; }
    }
    if(e.key === 'Escape'){ e.preventDefault(); closeMentionSuggest(); return; }
  }

  // Detectar @ вҖ” buscar hacia atrГЎs hasta encontrar @ o espacio
  var pos = ta.selectionStart;
  var text = ta.value;
  var before = text.substring(0, pos);
  var atMatch = before.match(/@([\wГЎГ©ГӯГіГәГұГҒГүГҚГ“ГҡГ‘-]*)$/);
  if(atMatch){
    MS.query = atMatch[1].toLowerCase();
    MS.startPos = pos - atMatch[0].length;
    MS.textarea = ta;
    openMentionSuggest(ta);
  } else {
    closeMentionSuggest();
  }
}

function openMentionSuggest(ta){
  var personas = getPersonas();
  var q = MS.query;
  MS.items = personas.filter(function(p){
    return !q || (p.nombre||'').toLowerCase().includes(q);
  }).slice(0, 8);
  MS.index = 0;

  if(!MS.active){
    var box = document.createElement('div');
    box.className = 'mention-suggest';
    document.body.appendChild(box);
    MS.active = box;
  }
  positionMentionSuggest(ta);
  refreshMentionSuggest();
}

function positionMentionSuggest(ta){
  if(!MS.active) return;
  var rect = ta.getBoundingClientRect();
  // PosiciГіn aproximada: bajo el textarea (es lo mГЎs sencillo y predecible)
  MS.active.style.top = (window.scrollY + rect.bottom + 4) + 'px';
  MS.active.style.left = (window.scrollX + rect.left + 12) + 'px';
}

function refreshMentionSuggest(){
  if(!MS.active) return;
  if(MS.items.length === 0){
    MS.active.innerHTML = '<div class="mention-suggest-empty">Sin coincidencias. AГұade personas en Entrevistas.</div>';
    return;
  }
  MS.active.innerHTML = MS.items.map(function(p, i){
    return '<div class="mention-suggest-item '+(i===MS.index?'on':'')+'" onclick="selectMention('+JSON.stringify(p.id).replace(/"/g,'&quot;')+')">'+
      '<div class="avatar">'+inits(p.nombre)+'</div>'+
      '<div style="flex:1;"><div>'+esc(p.nombre)+'</div>'+(p.cargo?'<div class="mention-cargo">'+esc(p.cargo)+'</div>':'')+'</div>'+
      '</div>';
  }).join('');
}

function selectMention(personOrId){
  var pid = typeof personOrId === 'string' ? personOrId : personOrId.id;
  var ta = MS.textarea;
  if(!ta) return;
  var persona = getPersonas().find(function(p){return p.id===pid;});
  if(!persona) { closeMentionSuggest(); return; }
  var insert = '@'+persona.nombre+' ';
  var before = ta.value.substring(0, MS.startPos);
  var after = ta.value.substring(ta.selectionStart);
  ta.value = before + insert + after;
  var newPos = before.length + insert.length;
  ta.setSelectionRange(newPos, newPos);
  ta.focus();
  var evt = new Event('input', {bubbles:true});
  ta.dispatchEvent(evt);
  closeMentionSuggest();
}

function closeMentionSuggest(){
  if(MS.active){
    MS.active.remove();
    MS.active = null;
  }
  MS.textarea = null;
  MS.items = [];
  MS.query = '';
}

function priorityLabel(p){

    (isExpanded ? renderProjectExpanded(p, personas) : '')+

function computeProgress(p){
  if(p.progress_manual) return p.progress || 0;
  var tasks = Array.isArray(p.tasks) ? p.tasks : [];
  var activeTasks = tasks.filter(function(t){return t.status !== 'cancelled';});
  if(activeTasks.length === 0) return p.progress || 0;
  var done = activeTasks.filter(function(t){return t.done || t.status === 'done';}).length;
  return Math.round((done / activeTasks.length) * 100);
}

// в”Җв”Җ EXPORTAR VISTAS в”Җв”Җ

async function captureView(projectId, viewKey){
  var el = document.getElementById('capture_'+projectId+'_'+viewKey);
  if(!el){ alert('No se pudo encontrar la vista para capturar.'); return null; }
  if(typeof html2canvas === 'undefined'){ alert('La librerГӯa de captura no se cargГі. Comprueba tu conexiГіn y recarga la pГЎgina.'); return null; }
  try {
    var canvas = await html2canvas(el, {
      backgroundColor: '#F7F4EC',
      scale: 2,
      logging: false,
      useCORS: true,
      width: el.scrollWidth,
      height: el.scrollHeight,
      windowWidth: el.scrollWidth
    });
    return canvas;
  } catch(e){
    console.error(e);
    alert('Error capturando la vista: '+e.message);
    return null;
  }
}

async function exportViewAsImage(projectId, viewKey){
  var canvas = await captureView(projectId, viewKey);
  if(!canvas) return;
  var project = (S.projects||[]).find(function(p){return p.id === projectId;});
  var viewLabels = {timeline:'timeline', kanban:'kanban', summary:'foto-ejecutiva'};
  var fileName = ((project && project.title) || 'proyecto').replace(/[^a-z0-9ГЎГ©ГӯГіГәГұ\s\-_]/gi,'').replace(/\s+/g,'_') + '_' + viewLabels[viewKey] + '_' + new Date().toISOString().slice(0,10) + '.png';
  canvas.toBlob(function(blob){
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);}, 60000);
  }, 'image/png');
}

async function includeViewInReport(projectId, viewKey){
  var project = (S.projects||[]).find(function(p){return p.id === projectId;});
  if(!project) return;
  if(!confirm('Generar informe de seguimiento del proyecto con IA e incluir la vista actual como imagen?\n\nPuede tardar 1-2 minutos.'))return;
  showLoadingModal('Capturando la vista actualвҖҰ');
  var canvas = await captureView(projectId, viewKey);
  if(!canvas){ closeModal(); return; }
  var imageDataUrl = canvas.toDataURL('image/png');

  showLoadingModal('Generando informe de seguimiento con IAвҖҰ\n\nEsto tarda un poco (1-2 minutos). No cierres esta pestaГұa.');
  var viewLabels = {timeline:'Timeline del proyecto', kanban:'Kanban de tareas', summary:'Foto ejecutiva'};
  try {
    var data = await api('/api/projects/'+projectId+'/follow-up-report', {method:'POST', body:{
      embedImageDataUrl: imageDataUrl,
      embedImageLabel: viewLabels[viewKey] || 'Vista visual'
    }});
    var content = ensureHtml(data.report || '');
    S.activeReport = {
      id: data.reportId,
      title: data.title || 'Informe de seguimiento',
      content: content,
      report_type: 'seguimiento_proyecto',
      created_at: new Date().toISOString()
    };
    closeModal();
    nav('informe');
  } catch(e){
    closeModal();
    alert('Error: '+e.message);
  }
}

async function shareView(projectId, viewKey){
  var canvas = await captureView(projectId, viewKey);
  if(!canvas) return;
  var project = (S.projects||[]).find(function(p){return p.id === projectId;});
  var viewLabels = {timeline:'Timeline', kanban:'Kanban', summary:'Foto ejecutiva'};
  var viewLabel = viewLabels[viewKey] || 'vista';
  var subject = '['+(S.current.nombre||'ConsultorГӯa')+'] '+viewLabel+' вҖ” '+((project && project.title) || 'proyecto');
  var body = 'Hola,\n\nTe adjunto la vista actual del proyecto "'+((project && project.title) || 'proyecto')+'" ('+viewLabel+') para tu revisiГіn.\n\nAtentamente,\n'+(S.current.consultora || '');

  // Descarga la imagen y abre el email
  var fileName = viewLabel.replace(/\s+/g,'_') + '_' + new Date().toISOString().slice(0,10) + '.png';
  canvas.toBlob(function(blob){
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);}, 60000);
    // DespuГ©s abre mailto
    setTimeout(function(){
      var mailto = 'mailto:?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(body+'\n\n(Adjunta el archivo '+fileName+' que se acaba de descargar.)');
      window.open(mailto);
    }, 500);
  }, 'image/png');
}

function personaInitial(personaId, personas){

  var p = (personas || []).find(function(x){return x.id === personaId;});

function personaName(personaId, personas){
  if(!personaId) return 'Sin asignar';
  if(personaId === '__me__') return 'Yo (consultora)';

function renderAvatar(personaId, personas, extraClass){
  extraClass = extraClass || '';
  var initial = personaInitial(personaId, personas);
  if(!initial) return '';
  var isMe = personaId === '__me__';
  return '<span class="tl-avatar '+(isMe?'me':'')+' '+extraClass+'" title="'+esc(personaName(personaId, personas))+'">'+esc(initial)+'</span>';

function daysUntil(dateStr){
  if(!dateStr) return null;
  var d = new Date(dateStr+'T00:00:00');
  var today = new Date(); today.setHours(0,0,0,0);
  return Math.round((d.getTime() - today.getTime()) / 86400000);
}

function humanDate(dateStr){
  if(!dateStr) return '';
  var d = new Date(dateStr+'T00:00:00');
  return d.toLocaleDateString('es-ES', {day:'numeric', month:'long', year:'numeric'});
}

function shortDate(dateStr){
  if(!dateStr) return '';
  var d = new Date(dateStr+'T00:00:00');
  return d.toLocaleDateString('es-ES', {day:'numeric', month:'short'});
}

var _openPopover = null;

function closeDetailPopover(){
  if(_openPopover){
    _openPopover.remove();
    _openPopover = null;
  }
  var ov = document.getElementById('detailPopOverlay');
  if(ov) ov.remove();
}

function openDetailPopover(clickEvent, htmlContent){
  closeDetailPopover();
  // Overlay para cerrar al clicar fuera
  var overlay = document.createElement('div');
  overlay.id = 'detailPopOverlay';
  overlay.className = 'detail-pop-overlay';
  overlay.onclick = closeDetailPopover;
  document.body.appendChild(overlay);

  var pop = document.createElement('div');
  pop.className = 'detail-pop';
  pop.innerHTML = htmlContent;
  document.body.appendChild(pop);
  _openPopover = pop;

  // Posicionar cerca del click, ajustando para no salirse
  var rect = pop.getBoundingClientRect();
  var cx = clickEvent ? (clickEvent.clientX || clickEvent.pageX || 0) : window.innerWidth/2;
  var cy = clickEvent ? (clickEvent.clientY || clickEvent.pageY || 0) : window.innerHeight/2;
  var left = cx + 12;
  var top = cy + 12;
  if(left + rect.width > window.innerWidth - 12) left = window.innerWidth - rect.width - 12;
  if(top + rect.height > window.innerHeight - 12) top = cy - rect.height - 12;
  if(top < 12) top = 12;
  if(left < 12) left = 12;
  pop.style.left = left + 'px';
  pop.style.top = top + 'px';
}

async function quickChangeTaskStatus(projectId, taskId, newStatus){
  var project = (S.projects||[]).find(function(x){return x.id === projectId;});
  if(!project) return;
  var tasks = Array.isArray(project.tasks) ? project.tasks.slice() : [];
  tasks = tasks.map(function(t){
    if(t.id !== taskId) return t;
    var updated = Object.assign({}, t, {updated_at: new Date().toISOString()});
    if(newStatus === 'done'){
      updated.done = true;
      // mantenemos el status previo por si quieren restaurar
    } else {
      updated.done = false;
      updated.status = newStatus;
    }
    return updated;
  });
  project.tasks = tasks;
  await persistProject(project);
  closeDetailPopover();
  renderProjectsList(getPersonas());
}

// в”Җв”Җ VISTA TIMELINE в”Җв”Җ
function renderTimelineView(project, tasks, interactions, personas){
  var today = new Date();
  today.setHours(0,0,0,0);

  // Recolectar todas las fechas de items (tareas + interacciones)
  var itemsWithDate = [];
  var itemsWithoutDate = [];

  tasks.forEach(function(t){
    if(t.target_date){
      var d = new Date(t.target_date+'T00:00:00');
      itemsWithDate.push({kind:'task', item:t, time:d.getTime()});
    } else if(!t.done){
      itemsWithoutDate.push({kind:'task', item:t});
    }
  });
  interactions.forEach(function(it){
    if(it.date){
      var d = new Date(it.date+'T00:00:00');
      itemsWithDate.push({kind:'interaction', item:it, time:d.getTime()});
    }
  });

  if(itemsWithDate.length === 0 && itemsWithoutDate.length === 0){
    return '<div class="tl-wrap"><div style="text-align:center;padding:2rem;color:var(--text3);font-size:13px;">Sin tareas ni interacciones aГәn. AГұade tareas con fecha para verlas en el timeline.</div></div>';
  }

  // El rango del timeline se calcula asГӯ:
  // - Empieza con la fecha mГЎs antigua de items o HOY (lo que sea antes)
  // - Termina con la fecha mГЎs lejana de items o la fecha objetivo del proyecto (lo que sea mГЎs tarde)
  // - AГұade un pequeГұo margen
  var itemTimes = itemsWithDate.map(function(e){return e.time;});
  var targetTime = project.target_date ? new Date(project.target_date+'T00:00:00').getTime() : null;

  var minT, maxT;
  if(itemTimes.length > 0){
    minT = Math.min.apply(null, itemTimes);
    maxT = Math.max.apply(null, itemTimes);
  } else {
    minT = today.getTime();
    maxT = today.getTime();
  }
  // Incluir HOY en el rango
  minT = Math.min(minT, today.getTime());
  maxT = Math.max(maxT, today.getTime());
  // Incluir fecha objetivo si existe y estГЎ razonablemente cerca (< 6 meses del Гәltimo item)
  // Si estГЎ muy lejos, no la usamos para el eje pero la mostramos como marcador
  var showTargetMarker = false;
  if(targetTime){
    var sixMonths = 86400000 * 180;
    if(targetTime <= maxT + sixMonths){
      maxT = Math.max(maxT, targetTime);
    } else {
      showTargetMarker = true; // fuera del rango: se muestra separado
    }
  }

  // Margen: si el rango total es menor de 60 dГӯas, forzar mГӯnimo 60 dГӯas
  var minRange = 86400000 * 60;
  if(maxT - minT < minRange){
    var centro = (minT + maxT) / 2;
    minT = centro - minRange/2;
    maxT = centro + minRange/2;
  }
  // Padding suave en tiempo
  var range = maxT - minT;
  var pad = range * 0.05;
  minT -= pad;
  maxT += pad;
  range = maxT - minT;

  // Escala pintada del 5% al 95% del canvas
  function pctOf(t){ return 5 + ((t - minT) / range) * 90; }

  // Generar ticks mensuales
  var ticks = [];
  var tickDate = new Date(minT);
  tickDate.setDate(1);
  tickDate.setHours(0,0,0,0);
  while(tickDate.getTime() <= maxT){
    if(tickDate.getTime() >= minT){
      ticks.push({time: tickDate.getTime(), label: tickDate.toLocaleDateString('es-ES',{month:'short', year:'2-digit'})});
    }
    tickDate.setMonth(tickDate.getMonth()+1);
  }
  // Si hay demasiados ticks (>12), filtrar cada 2
  if(ticks.length > 12){
    ticks = ticks.filter(function(_, i){return i % 2 === 0;});
  }

  // Sort items por tiempo
  var sortedItems = itemsWithDate.slice().sort(function(a,b){return a.time - b.time;});

  // Ancho del canvas: adaptativo segГәn nГәmero de items
  var canvasWidthPx = Math.max(900, sortedItems.length * 170);
  var canvasHeightPx = 460;
  // SeparaciГіn mГӯnima entre centros en la misma fila (px)
  // Como cada cajita mide ~200px, necesitamos ~220-240px de gap para que no se solapen
  var minGapPct = (240 / canvasWidthPx) * 100;

  // Filas alternando arriba/abajo del eje. Con cajitas de dos lГӯneas (~50px alto) hace falta mГЎs separaciГіn
  var rowOffsets = [-70, 70, -135, 135, -200, 200];
  var rowLastX = {};
  rowOffsets.forEach(function(_, i){ rowLastX[i] = -Infinity; });

  var canvasHtml = '<div class="tl-canvas" style="min-width:'+canvasWidthPx+'px;height:'+canvasHeightPx+'px;">'+
    '<div class="tl-axis"></div>';

  // Ticks mensuales
  ticks.forEach(function(t){
    var left = pctOf(t.time);
    canvasHtml += '<div class="tl-tick" style="left:'+left+'%;top:calc(50% + 2px);">'+
      '<div class="tl-tick-line"></div>'+
      '<div class="tl-tick-label">'+esc(t.label)+'</div>'+
      '</div>';
  });

  // LГӯnea de hoy
  var todayPct = pctOf(today.getTime());
  if(todayPct >= 5 && todayPct <= 95){
    canvasHtml += '<div class="tl-today-line" style="left:'+todayPct+'%;"><div class="tl-today-label">HOY</div></div>';
  }

  // Marcador de fecha objetivo (si estГЎ en el rango)
  if(targetTime && !showTargetMarker){
    var targetPct = pctOf(targetTime);
    if(targetPct >= 5 && targetPct <= 95){
      canvasHtml += '<div style="position:absolute;left:'+targetPct+'%;top:0;bottom:0;width:2px;background:var(--accent);opacity:.35;z-index:1;">'+
        '<div style="position:absolute;top:-8px;transform:translateX(-50%);font-size:9px;background:var(--accent);color:white;padding:1px 5px;border-radius:6px;font-weight:600;letter-spacing:.5px;white-space:nowrap;">OBJETIVO</div>'+
        '</div>';
    }
  }

  // Items: para cada uno, asignar fila que evite solape
  sortedItems.forEach(function(entry, idx){
    var left = pctOf(entry.time);
    var itemDate = new Date(entry.time);

    if(entry.kind === 'task'){
      var assignedRow = 0;
      var placed = false;
      for(var r=0; r<rowOffsets.length; r++){
        if(left - rowLastX[r] >= minGapPct){
          assignedRow = r;
          placed = true;
          break;
        }
      }
      if(!placed) assignedRow = rowOffsets.length - 1;
      rowLastX[assignedRow] = left;
      var offset = rowOffsets[assignedRow];
      var top = 'calc(50% + '+offset+'px)';
      var connectorTop = offset < 0 ? 'calc(50% + '+offset+'px)' : 'calc(50%)';
      var connectorHeight = Math.abs(offset);

      var t = entry.item;
      var cls = 'tl-task';
      if(t.done) cls += ' done';
      else if(t.status === 'blocked') cls += ' blocked';
      else if(entry.time < today.getTime()) cls += ' overdue';
      else if(entry.time === today.getTime()) cls += ' today';
      var dateStr = itemDate.toLocaleDateString('es-ES',{day:'numeric',month:'short'}).replace('.','');
      var respInitial = personaInitial(t.responsible_persona_id, personas);
      var avatarHtml = respInitial ? renderAvatar(t.responsible_persona_id, personas) : '';
      var fullTitle = t.title + ' вҖ” ' + dateStr + (respInitial ? ' В· '+personaName(t.responsible_persona_id, personas) : '');

      canvasHtml += '<div class="tl-task-connector" style="left:'+left+'%;top:'+connectorTop+';height:'+connectorHeight+'px;"></div>';
      canvasHtml += '<div class="'+cls+'" style="left:'+left+'%;top:'+top+';" onclick="event.stopPropagation();openTaskDetail(event,\''+project.id+'\',\''+t.id+'\')" title="'+esc(fullTitle)+'">'+
        '<div class="tl-task-header">'+
          '<span class="tl-task-dot"></span>'+
          '<span class="tl-task-title">'+esc((t.title||'').substring(0,32)+((t.title||'').length>32?'вҖҰ':''))+'</span>'+
        '</div>'+
        '<div class="tl-task-meta">'+
          avatarHtml+
          '<span class="tl-task-meta-date">рҹ“… '+esc(dateStr)+'</span>'+
        '</div>'+
        '</div>';
    } else {
      var typeIcons = {meeting:'рҹӨқ', call:'рҹ“һ', email:'вңүпёҸ', visit:'рҹҸў', note:'рҹ“қ'};
      var icon = typeIcons[entry.item.type] || 'рҹ’¬';
      var interDateStr = itemDate.toLocaleDateString('es-ES',{day:'numeric',month:'short'}).replace('.','');
      var itTitle = (entry.item.title || 'InteracciГіn') + ' вҖ” ' + interDateStr;
      canvasHtml += '<div class="tl-milestone" style="left:'+left+'%;top:50%;" onclick="event.stopPropagation();openInteractionDetail(event,\''+project.id+'\',\''+entry.item.id+'\')" title="'+esc(itTitle)+'">'+icon+
        '<div class="tl-milestone-date">'+esc(interDateStr)+'</div>'+
        '</div>';
    }
  });

  canvasHtml += '</div>';

  // Aviso de fecha objetivo lejana
  var targetOutHtml = '';
  if(showTargetMarker && targetTime){
    var targetDateStr = new Date(targetTime).toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'});
    targetOutHtml = '<div class="tl-nofecha" style="border-color:var(--accent);background:var(--accent-l);color:var(--accent);"><strong>рҹҺҜ Fecha objetivo del proyecto:</strong> '+esc(targetDateStr)+' <span style="opacity:.7;">(fuera del rango del timeline por estar lejos de las tareas actuales)</span></div>';
  }

  // Tareas sin fecha
  var noFechaHtml = '';
  if(itemsWithoutDate.length > 0){
    noFechaHtml = '<div class="tl-nofecha">'+
      '<strong style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;">Sin fecha aГәn:</strong> '+
      itemsWithoutDate.map(function(entry){
        return '<span class="tl-nofecha-item" onclick="editTaskModal(\''+project.id+'\',\''+entry.item.id+'\')">'+esc(entry.item.title||'')+'</span>';
      }).join(' ')+
      '</div>';
  }

  return '<div class="tl-wrap">'+
    '<div class="tl-header">'+
      '<span>рҹ“Ҡ Timeline del proyecto</span>'+
      '<span>'+sortedItems.length+' hitos В· '+itemsWithoutDate.length+' sin fecha</span>'+
    '</div>'+
    canvasHtml + targetOutHtml + noFechaHtml +
    '<div style="margin-top:1rem;padding-top:1rem;border-top:1px dashed var(--border);font-size:11px;color:var(--text3);display:flex;gap:1rem;flex-wrap:wrap;">'+
      '<span>рҹ”ө Tarea pendiente</span>'+
      '<span style="color:var(--accent);">вң… Hecha</span>'+
      '<span style="color:var(--danger);">вҡ пёҸ Vencida</span>'+
      '<span>рҹӨқрҹ“һвңүпёҸ Interacciones</span>'+
      (targetTime && !showTargetMarker ? '<span style="color:var(--accent);">рҹҺҜ Objetivo del proyecto</span>' : '')+
    '</div>'+
    '</div>';
}

// в”Җв”Җ VISTA KANBAN в”Җв”Җ
function renderKanbanView(project, tasks, personas){
  var cols = [
    {key:'pending', title:'рҹ”ө Pendientes', filter:function(t){return !t.done && (!t.status || t.status==='pending');}},
    {key:'in_progress', title:'рҹҹЎ En curso', filter:function(t){return !t.done && t.status==='in_progress';}},
    {key:'blocked', title:'рҹ”ҙ Bloqueadas', filter:function(t){return !t.done && t.status==='blocked';}},
    {key:'done', title:'вң… Hechas', filter:function(t){return t.done;}},
    {key:'discarded', title:'вҡ« Descartadas', filter:function(t){return t.status==='discarded';}}
  ];

  if(tasks.length === 0){
    return '<div style="text-align:center;padding:2rem;color:var(--text3);font-size:13px;background:var(--surface2);border-radius:var(--rsm);">Sin tareas aГәn. AГұade la primera para verla aquГӯ en el board.</div>'+
      '<div style="text-align:center;margin-top:1rem;"><button class="btn bsm btnp" onclick="addTaskInline(\''+project.id+'\')">+ AГұadir tarea</button></div>';
  }

  var today = new Date(); today.setHours(0,0,0,0);
  var totalActive = tasks.filter(function(t){return t.status !== 'discarded';}).length;

  var html = '<div style="font-size:11px;color:var(--text3);margin-bottom:8px;text-align:center;">рҹ’Ў Arrastra las tarjetas entre columnas para cambiar su estado</div>'+
    '<div class="kb-wrap">';
  cols.forEach(function(col){
    var colTasks = tasks.filter(col.filter);
    var pct = totalActive > 0 && col.key !== 'discarded' ? Math.round((colTasks.length / totalActive) * 100) : 0;
    html += '<div class="kb-col" data-col="'+col.key+'" data-project="'+project.id+'" ondragover="kbDragOver(event)" ondragleave="kbDragLeave(event)" ondrop="kbDrop(event)">'+
      '<div class="kb-col-title">'+col.title+
        '<span class="kb-col-count">'+colTasks.length+(col.key !== 'discarded' && totalActive > 0 ? ' В· '+pct+'%' : '')+'</span>'+
      '</div>'+
      '<div class="kb-col-drop-hint">вҶ“ Soltar aquГӯ</div>';
    if(colTasks.length === 0){
      html += '<div class="kb-empty">вҖ”</div>';
    } else {
      colTasks.forEach(function(t){
        var isOverdue = t.target_date && new Date(t.target_date+'T00:00:00') < today && !t.done;
        var dateStr = t.target_date ? shortDate(t.target_date) : '';
        var avatar = renderAvatar(t.responsible_persona_id, personas);
        html += '<div class="kb-card '+col.key+'" draggable="true" data-task="'+t.id+'" ondragstart="kbDragStart(event)" ondragend="kbDragEnd(event)" onclick="if(!event.defaultPrevented)openTaskDetail(event,\''+project.id+'\',\''+t.id+'\')">'+
          '<div class="kb-card-title">'+
            '<span class="kb-card-dot"></span>'+
            '<span class="kb-card-title-text">'+esc(t.title||'')+'</span>'+
          '</div>'+
          '<div class="kb-card-meta">'+
            avatar+
            (dateStr ? '<span'+(isOverdue?' style="color:var(--danger);font-weight:600;"':'')+'>рҹ“… '+esc(dateStr)+(isOverdue?' вҡ пёҸ':'')+'</span>' : '')+
          '</div>'+
          '</div>';
      });
    }
    // BotГіn de aГұadir en las columnas activas
    if(col.key === 'pending' || col.key === 'in_progress'){
      html += '<button class="kb-add-btn" onclick="addTaskInline(\''+project.id+'\')">+ AГұadir</button>';
    }
    html += '</div>';
  });
  html += '</div>';
  return html;
}

// в”Җв”Җ DRAG & DROP KANBAN в”Җв”Җ
var _kbDragTaskId = null;
var _kbDragProjectId = null;

function kbDragStart(e){
  var card = e.currentTarget;
  _kbDragTaskId = card.getAttribute('data-task');
  var col = card.closest('.kb-col');
  _kbDragProjectId = col ? col.getAttribute('data-project') : null;
  card.classList.add('dragging');
  if(e.dataTransfer){
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', _kbDragTaskId); } catch(_){}
  }
}

function kbDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.kb-col.drag-over').forEach(function(c){ c.classList.remove('drag-over'); });
}

function kbDragOver(e){
  e.preventDefault();
  if(e.dataTransfer) e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function kbDragLeave(e){
  // Solo quitar si estamos saliendo del contenedor (no de un hijo)
  if(!e.currentTarget.contains(e.relatedTarget)){
    e.currentTarget.classList.remove('drag-over');
  }
}

async function kbDrop(e){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  var targetCol = e.currentTarget.getAttribute('data-col');
  var projectId = e.currentTarget.getAttribute('data-project');
  if(!_kbDragTaskId || !projectId || !targetCol) return;
  // Prevenir que dispare el click luego
  e.stopPropagation();

  var project = (S.projects||[]).find(function(x){return x.id === projectId;});
  if(!project) return;
  var tasks = Array.isArray(project.tasks) ? project.tasks.slice() : [];
  var moved = false;
  tasks = tasks.map(function(t){
    if(t.id !== _kbDragTaskId) return t;
    // ВҝYa estaba en esa columna?
    var currentCol = t.done ? 'done' : (t.status || 'pending');
    if(currentCol === targetCol) return t;
    var updated = Object.assign({}, t, {updated_at: new Date().toISOString()});
    if(targetCol === 'done'){
      updated.done = true;
    } else {
      updated.done = false;
      updated.status = targetCol;
    }
    moved = true;
    return updated;
  });
  _kbDragTaskId = null;
  _kbDragProjectId = null;
  if(moved){
    project.tasks = tasks;
    await persistProject(project);
    renderProjectsList(getPersonas());
  }
}

// в”Җв”Җ VISTA FOTO EJECUTIVA в”Җв”Җ
function renderSummaryView(project, tasks, interactions, personas){
  var today = new Date(); today.setHours(0,0,0,0);

  // Progreso por responsable
  var byResp = {};
  tasks.forEach(function(t){
    var key = t.responsible_persona_id || 'unassigned';
    if(!byResp[key]) byResp[key] = {total:0, done:0, name:''};
    byResp[key].total++;
    if(t.done) byResp[key].done++;
  });
  var respCards = Object.keys(byResp).map(function(k){
    var d = byResp[k];
    var name = k === '__me__' ? 'Yo (consultora)' : (k === 'unassigned' ? 'Sin asignar' : (personas.find(function(p){return p.id===k;})||{}).nombre || 'Desconocido');
    var pct = d.total > 0 ? Math.round((d.done/d.total)*100) : 0;
    return {name:name, done:d.done, total:d.total, pct:pct, id:k};
  }).sort(function(a,b){return b.total - a.total;});

  // PrГіximas 5 tareas (por fecha ascendente)
  var upcoming = tasks.filter(function(t){
    return !t.done && t.status !== 'discarded' && t.target_date;
  }).sort(function(a,b){return (a.target_date||'').localeCompare(b.target_date||'');}).slice(0, 5);

  // Bloqueadas
  var blocked = tasks.filter(function(t){return !t.done && t.status === 'blocked';});

  // Actividad reciente: Гәltimas 3 interacciones + Гәltimas 3 tareas hechas
  var recentInter = interactions.slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');}).slice(0, 3);
  var recentDone = tasks.filter(function(t){return t.done;}).slice(0, 3);

  // Contar interacciones Гәltimos 30 dГӯas
  var monthAgo = new Date(today); monthAgo.setDate(monthAgo.getDate()-30);
  var recentInterMonth = interactions.filter(function(it){
    if(!it.date) return false;
    return new Date(it.date+'T00:00:00') >= monthAgo;
  });

  var progress = computeProgress(project);
  var doneCount = tasks.filter(function(t){return t.done;}).length;
  var pendingCount = tasks.filter(function(t){return !t.done && t.status !== 'discarded';}).length;

  // Info del objetivo
  var daysToTarget = project.target_date ? daysUntil(project.target_date) : null;
  var targetHtml = '';
  if(project.target_date){
    var daysColor = daysToTarget < 0 ? 'var(--danger)' : (daysToTarget < 30 ? '#B8860B' : 'var(--accent)');
    var daysText = daysToTarget < 0 ? Math.abs(daysToTarget)+' dГӯa(s) de retraso' : (daysToTarget === 0 ? 'HOY' : 'en '+daysToTarget+' dГӯas');
    targetHtml = '<div style="margin-top:.5rem;font-size:12px;color:var(--text2);">рҹҺҜ <strong>Objetivo:</strong> '+esc(humanDate(project.target_date))+' <span style="color:'+daysColor+';font-weight:600;">('+daysText+')</span></div>';
  }

  return '<div class="sm-wrap">'+
    // Estado global
    '<div class="sm-card" style="grid-column:span 2;">'+
      '<div class="sm-card-title">Estado global</div>'+
      '<div style="display:flex;align-items:center;gap:1rem;margin-bottom:8px;">'+
        '<div style="font-size:42px;font-weight:300;color:'+statusColor(project.status)+';line-height:1;">'+progress+'%</div>'+
        '<div style="flex:1;">'+
          '<div class="pbar" style="margin-bottom:8px;"><div class="pfill" style="width:'+progress+'%;background:'+statusColor(project.status)+';"></div></div>'+
          '<div style="font-size:12px;color:var(--text2);">'+doneCount+' hechas В· '+pendingCount+' pendientes В· '+recentInterMonth.length+' interacciones Гәltimo mes</div>'+
        '</div>'+
      '</div>'+
      targetHtml+
    '</div>'+

    // Bloqueos
    '<div class="sm-card">'+
      '<div class="sm-card-title">рҹ”ҙ Bloqueos ('+blocked.length+')</div>'+
      (blocked.length === 0
        ? '<div style="font-size:12px;color:var(--text3);font-style:italic;">Sin bloqueos. вңЁ</div>'
        : blocked.map(function(t){
            var resp = personas.find(function(p){return p.id===t.responsible_persona_id;});
            return '<div class="sm-blocked" onclick="openTaskDetail(event,\''+project.id+'\',\''+t.id+'\')" style="cursor:pointer;">'+
              '<div class="sm-blocked-title">'+esc(t.title)+'</div>'+
              (resp ? '<div style="font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px;">'+renderAvatar(t.responsible_persona_id, personas)+' '+esc(resp.nombre)+'</div>' : '')+
              '</div>';
          }).join(''))+
    '</div>'+

    // PrГіximas fechas
    '<div class="sm-card">'+
      '<div class="sm-card-title">вҸ° PrГіximas fechas ('+upcoming.length+')</div>'+
      (upcoming.length === 0
        ? '<div style="font-size:12px;color:var(--text3);font-style:italic;">Sin tareas con fecha prГіxima.</div>'
        : upcoming.map(function(t){
            var d = new Date(t.target_date+'T00:00:00');
            var isPast = d < today;
            var daysLeft = daysUntil(t.target_date);
            var badgeText = isPast ? Math.abs(daysLeft)+'d atraso' : (daysLeft === 0 ? 'HOY' : daysLeft+'d');
            var badgeColor = isPast ? 'var(--danger)' : (daysLeft < 8 ? '#B8860B' : 'var(--text3)');
            return '<div onclick="openTaskDetail(event,\''+project.id+'\',\''+t.id+'\')" style="cursor:pointer;display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--surface);border-radius:var(--rsm);margin-bottom:4px;font-size:12px;">'+
              renderAvatar(t.responsible_persona_id, personas)+
              '<span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(t.title)+'</span>'+
              '<span style="font-size:10px;padding:2px 7px;background:var(--surface2);color:'+badgeColor+';border-radius:8px;font-weight:600;white-space:nowrap;">'+esc(badgeText)+'</span>'+
              '</div>';
          }).join(''))+
    '</div>'+

    // Por responsable
    '<div class="sm-card" style="grid-column:span 2;">'+
      '<div class="sm-card-title">рҹ‘Ҙ Progreso por responsable</div>'+
      (respCards.length === 0
        ? '<div style="font-size:12px;color:var(--text3);font-style:italic;">Sin tareas asignadas.</div>'
        : respCards.map(function(rc){
            return '<div class="sm-person">'+
              '<div class="sm-person-circle" style="--pct:'+(rc.pct*3.6)+'deg;">'+
                '<span class="sm-person-circle-text">'+rc.pct+'%</span>'+
              '</div>'+
              '<div class="sm-person-info">'+
                '<div class="sm-person-name">'+esc(rc.name)+'</div>'+
                '<div class="sm-person-stats">'+rc.done+' de '+rc.total+' tareas completadas</div>'+
              '</div>'+
              '</div>';
          }).join(''))+
    '</div>'+

    // Actividad reciente
    ((recentInter.length > 0 || recentDone.length > 0)
      ? '<div class="sm-card" style="grid-column:span 2;">'+
        '<div class="sm-card-title">вңЁ Actividad reciente</div>'+
        (recentDone.length > 0
          ? '<div style="margin-bottom:.5rem;"><div style="font-size:11px;color:var(--text3);margin-bottom:4px;">Гҡltimas completadas:</div>'+
            recentDone.map(function(t){
              return '<div onclick="openTaskDetail(event,\''+project.id+'\',\''+t.id+'\')" style="cursor:pointer;font-size:12px;padding:3px 0;color:var(--text2);">вң… '+esc(t.title)+'</div>';
            }).join('')+
            '</div>'
          : '')+
        (recentInter.length > 0
          ? '<div><div style="font-size:11px;color:var(--text3);margin-bottom:4px;">Гҡltimas interacciones:</div>'+
            recentInter.map(function(it){
              var typeIcons = {meeting:'рҹӨқ', call:'рҹ“һ', email:'вңүпёҸ', visit:'рҹҸў', note:'рҹ“қ'};
              var icon = typeIcons[it.type] || 'рҹ’¬';
              return '<div onclick="openInteractionDetail(event,\''+project.id+'\',\''+it.id+'\')" style="cursor:pointer;font-size:12px;padding:3px 0;color:var(--text2);">'+icon+' '+esc(it.title || it.type || 'InteracciГіn')+(it.date?' <span style="color:var(--text3);">В· '+shortDate(it.date)+'</span>':'')+'</div>';
            }).join('')+
            '</div>'
          : '')+
        '</div>'
      : '')+
    '</div>';
}

    closeModal();
    alert('Error: '+e.message);

}

async function createProposedProjects(){
  var selected = [];
  document.querySelectorAll('.proposal-check:checked').forEach(function(el){
    var idx = parseInt(el.getAttribute('data-idx'));
    var titleEl = document.querySelector('.proposal-title[data-idx="'+idx+'"]');
    var descEl = document.querySelector('.proposal-desc[data-idx="'+idx+'"]');
    var priEl = document.querySelector('.proposal-priority[data-idx="'+idx+'"]');
    var respEl = document.querySelector('.proposal-responsible[data-idx="'+idx+'"]');

    // Recoger tareas marcadas para este proyecto
    var proposedTasks = [];
    document.querySelectorAll('.proposal-task-check[data-pidx="'+idx+'"]:checked').forEach(function(tel){
      var tidx = tel.getAttribute('data-tidx');
      var tTitleEl = document.querySelector('.proposal-task-title[data-pidx="'+idx+'"][data-tidx="'+tidx+'"]');
      var tRespEl = document.querySelector('.proposal-task-resp[data-pidx="'+idx+'"][data-tidx="'+tidx+'"]');
      var tTitle = (tTitleEl ? tTitleEl.value.trim() : '');
      if(!tTitle) return;
      proposedTasks.push({
        id: 't_' + Date.now() + '_' + Math.random().toString(36).substr(2,4) + '_' + tidx,
        title: tTitle,
        done: false,
        responsible_persona_id: tRespEl ? tRespEl.value : '',
        target_date: null,
        notes: '',
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString()
      });
    });

    selected.push({
      title: titleEl.value.trim(),
      description: descEl.value.trim(),
      priority: priEl.value,
      responsible_persona_id: respEl.value || null,
      status: 'pending',
      progress: 0,
      tasks: proposedTasks,
      interactions: [],
      progress_manual: false
    });
  });
  if(selected.length === 0){ alert('No has seleccionado ningГәn proyecto.'); return; }
  var totalTasks = selected.reduce(function(sum, p){ return sum + p.tasks.length; }, 0);
  closeModal();
  showLoadingModal('Creando '+selected.length+' proyecto(s)'+(totalTasks>0?' con '+totalTasks+' tarea(s)':'')+'вҖҰ');
  try {
    for(var i=0;i<selected.length;i++){
      await api('/api/consultancies/'+S.current.id+'/projects', {method:'POST', body:selected[i]});
    }
    closeModal();
    renderProyectos(document.getElementById('appContent'));
  } catch(e){
    closeModal();
    alert('Error creando proyectos: '+e.message);
  }
}

async function saveTask(pid, tid){
  var title = document.getElementById('tk_title').value.trim();
  if(!title){ alert('La descripciГіn de la tarea es obligatoria'); return; }
  var project = (S.projects||[]).find(function(x){return x.id === pid;});
  if(!project) return;
  var tasks = Array.isArray(project.tasks) ? project.tasks.slice() : [];
  var isDone = document.getElementById('tk_done').checked;
  var status = document.getElementById('tk_status').value || 'pending';
  var newTask = {
    id: tid || 't_' + Date.now() + '_' + Math.random().toString(36).substr(2,4),
    title: title,
    done: isDone,
    status: status,
    responsible_persona_id: document.getElementById('tk_responsible').value,
    target_date: document.getElementById('tk_date').value || null,
    notes: document.getElementById('tk_notes').value.trim(),
    created_at: tid ? (tasks.find(function(x){return x.id===tid;})||{}).created_at : new Date().toISOString(),
    updated_at: new Date().toISOString()
  };
  if(tid){
    tasks = tasks.map(function(t){ return t.id === tid ? newTask : t; });
  } else {
    tasks.push(newTask);
  }
  project.tasks = tasks;
  await persistProject(project);
  closeModal();
  renderProjectsList(getPersonas());
}

async function toggleTaskDone(pid, tid, done){
  var project = (S.projects||[]).find(function(x){return x.id === pid;});
  if(!project) return;
  var tasks = Array.isArray(project.tasks) ? project.tasks.slice() : [];
  tasks = tasks.map(function(t){ return t.id === tid ? Object.assign({}, t, {done: done, updated_at: new Date().toISOString()}) : t; });
  project.tasks = tasks;
  await persistProject(project);
  renderProjectsList(getPersonas());
}

async function deleteTask(pid, tid){
  if(!confirm('ВҝEliminar esta tarea?')) return;
  var project = (S.projects||[]).find(function(x){return x.id === pid;});
  if(!project) return;
  project.tasks = (project.tasks || []).filter(function(t){return t.id !== tid;});
  await persistProject(project);
  renderProjectsList(getPersonas());
}

var searchTimer = null;

function onSearchInput(q){

}

async function runSearch(q){
  if(!S.current) return;
  showModal('<div id="searchResultsModal"><h2>рҹ”Қ Buscando "'+esc(q)+'"вҖҰ</h2><div style="text-align:center;padding:2rem;"><div class="dots"><span></span><span></span><span></span></div></div></div>');
  try {
    var data = await api('/api/consultancies/'+S.current.id+'/search', {method:'POST', body:{query: q}});
    // Si mientras buscГЎbamos el usuario cambiГі la bГәsqueda, no reemplazamos
    if(lastSearchQuery !== q) return;
    renderSearchResults(q, data.results || []);
  } catch(e){
    var modal = document.getElementById('searchResultsModal');
    if(modal) modal.innerHTML = '<h2>рҹ”Қ BГәsqueda</h2><div class="alert alert-danger">Error: '+esc(e.message)+'</div><div class="modal-act"><button class="btn" onclick="closeModal()">Cerrar</button></div>';
  }
}

function highlightMatch(text, q){
  if(!text || !q) return esc(text || '');
  var escaped = esc(text);
  var qEsc = esc(q).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  var rx = new RegExp('('+qEsc+')', 'gi');
  return escaped.replace(rx, '<mark>$1</mark>');
}

function renderSearchResults(q, results){
  var modal = document.getElementById('searchResultsModal');
  if(!modal) return;

  var header = '<h2>рҹ”Қ Resultados para "'+esc(q)+'"</h2>'+
    '<p style="font-size:13px;color:var(--text2);margin-bottom:1.25rem;">'+results.length+(results.length===1?' coincidencia encontrada':' coincidencias encontradas')+'</p>';

  if(results.length === 0){
    modal.innerHTML = header + '<div class="search-empty">Sin coincidencias. Prueba con otras palabras o menos especГӯficas.</div><div class="modal-act"><button class="btn" onclick="closeModal()">Cerrar</button></div>';
    return;
  }

  // Agrupar por categorГӯa
  var categories = {};
  results.forEach(function(r){
    if(!categories[r.category]) categories[r.category] = [];
    categories[r.category].push(r);
  });

  var order = ['Personas','Sesiones de entrevista','Campos de entrevista','Secciones','Proyectos','Tareas','Interacciones','Informes','Archivos'];
  var body = '';
  order.forEach(function(cat){
    if(!categories[cat]) return;
    var items = categories[cat];
    body += '<div class="search-cat">'+
      '<div class="search-cat-title">'+esc(cat)+' <span class="search-cat-count">'+items.length+'</span></div>'+
      items.map(function(r){
        var payload = JSON.stringify(r).replace(/"/g,'&quot;');
        return '<div class="search-item" onclick=\'navigateToSearchResult('+payload+')\'>'+
          '<div class="search-item-title">'+highlightMatch(r.title, q)+'</div>'+
          '<div class="search-item-snippet">'+highlightMatch(r.snippet, q)+'</div>'+
          '</div>';
      }).join('')+
      '</div>';
  });

  modal.innerHTML = header + body + '<div class="modal-act"><button class="btn" onclick="closeModal()">Cerrar</button></div>';
}

function navigateToSearchResult(r){
  closeModal();
  // Limpiar la bГәsqueda
  var input = document.getElementById('searchInput');
  if(input) input.value = '';
  // Navegar
  if(r.nav === 'entrevistas' && r.personaId){
    S.persona = r.personaId;
    nav('entrevistas');
  } else if(r.nav === 'informe' && r.reportId){
    nav('informe');
    setTimeout(function(){ openReport(r.reportId); }, 100);
  } else if(r.nav === 'archivos'){
    nav('archivos');
  } else if(r.nav === 'proyectos'){
    if(r.projectId){
      if(!S.expandedProjects) S.expandedProjects = {};
      S.expandedProjects[r.projectId] = true;
    }
    nav('proyectos');
  } else {
    nav(r.nav || 'dashboard');
  }
}

// Parsea el texto de notas y separa bloques normales de bloques IA
function parseNoteText(text){
  if(!text) return [];
  var parts = [];
  var rx = /\[\[AI_NOTE_START:([^:]+):([^:]+):([^\]]*)\]\]([\s\S]*?)\[\[AI_NOTE_END\]\]/g;
  var lastIndex = 0;
  var m;
  while((m = rx.exec(text)) !== null){
    // Todo lo anterior es texto normal
    if(m.index > lastIndex){
      var before = text.substring(lastIndex, m.index).trim();
      if(before) parts.push({type:'text', content: before});
    }
    parts.push({
      type: 'ai',
      id: m[1],
      timestamp: m[2],
      question: (m[3] || '').trim(),
      content: (m[4] || '').trim()
    });
    lastIndex = rx.lastIndex;
  }
  // Cola de texto
  if(lastIndex < text.length){
    var tail = text.substring(lastIndex).trim();
    if(tail) parts.push({type:'text', content: tail});
  }
  return parts;
}

// Devuelve el HTML para mostrar notas con bloques IA plegados
function renderNotesWithAIBlocks(text, scope, entityId, parentProjectId){
  var parts = parseNoteText(text);
  if(parts.length === 0) return '';
  return parts.map(function(part){
    if(part.type === 'text'){
      return '<div style="font-size:12px;color:var(--text2);white-space:pre-wrap;line-height:1.5;">'+esc(part.content)+'</div>';
    }
    // Bloque IA colapsado
    var payload = JSON.stringify({scope:scope, entityId:entityId, parentProjectId:parentProjectId||null, noteId:part.id}).replace(/"/g,'&quot;');
    var titlePreview = part.question ? '<strong>'+esc(part.question)+'</strong>' : '<em>consulta libre</em>';
    return '<div class="ai-note-block" data-note-id="'+esc(part.id)+'">'+
      '<div class="ai-note-header">'+
        '<div class="ai-note-header-main" onclick="toggleAINoteBlock(this)">'+
          '<span class="ai-note-caret">в–¶</span>'+
          '<span class="ai-note-title">рҹ’¬ '+titlePreview+' <span style="color:var(--text3);">В· '+esc(part.timestamp)+'</span></span>'+
        '</div>'+
        '<div class="ai-note-actions">'+
          '<button title="Eliminar esta consulta" onclick=\'deleteAINoteBlock('+payload+')\'>рҹ—‘пёҸ</button>'+
        '</div>'+
      '</div>'+
      '<div class="ai-note-body">'+esc(part.content)+'</div>'+
      '</div>';
  }).join('');
}

function toggleAINoteBlock(headerEl){
  var block = headerEl.closest('.ai-note-block');
  if(!block) return;
  var caret = block.querySelector('.ai-note-caret');
  var body = block.querySelector('.ai-note-body');
  var isOpen = body.classList.contains('open');
  if(isOpen){
    body.classList.remove('open');
    caret.classList.remove('open');
  } else {
    body.classList.add('open');
    caret.classList.add('open');
  }
}

async function deleteAINoteBlock(params){
  if(!confirm('ВҝEliminar esta consulta a la IA de las notas?')) return;
  try {
    await api('/api/ai/delete-note-block', {method:'POST', body: params});

    }
  } catch(e){ alert('Error: '+e.message); }
}

      scope: ctx.scope,
      entityId: ctx.entityId,
      parentProjectId: ctx.parentProjectId
    }, payload);
    var data = await api('/api/ask-ai', {method:'POST', body: body});
    var answer = data.answer || '';
    // Guardar temporalmente en window para acciones
    window._lastAIAnswer = answer;
    window._lastAIQuestion = payload.question || (AI_PRESETS[ctx.scope]||[]).find(function(p){return p.key === payload.presetKey;});

  return tasks;

    newTasks.push({
      id: 't_' + Date.now() + '_' + Math.random().toString(36).substr(2,4) + '_' + idx,

      done: false,
      status: 'pending',
      responsible_persona_id: respEl ? respEl.value : '',
      target_date: dateEl && dateEl.value ? dateEl.value : null,
      notes: '',
      created_at: new Date().toISOString(),
      updated_at: new Date().toISOString()
    });
  });

  if(newTasks.length === 0){ alert('No has seleccionado ninguna tarea.'); return; }
  project.tasks = tasks.concat(newTasks);
  closeModal();
  showLoadingModal('Creando '+newTasks.length+' tarea(s)вҖҰ');
  try {

async function saveProject(pid){
  var manual = document.getElementById('pj_progressManual').checked;
  var existing = pid ? (S.projects||[]).find(function(x){return x.id === pid;}) : null;
  var data = {
    title: document.getElementById('pj_title').value.trim(),
    description: document.getElementById('pj_desc').value.trim(),
    status: document.getElementById('pj_status').value,
    priority: document.getElementById('pj_priority').value,
    responsible_persona_id: document.getElementById('pj_responsible').value,
    target_date: document.getElementById('pj_date').value || null,
    progress: manual ? (parseInt(document.getElementById('pj_progress').value) || 0) : 0,
    progress_manual: manual,
    notes: document.getElementById('pj_notes').value.trim(),
    tasks: existing ? (existing.tasks || []) : [],
    interactions: existing ? (existing.interactions || []) : []
  };
  if(!data.title){ alert('El tГӯtulo es obligatorio'); return; }
  try {
    if(pid){
      await api('/api/projects/'+pid, {method:'PUT', body:data});
    } else {
      await api('/api/consultancies/'+S.current.id+'/projects', {method:'POST', body:data});
    }
    closeModal();
    renderProyectos(document.getElementById('appContent'));
  } catch(e){ alert('Error: '+e.message); }
}

function formatSessionDate(d){
  if(!d) return '';
  try {
    var dt = new Date(d + 'T00:00:00');
    if(isNaN(dt.getTime())) return '';
    var dias = ['Domingo','Lunes','Martes','MiГ©rcoles','Jueves','Viernes','SГЎbado'];
    var meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    return dias[dt.getDay()] + ', ' + dt.getDate() + ' de ' + meses[dt.getMonth()];
  } catch(e){ return ''; }
}

// в”Җв”Җ PROGRESS в”Җв”Җ
function hasData(c,s){
  if(s==='entrevistas')return c.data.entrevistas&&c.data.entrevistas.length>0;
  if(s==='archivos')return(c.archivos||[]).length>0;
  var d=(c.data&&c.data[s])||{};
  return Object.keys(d).some(function(k){var v=d[k];return v&&(Array.isArray(v)?v.length>0:String(v).trim()!='');});
}
function calcProg(c){var secs=['contexto','estructura','entrevistas','procesos','herramientas','sintesis'];return Math.round((secs.filter(function(s){return hasData(c,s);}).length/secs.length)*100);}
