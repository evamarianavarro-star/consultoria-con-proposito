<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consultoría con Propósito</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F5F0;--surface:#FFF;--surface2:#F0EDE6;--border:#E2DDD5;--text:#1A1814;--text2:#6B6560;--text3:#A09A92;--accent:#2D5016;--accent-l:#EAF0E1;--accent2:#1a4a8a;--accent2-l:#E8F0FB;--danger:#C0392B;--danger-l:#FDECEA;--amber:#B8860B;--amber-l:#FEF9E7;--r:12px;--rsm:8px;--sh:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;}
.app{display:flex;min-height:100vh;}
.sidebar{width:255px;background:var(--text);color:#F7F5F0;padding:1.75rem 1.25rem;display:flex;flex-direction:column;gap:1.5rem;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100;}
.main{margin-left:255px;flex:1;padding:2.25rem 2.5rem;max-width:calc(100vw - 255px);}
.logo{font-family:'DM Serif Display',serif;font-size:19px;line-height:1.25;}
.logo em{color:#8FC45A;font-style:normal;}
.slabel{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:#4A5A3A;margin-bottom:6px;}
.ci{padding:7px 10px;border-radius:var(--rsm);cursor:pointer;font-size:13px;color:#C8C4BC;border:1px solid transparent;margin-bottom:3px;display:flex;align-items:center;gap:7px;transition:all .15s;}
.ci:hover{background:rgba(255,255,255,.07);color:#F7F5F0;}
.ci.on{background:rgba(143,196,90,.15);border-color:rgba(143,196,90,.3);color:#8FC45A;}
.ci .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
.ci-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.btn-new-s{width:100%;padding:8px 10px;background:rgba(255,255,255,.07);border:1px dashed rgba(255,255,255,.18);border-radius:var(--rsm);color:#C8C4BC;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:left;transition:all .15s;}
.btn-new-s:hover{background:rgba(255,255,255,.12);color:#F7F5F0;}
.nl{display:flex;flex-direction:column;gap:2px;}
.nl-item{padding:7px 9px;border-radius:var(--rsm);cursor:pointer;font-size:13px;color:#C8C4BC;display:flex;align-items:center;gap:8px;transition:all .15s;}
.nl-item:hover{background:rgba(255,255,255,.07);color:#F7F5F0;}
.nl-item.on{background:rgba(255,255,255,.1);color:#F7F5F0;}
.nl-item svg{width:15px;height:15px;flex-shrink:0;opacity:.75;}
.ph{margin-bottom:1.75rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.ph h1{font-family:'DM Serif Display',serif;font-size:26px;font-weight:400;line-height:1.2;}
.ph p{font-size:13px;color:var(--text2);margin-top:3px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.35rem 1.4rem;margin-bottom:1.1rem;box-shadow:var(--sh);}
.ct{font-family:'DM Serif Display',serif;font-size:17px;font-weight:400;margin-bottom:3px;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:13px;font-weight:500;margin-bottom:5px;}
input[type=text],input[type=password],textarea,select{width:100%;padding:9px 11px;font-size:14px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;line-height:1.5;transition:border-color .15s;}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-l);}
textarea{min-height:78px;resize:vertical;}
input::placeholder,textarea::placeholder{color:var(--text3);}
.stars-row{display:flex;gap:5px;margin-top:4px;}
.star{width:36px;height:36px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--surface);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;}
.star:hover{border-color:var(--accent);color:var(--accent);}
.star.on{background:var(--accent-l);border-color:var(--accent);color:var(--accent);}
.tags-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.tag{padding:4px 11px;border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text2);cursor:pointer;background:var(--surface);transition:all .12s;}
.tag:hover{border-color:var(--accent);color:var(--accent);}
.tag.on{background:var(--accent-l);border-color:var(--accent);color:var(--accent);}
.btn{padding:8px 18px;font-size:13px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--surface);color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{background:var(--surface2);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btnp{background:var(--accent);color:#fff;border-color:var(--accent);}
.btnp:hover{background:#223D0F;}
.btnd{background:var(--accent2-l);color:var(--accent2);border-color:var(--accent2);}
.btndanger{background:var(--danger-l);color:var(--danger);border-color:var(--danger);}
.btndanger:hover{background:var(--danger);color:#fff;}
.bsm{padding:5px 13px;font-size:12px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:.9rem;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem 1.2rem;box-shadow:var(--sh);}
.stat .sl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:5px;}
.stat .sv{font-family:'DM Serif Display',serif;font-size:26px;}
.stat .sd{font-size:12px;color:var(--text2);margin-top:3px;}
.pbar{height:3px;background:var(--surface2);border-radius:2px;margin-bottom:1.75rem;overflow:hidden;}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent),#8FC45A);border-radius:2px;transition:width .4s ease;}
hr{border:none;border-top:1px solid var(--border);margin:1.25rem 0;}
.empty{text-align:center;padding:4rem 2rem;color:var(--text2);}
.empty h2{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;margin-bottom:8px;color:var(--text);}
.alert{padding:11px 14px;border-radius:var(--rsm);font-size:13px;margin-bottom:1rem;display:flex;align-items:flex-start;gap:8px;}
.alert-info{background:var(--accent-l);color:var(--accent);}
.alert-blue{background:var(--accent2-l);color:var(--accent2);}
.alert-amber{background:var(--amber-l);color:var(--amber);}
.alert-danger{background:var(--danger-l);color:var(--danger);}
.modal-ov{position:fixed;inset:0;background:rgba(26,24,20,.5);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(2px);}
.modal{background:var(--surface);border-radius:var(--r);padding:1.75rem;width:90%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal h2{font-family:'DM Serif Display',serif;font-size:21px;font-weight:400;margin-bottom:1rem;}
.modal-act{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;}
.ptabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1.25rem;}
.ptab{padding:6px 13px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--surface);color:var(--text2);cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;transition:all .12s;}
.ptab.on{background:var(--text);color:#fff;border-color:var(--text);}
.avatar{width:22px;height:22px;border-radius:50%;background:var(--accent-l);color:var(--accent);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;}
.ptab.on .avatar{background:rgba(255,255,255,.2);color:#fff;}
.st{font-family:'DM Serif Display',serif;font-size:14px;color:var(--text2);margin:1.1rem 0 .75rem;display:flex;align-items:center;gap:8px;}
.st::after{content:'';flex:1;height:1px;background:var(--border);}
.file-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--rsm);margin-bottom:6px;background:var(--surface);font-size:13px;}
.file-item .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.file-item .fsize{color:var(--text3);font-size:11px;}
.file-ext{width:30px;height:30px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--text2);text-transform:uppercase;}
.drop-zone{border:2px dashed var(--border);border-radius:var(--r);padding:2rem;text-align:center;cursor:pointer;background:var(--surface);transition:all .15s;}
.drop-zone:hover,.drop-zone.drag{border-color:var(--accent);background:var(--accent-l);}
.drop-zone p{font-size:13px;color:var(--text2);margin-top:6px;}
.dots{display:inline-flex;gap:4px;align-items:center;}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:bk 1.2s infinite ease-in-out;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes bk{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
/* === MENTIONS === */
.mention{display:inline-block;padding:1px 7px;border-radius:10px;background:var(--accent-l);color:var(--accent);font-weight:500;font-size:.95em;text-decoration:none;}
.mention-broken{background:var(--danger-l);color:var(--danger);font-style:italic;}
.mention-suggest{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:200px;max-height:240px;overflow-y:auto;z-index:1000;font-family:'DM Sans',sans-serif;}
.mention-suggest-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);}
.mention-suggest-item:last-child{border-bottom:none;}
.mention-suggest-item:hover,.mention-suggest-item.on{background:var(--accent-l);color:var(--accent);}
.mention-suggest-empty{padding:10px 12px;font-size:12px;color:var(--text3);font-style:italic;text-align:center;}
.mention-cargo{font-size:11px;color:var(--text3);font-weight:400;}
.mention-suggest-item.on .mention-cargo{color:var(--accent);}
.mentions-section{margin-top:1.25rem;padding-top:1rem;border-top:1px dashed var(--border);}
.mentions-section h3{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:.75rem;display:flex;align-items:center;gap:6px;}
.mention-item{background:var(--surface2);border-left:3px solid var(--accent);padding:8px 12px;margin-bottom:8px;border-radius:0 var(--rsm) var(--rsm) 0;font-size:13px;line-height:1.55;}
.mention-item-from{font-size:11px;color:var(--text2);margin-bottom:3px;font-weight:500;}
.mention-item-text{color:var(--text);}
.mention-item-text .mention{font-size:12px;}
#reportContent, .rh{font-family:'Montserrat',sans-serif;}

.report-section{margin-bottom:2.5rem;}
.report-section h2{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:600;color:var(--text);margin-bottom:1rem;padding-bottom:0;border-bottom:none;letter-spacing:-.01em;}
.report-section h3{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;margin:1.5rem 0 .6rem;}
.report-section p{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:400;line-height:1.75;margin-bottom:.85rem;color:var(--text);}
.report-section ul{padding-left:1.25rem;margin-bottom:1rem;}
.report-section ul li{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:400;line-height:1.7;margin-bottom:6px;}
.report-section strong{color:var(--text);font-weight:600;}

/* === REPORT HEADER (limpio Montserrat) === */
.rh{padding:2rem 0 2.5rem;margin-bottom:2.5rem;border-bottom:1px solid var(--border);}
.rh-tag{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--text2);margin-bottom:2rem;font-weight:500;}
.rh-title{font-family:'Montserrat',sans-serif;font-size:36px;font-weight:300;line-height:1.15;color:var(--text);margin-bottom:1.75rem;letter-spacing:-.02em;}
.rh-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem;margin-top:.5rem;}
.rh-meta-item{}
.rh-meta-label{font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;font-weight:500;}
.rh-meta-value{font-family:'Montserrat',sans-serif;font-size:14px;color:var(--text);font-weight:500;letter-spacing:-.01em;}
@media(max-width:768px){
  .rh-title{font-size:26px;}
  .rh-meta{grid-template-columns:repeat(2,1fr);gap:1.25rem;}
}
@media print{
  .rh{padding:.5rem 0 2rem;}
  .rh-title{font-size:28px;}
}
.sync-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;}
.sync-ok{background:var(--accent-l);color:var(--accent);}
.sync-saving{background:var(--amber-l);color:var(--amber);}
.sync-err{background:var(--danger-l);color:var(--danger);}
.mh{display:none;background:var(--text);color:#F7F5F0;padding:.9rem 1.25rem;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:150;}
.hbg{background:none;border:none;color:#F7F5F0;cursor:pointer;font-size:22px;}
.sov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.login-card{background:var(--surface);border-radius:var(--r);padding:2.5rem;max-width:400px;width:100%;box-shadow:var(--sh);}
.login-card h1{font-family:'DM Serif Display',serif;font-size:28px;margin-bottom:.5rem;}
.login-card p{color:var(--text2);font-size:14px;margin-bottom:1.5rem;}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .25s;}
  .sidebar.open{transform:translateX(0);}
  .sov.open{display:block;}
  .main{margin-left:0;max-width:100vw;padding:1.1rem;}
  .mh{display:flex;}
  .g2,.g3{grid-template-columns:1fr;}
  .ph{flex-direction:column;}
}
@media print{
  .sidebar,.mh,.btn,.no-print,input,textarea,.drop-zone,.ptabs,.nl,.pbar{display:none!important;}
  .main{margin-left:0;padding:0;}
  .card{box-shadow:none;break-inside:avoid;}
}
</style>
</head>
<body>

<div id="loginView" style="display:none;">
  <div class="login-wrap">
    <div class="login-card">
      <h1>Consultoría con Propósito</h1>
      <p>Introduce la contraseña para acceder a tu espacio de trabajo.</p>
      <div class="field">
        <input type="password" id="passInput" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn btnp" style="width:100%;justify-content:center;" onclick="doLogin()">Entrar</button>
      <div id="loginErr" style="color:var(--danger);font-size:13px;margin-top:1rem;text-align:center;display:none;">Contraseña incorrecta</div>
    </div>
  </div>
</div>

<div id="appView" style="display:none;">
<div class="mh">
  <button class="hbg" onclick="toggleSidebar()">☰</button>
  <span style="font-family:'DM Serif Display',serif;font-size:16px;">Consultoría</span>
  <span></span>
</div>
<div class="sov" id="sov" onclick="toggleSidebar()"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="logo">Consultoría<br><em>con Propósito</em></div>
    <div>
      <div class="slabel">Consultorías</div>
      <div id="clist"></div>
      <button class="btn-new-s" onclick="showNewModal()">+ Nueva consultoría</button>
    </div>
    <div style="margin-top:auto;">
      <div id="syncStatus"></div>
      <div class="nl" id="navLinks" style="margin-top:1rem;"></div>
    </div>
  </aside>
  <main class="main"><div id="appContent"></div></main>
</div>
</div>

<div class="modal-ov" id="modalOv" style="display:none;">
  <div class="modal" id="modalBox"></div>
</div>

<script>
// ── AUTH ──
var PWD = sessionStorage.getItem('cwp_pwd') || '';

async function doLogin() {
  var v = document.getElementById('passInput').value;
  try {
    var r = await fetch('/check-auth', { headers: { 'x-app-password': v } });
    var d = await r.json();
    if (d.ok) {
      PWD = v;
      sessionStorage.setItem('cwp_pwd', v);
      showApp();
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  } catch (e) {
    document.getElementById('loginErr').textContent = 'Error de conexión';
    document.getElementById('loginErr').style.display = 'block';
  }
}

function showApp() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('appView').style.display = 'block';
  loadConsultancies();
}

async function checkAuth() {
  if (!PWD) {
    document.getElementById('loginView').style.display = 'block';
    return false;
  }
  try {
    var r = await fetch('/check-auth', { headers: { 'x-app-password': PWD } });
    var d = await r.json();
    if (d.ok) { showApp(); return true; }
    sessionStorage.removeItem('cwp_pwd');
    document.getElementById('loginView').style.display = 'block';
    return false;
  } catch (e) {
    document.getElementById('loginView').style.display = 'block';
    return false;
  }
}

// ── API ──
async function api(path, opts) {
  opts = opts || {};
  opts.headers = opts.headers || {};
  opts.headers['x-app-password'] = PWD;
  if (opts.body && typeof opts.body === 'object') {
    opts.body = JSON.stringify(opts.body);
    opts.headers['Content-Type'] = 'application/json';
  }
  var r = await fetch(path, opts);
  if (!r.ok) {
    var err = await r.json().catch(() => ({ error: 'Error' }));
    throw new Error(err.error || 'Error ' + r.status);
  }
  return r.json();
}

// ── STATE ──
var S = {
  list: [],
  active: null,
  current: null,
  page: 'dashboard',
  persona: null,
  reportLoading: false,
  activeReport: null,
  syncStatus: 'ok',
  saveTimer: null
};

function setSync(s) {
  S.syncStatus = s;
  var el = document.getElementById('syncStatus');
  if (!el) return;
  var labels = { ok: '✓ Sincronizado', saving: '⟳ Guardando...', err: '✗ Error al guardar' };
  var classes = { ok: 'sync-ok', saving: 'sync-saving', err: 'sync-err' };
  el.innerHTML = '<span class="sync-badge ' + classes[s] + '">' + labels[s] + '</span>';
}

async function loadConsultancies() {
  try {
    S.list = await api('/api/consultancies');
    if (S.list.length > 0 && !S.active) {
      await selectC(S.list[0].id);
    }
    renderSidebar();
    if (!S.current) renderContent();
  } catch (e) {
    alert('Error cargando datos: ' + e.message);
  }
}

async function selectC(id) {
  S.active = id;
  S.page = 'dashboard';
  S.persona = null;
  S.activeReport = null;
  try {
    S.current = await api('/api/consultancies/' + id);
    if (!S.current.data) S.current.data = {};
    if (!S.current.data.contexto) S.current.data.contexto = {};
    if (!S.current.data.estructura) S.current.data.estructura = {};
    if (!Array.isArray(S.current.data.entrevistas)) S.current.data.entrevistas = [];
    if (!S.current.data.procesos) S.current.data.procesos = {};
    if (!S.current.data.herramientas) S.current.data.herramientas = {};
    if (!S.current.data.sintesis) S.current.data.sintesis = {};
    if (!Array.isArray(S.current.archivos)) S.current.archivos = [];
    renderSidebar();
    renderContent();
    if (window.innerWidth < 768) toggleSidebar();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

function debouncedSave() {
  setSync('saving');
  if (S.saveTimer) clearTimeout(S.saveTimer);
  S.saveTimer = setTimeout(saveCurrent, 800);
}

async function saveCurrent() {
  if (!S.current) return;
  try {
    await api('/api/consultancies/' + S.current.id, { method: 'PUT', body: S.current });
    setSync('ok');
  } catch (e) {
    setSync('err');
  }
}

// ── NAV ──

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── MENTION SYSTEM ──
// Simplificado: las menciones se guardan como texto plano @Nombre.
// La detección busca @ seguido de un nombre que coincida con alguna persona del equipo (greedy: nombre más largo gana).
// Si se renombra a alguien, las menciones a su nombre anterior dejan de detectarse hasta que se actualicen manualmente.

function getPersonas(){
  if(!S.current || !S.current.data) return [];
  return S.current.data.entrevistas || [];
}

// Busca todas las menciones a personas dentro de un texto.
// Devuelve [{start, end, personaId, nombre, text}]
function findMentionMatchesInText(text){
  if(!text) return [];
  var personas = getPersonas();
  // Orden descendente por longitud para que "@Ana García" gane a "@Ana"
  var sortedByLen = personas.slice().sort(function(a,b){return (b.nombre||'').length - (a.nombre||'').length;});
  var matches = [];
  var i = 0;
  while(i < text.length){
    if(text[i] === '@' && (i === 0 || /[\s.,;:!?¡¿()"'«»\-\n]/.test(text[i-1]))){
      var matched = false;
      for(var k=0;k<sortedByLen.length;k++){
        var p = sortedByLen[k];
        var n = '@'+(p.nombre||'');
        if(!n || n === '@') continue;
        if(text.substr(i, n.length).toLowerCase() === n.toLowerCase()){
          var after = text[i + n.length];
          if(!after || /[\s.,;:!?¡¿()"'«»\-\n]/.test(after)){
            matches.push({start: i, end: i + n.length, personaId: p.id, nombre: p.nombre, text: text.substr(i, n.length)});
            i += n.length;
            matched = true;
            break;
          }
        }
      }
      if(!matched) i++;
    } else {
      i++;
    }
  }
  return matches;
}

// Convierte un texto plano con @Nombre a HTML con menciones estilizadas
function renderMentions(text){
  if(!text) return '';
  var matches = findMentionMatchesInText(text);
  if(matches.length === 0) return esc(text);
  var out = '';
  var lastEnd = 0;
  matches.forEach(function(m){
    out += esc(text.substring(lastEnd, m.start));
    out += '<span class="mention" title="'+esc(m.nombre)+'">'+esc(m.text)+'</span>';
    lastEnd = m.end;
  });
  out += esc(text.substring(lastEnd));
  return out;
}

// Busca textos donde aparece una mención a la persona targetId
function findMentionsOf(targetId){
  var hits = [];
  if(!S.current || !S.current.data) return hits;
  var d = S.current.data;

  function scanText(text, meta){
    if(!text || typeof text !== 'string') return;
    var matches = findMentionMatchesInText(text);
    var hit = matches.some(function(m){return m.personaId === targetId;});
    if(hit) hits.push(Object.assign({text: text}, meta));
  }

  // 1) Sesiones y campos de entrevistas de OTRAS personas
  (d.entrevistas||[]).forEach(function(p){
    if(p.id === targetId) return;
    (p.sesiones||[]).forEach(function(s){
      scanText(s.notas, {from:p.nombre, fromId:p.id, when:s.fecha, title:s.titulo, sourceType:'session', sourceLabel:'Sesión de '+p.nombre+(s.titulo?' — '+s.titulo:'')});
    });
    var r = p.resp || {};
    var fieldLabels = {
      trabajo:'Trabajo y funciones',
      info_llega:'Llegada de información',
      frustracion:'Frustraciones',
      informal:'Funcionamiento real',
      mejora:'Propuestas de mejora',
      obs:'Observaciones'
    };
    Object.keys(fieldLabels).forEach(function(k){
      scanText(r[k], {from:p.nombre, fromId:p.id, when:null, sourceType:'field', sourceLabel:'Resumen de '+p.nombre+' — '+fieldLabels[k]});
    });
  });

  // 2) Otras secciones
  var sectionLabels = {
    contexto:'Contexto',
    estructura:'Estructura',
    procesos:'Procesos',
    herramientas:'Herramientas',
    sintesis:'Síntesis'
  };
  Object.keys(sectionLabels).forEach(function(sec){
    var data = d[sec] || {};
    Object.keys(data).forEach(function(k){
      var v = data[k];
      if(typeof v === 'string'){
        scanText(v, {from:sectionLabels[sec], fromId:null, when:null, sourceType:'section', sourceLabel:sectionLabels[sec]});
      }
    });
  });

  return hits;
}

// ── MENTION SUGGEST UI ──
var MS = { active: null, items: [], index: 0, query: '', startPos: 0, textarea: null };

function attachMentionSupport(){
  // Hooks globales — los textareas usarán onkeyup en su HTML
  document.addEventListener('click', function(e){
    if(MS.active && !MS.active.contains(e.target) && e.target !== MS.textarea){
      closeMentionSuggest();
    }
  });
}

function onMentionKey(e){
  var ta = e.target;
  if(!ta || ta.tagName !== 'TEXTAREA') return;
  // Si está abierto el suggest, gestionamos navegación
  if(MS.active){
    if(e.key === 'ArrowDown'){e.preventDefault(); MS.index = Math.min(MS.index+1, MS.items.length-1); refreshMentionSuggest(); return;}
    if(e.key === 'ArrowUp'){e.preventDefault(); MS.index = Math.max(MS.index-1, 0); refreshMentionSuggest(); return;}
    if(e.key === 'Enter' || e.key === 'Tab'){
      if(MS.items.length>0){ e.preventDefault(); selectMention(MS.items[MS.index]); return; }
    }
    if(e.key === 'Escape'){ e.preventDefault(); closeMentionSuggest(); return; }
  }

  // Detectar @ — buscar hacia atrás hasta encontrar @ o espacio
  var pos = ta.selectionStart;
  var text = ta.value;
  var before = text.substring(0, pos);
  var atMatch = before.match(/@([\wáéíóúñÁÉÍÓÚÑ-]*)$/);
  if(atMatch){
    MS.query = atMatch[1].toLowerCase();
    MS.startPos = pos - atMatch[0].length;
    MS.textarea = ta;
    openMentionSuggest(ta);
  } else {
    closeMentionSuggest();
  }
}

function openMentionSuggest(ta){
  var personas = getPersonas();
  var q = MS.query;
  MS.items = personas.filter(function(p){
    return !q || (p.nombre||'').toLowerCase().includes(q);
  }).slice(0, 8);
  MS.index = 0;

  if(!MS.active){
    var box = document.createElement('div');
    box.className = 'mention-suggest';
    document.body.appendChild(box);
    MS.active = box;
  }
  positionMentionSuggest(ta);
  refreshMentionSuggest();
}

function positionMentionSuggest(ta){
  if(!MS.active) return;
  var rect = ta.getBoundingClientRect();
  // Posición aproximada: bajo el textarea (es lo más sencillo y predecible)
  MS.active.style.top = (window.scrollY + rect.bottom + 4) + 'px';
  MS.active.style.left = (window.scrollX + rect.left + 12) + 'px';
}

function refreshMentionSuggest(){
  if(!MS.active) return;
  if(MS.items.length === 0){
    MS.active.innerHTML = '<div class="mention-suggest-empty">Sin coincidencias. Añade personas en Entrevistas.</div>';
    return;
  }
  MS.active.innerHTML = MS.items.map(function(p, i){
    return '<div class="mention-suggest-item '+(i===MS.index?'on':'')+'" onclick="selectMention('+JSON.stringify(p.id).replace(/"/g,'&quot;')+')">'+
      '<div class="avatar">'+inits(p.nombre)+'</div>'+
      '<div style="flex:1;"><div>'+esc(p.nombre)+'</div>'+(p.cargo?'<div class="mention-cargo">'+esc(p.cargo)+'</div>':'')+'</div>'+
      '</div>';
  }).join('');
}

function selectMention(personOrId){
  var pid = typeof personOrId === 'string' ? personOrId : personOrId.id;
  var ta = MS.textarea;
  if(!ta) return;
  var persona = getPersonas().find(function(p){return p.id===pid;});
  if(!persona) { closeMentionSuggest(); return; }
  var insert = '@'+persona.nombre+' ';
  var before = ta.value.substring(0, MS.startPos);
  var after = ta.value.substring(ta.selectionStart);
  ta.value = before + insert + after;
  var newPos = before.length + insert.length;
  ta.setSelectionRange(newPos, newPos);
  ta.focus();
  var evt = new Event('input', {bubbles:true});
  ta.dispatchEvent(evt);
  closeMentionSuggest();
}

function closeMentionSuggest(){
  if(MS.active){
    MS.active.remove();
    MS.active = null;
  }
  MS.textarea = null;
  MS.items = [];
  MS.query = '';
}

function toggleTag(sec,key,opt){if(!S.current)return;if(!S.current.data[sec])S.current.data[sec]={};var arr=S.current.data[sec][key]?S.current.data[sec][key].slice():[];var i=arr.indexOf(opt);if(i>-1)arr.splice(i,1);else arr.push(opt);S.current.data[sec][key]=arr;debouncedSave();renderContent();}

function delPersona(pid){
  if(!confirm('¿Eliminar esta entrevista?'))return;
  S.current.data.entrevistas=S.current.data.entrevistas.filter(function(p){return p.id!==pid;});
  S.persona=S.current.data.entrevistas.length>0?S.current.data.entrevistas[0].id:null;
  debouncedSave();renderContent();
}

function addSession(pid){
  var p = S.current.data.entrevistas.find(function(x){return x.id===pid;});
  if(!p) return;
  if(!Array.isArray(p.sesiones)) p.sesiones = [];
  var today = new Date().toISOString().slice(0,10);
  p.sesiones.unshift({
    id: 's_' + Date.now(),
    fecha: today,
    titulo: '',
    notas: ''
  });
  debouncedSave();
  renderContent();
}

function updateSessionField(pid, sid, field, value){
  var p = S.current.data.entrevistas.find(function(x){return x.id===pid;});
  if(!p || !Array.isArray(p.sesiones)) return;
  var s = p.sesiones.find(function(x){return x.id===sid;});
  if(!s) return;
  s[field] = value;
  debouncedSave();
  // Solo re-render si cambia la fecha (afecta al orden)
  if(field === 'fecha') renderContent();
}

function deleteSession(pid, sid){
  if(!confirm('¿Eliminar esta sesión? Se perderán las notas.')) return;
  var p = S.current.data.entrevistas.find(function(x){return x.id===pid;});
  if(!p || !Array.isArray(p.sesiones)) return;
  p.sesiones = p.sesiones.filter(function(x){return x.id!==sid;});
  debouncedSave();
  renderContent();
}

function formatSessionDate(d){
  if(!d) return '';
  try {
    var dt = new Date(d + 'T00:00:00');
    if(isNaN(dt.getTime())) return '';
    var dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    var meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    return dias[dt.getDay()] + ', ' + dt.getDate() + ' de ' + meses[dt.getMonth()];
  } catch(e){ return ''; }
}

function pTags(pid,key,label,opts,val){var v=val||[];var h='<div class="field"><label>'+label+'</label><div class="tags-row">';opts.forEach(function(o){h+='<span class="tag '+(v.indexOf(o)>-1?'on':'')+'" onclick="togglePTag(\''+pid+'\',\''+key+'\',\''+o+'\')">'+o+'</span>';});return h+'</div></div>';}

// ── PROGRESS ──
function hasData(c,s){
  if(s==='entrevistas')return c.data.entrevistas&&c.data.entrevistas.length>0;
  if(s==='archivos')return(c.archivos||[]).length>0;
  var d=(c.data&&c.data[s])||{};
  return Object.keys(d).some(function(k){var v=d[k];return v&&(Array.isArray(v)?v.length>0:String(v).trim()!='');});
}
function calcProg(c){var secs=['contexto','estructura','entrevistas','procesos','herramientas','sintesis'];return Math.round((secs.filter(function(s){return hasData(c,s);}).length/secs.length)*100);}

// ── RENDER ──
function renderContent(){
  var el=document.getElementById('appContent');
  if(!el)return;
  // Admin doesn't need an active consultancy
  if(S.page==='admin'){renderAdmin(el);return;}
  if(!S.current){
    el.innerHTML='<div class="empty"><h2>Bienvenida, Eva María</h2><p>Crea tu primera consultoría para empezar.</p><button class="btn btnp" onclick="showNewModal()">+ Nueva consultoría</button></div>';
    return;
  }
  switch(S.page){
    case 'dashboard':renderDash(el);break;
    case 'contexto':renderContexto(el);break;
    case 'estructura':renderEstructura(el);break;
    case 'entrevistas':renderEntrevistas(el);break;
    case 'procesos':renderProcesos(el);break;
    case 'herramientas':renderHerramientas(el);break;
    case 'archivos':renderArchivos(el);break;
    case 'sintesis':renderSintesis(el);break;
    case 'informe':renderInforme(el);break;
    default:renderDash(el);
  }
}

function selPersona(pid){S.persona=pid;renderContent();}

function renderMentionsReceived(targetId){
  var hits = findMentionsOf(targetId);
  if(hits.length === 0) return '';
  // Extraer fragmento alrededor de la primera mención a esta persona
  function fragment(text){
    var matches = findMentionMatchesInText(text);
    var m = matches.find(function(x){return x.personaId === targetId;});
    if(!m) return text.length > 200 ? text.substring(0,200)+'…' : text;
    var start = Math.max(0, m.start - 80);
    var end = Math.min(text.length, m.end + 80);
    var prefix = start > 0 ? '…' : '';
    var suffix = end < text.length ? '…' : '';
    return prefix + text.substring(start, end) + suffix;
  }
  return '<div class="mentions-section">'+
    '<h3>📌 Cómo le ven sus compañeros <span style="font-weight:400;color:var(--text3);">('+hits.length+' '+(hits.length===1?'mención':'menciones')+')</span></h3>'+
    hits.map(function(h){
      var when = h.when ? ' · '+formatSessionDate(h.when) : '';
      var frag = fragment(h.text);
      return '<div class="mention-item">'+
        '<div class="mention-item-from">'+esc(h.sourceLabel)+when+'</div>'+
        '<div class="mention-item-text">«'+renderMentions(frag)+'»</div>'+
        '</div>';
    }).join('')+
    '</div>';
}

var descTimers = {};
function updateFileDescription(fid, desc){
  // Actualizar en estado local
  var f = S.current.archivos.find(function(x){return x.id===fid;});
  if(f) f.description = desc;
  // Guardar en servidor con debounce
  if(descTimers[fid]) clearTimeout(descTimers[fid]);
  setSync('saving');
  descTimers[fid] = setTimeout(async function(){
    try {
      await api('/api/files/'+fid+'/description', {method:'PUT', body:{description: desc}});
      await saveCurrent();
      setSync('ok');
    } catch(e){setSync('err');}
  }, 800);
}

function formatSize(b){if(!b)return'';if(b<1024)return b+'B';if(b<1048576)return Math.round(b/1024)+'KB';return(b/1048576).toFixed(1)+'MB';}

function handleDrop(e){e.preventDefault();handleFiles(e.dataTransfer.files);}

async function handleFiles(files){
  if(!files||files.length===0)return;
  var us=document.getElementById('uploadStatus');
  for(var i=0;i<files.length;i++){
    var f=files[i];
    if(us)us.innerHTML='<div class="alert alert-blue" style="margin-top:1rem;"><div class="dots"><span></span><span></span><span></span></div> Subiendo '+esc(f.name)+'...</div>';
    try {
      var b64=await fileToBase64(f);
      var fid='f_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
      await api('/api/consultancies/'+S.current.id+'/files',{method:'POST',body:{id:fid,name:f.name,mimeType:f.type,size:f.size,base64:b64}});
      S.current.archivos.push({id:fid,name:f.name,mimeType:f.type,size:f.size});
      await api('/api/consultancies/'+S.current.id,{method:'PUT',body:S.current});
    } catch(e){alert('Error subiendo '+f.name+': '+e.message);}
  }
  if(us)us.innerHTML='';
  renderContent();
}

function fileToBase64(file){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(e){res(e.target.result.split(',')[1]);};r.onerror=rej;r.readAsDataURL(file);});}

async function delArchivo(fid){
  if(!confirm('¿Eliminar este archivo?'))return;
  try {
    await api('/api/files/'+fid,{method:'DELETE'});
    S.current.archivos=(S.current.archivos||[]).filter(function(f){return f.id!==fid;});
    await api('/api/consultancies/'+S.current.id,{method:'PUT',body:S.current});
    renderContent();
  } catch(e){alert('Error: '+e.message);}
}

async function viewFile(fid, fname){
  try {
    var r = await fetch('/api/files/'+fid+'/download', { headers: { 'x-app-password': PWD } });
    if(!r.ok) throw new Error('No se pudo descargar');
    var blob = await r.blob();
    var url = URL.createObjectURL(blob);
    var w = window.open(url, '_blank');
    if(!w){
      var a = document.createElement('a');
      a.href = url; a.download = fname; document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }
    setTimeout(function(){URL.revokeObjectURL(url);}, 60000);
  } catch(e){alert('Error al abrir el archivo: '+e.message);}
}

function isExtractable(f){
  if(!f.mimeType && !f.name) return false;
  var name = (f.name||'').toLowerCase();
  var mt = f.mimeType || '';
  if(mt === 'application/pdf' || name.endsWith('.pdf')) return true;
  if(mt.includes('wordprocessingml') || name.endsWith('.docx')) return true;
  if(mt.startsWith('text/') || name.endsWith('.txt') || name.endsWith('.md') || name.endsWith('.csv')) return true;
  if(['image/jpeg','image/png','image/gif','image/webp'].includes(mt)) return true;
  return false;
}

function confirmRegenerate(){
  if(!S.activeReport) return;
  var msg = '¿Regenerar este informe usando los datos actuales?\n\n';
  msg += '• Se mantendrá el mismo tipo de informe, instrucciones y archivos seleccionados.\n';
  msg += '• La nueva versión usará todas las sesiones, campos y archivos añadidos desde la última generación.\n';
  msg += '• El informe actual quedará guardado en el historial — se crea una versión nueva.\n';
  msg += '• La IA recibe el informe anterior como contexto, así que actualizará/matizará en lugar de empezar de cero.\n\n';
  msg += '¿Continuar?';
  if(!confirm(msg)) return;
  generateReport({ regenerateFrom: S.activeReport });
}

// Detecta cambios en los datos posteriores a la creación del informe
function getFreshnessChanges(){
  if(!S.activeReport || !S.activeReport.created_at || !S.current) return null;
  var reportDate = new Date(S.activeReport.created_at).getTime();
  if(isNaN(reportDate)) return null;
  var changes = { newSessions: 0, newFiles: 0, hasUpdates: false };

  // Sesiones nuevas
  (S.current.data.entrevistas||[]).forEach(function(p){
    (p.sesiones||[]).forEach(function(s){
      // Sesiones: comparamos fecha registrada (puede ser anterior a la creación si es retroactiva)
      // Mejor: comparamos por el ID que incluye timestamp
      var sid = s.id || '';
      var match = sid.match(/s_(\d+)/);
      if(match){
        var sTime = parseInt(match[1]);
        if(sTime > reportDate) changes.newSessions++;
      }
    });
  });

  // Archivos nuevos (comparamos por ID que incluye timestamp)
  (S.current.archivos||[]).forEach(function(f){
    var fid = f.id || '';
    var match = fid.match(/f_(\d+)/);
    if(match){
      var fTime = parseInt(match[1]);
      if(fTime > reportDate) changes.newFiles++;
    }
  });

  changes.hasUpdates = changes.newSessions > 0 || changes.newFiles > 0;
  return changes;
}

function renderFreshnessAlert(){
  var ch = getFreshnessChanges();
  if(!ch || !ch.hasUpdates) return '';
  var parts = [];
  if(ch.newSessions > 0) parts.push(ch.newSessions + (ch.newSessions===1?' sesión nueva':' sesiones nuevas'));
  if(ch.newFiles > 0) parts.push(ch.newFiles + (ch.newFiles===1?' archivo nuevo':' archivos nuevos'));
  return '<div class="alert no-print" style="background:#FEF9E7;color:#B8860B;border:1px solid #f1d57c;padding:12px 14px;margin-bottom:1rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">'+
    '<span style="font-size:18px;">⚡</span>'+
    '<span style="flex:1;min-width:200px;">Hay '+parts.join(' y ')+' desde que se generó este informe. ¿Quieres regenerar para incorporar lo nuevo?</span>'+
    '<button class="btn bsm" onclick="confirmRegenerate()" style="background:#B8860B;color:white;border-color:#B8860B;">Regenerar</button>'+
    '</div>';
}

async function downloadWord(rid){

    if(!r.ok) {
      var errMsg = 'Error ' + r.status;
      try {
        var errData = await r.json();
        errMsg = errData.error || errMsg;
      } catch(_) {}
      throw new Error(errMsg);
    }
    var blob = await r.blob();
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = (S.activeReport.title || 'informe').replace(/[^a-z0-9áéíóúñ\s\-_]/gi,'').replace(/\s+/g,'_') + '.docx';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);}, 60000);
  } catch(e){alert('Error al descargar Word: '+e.message);}
}

function buildSummary(c){

  if(d.contexto&&d.contexto.software)o+='Software: '+d.contexto.software.join(', ')+'\n';
  o+='\n--- ESTRUCTURA ---\n';['organigrama','roles','reporte','expectativas'].forEach(function(k){if(d.estructura&&d.estructura[k])o+=k+': '+d.estructura[k]+'\n';});
  if(d.estructura&&d.estructura.clima)o+='Clima inicial (1-5): '+d.estructura.clima+'\n';
  o+='\n--- ENTREVISTAS ---\n';(d.entrevistas||[]).forEach(function(p){
    o+='\nPersona: '+p.nombre+(p.cargo?' ('+p.cargo+')':'')+(p.antiguedad?', antig: '+p.antiguedad:'')+'\n';
    if(Array.isArray(p.sesiones) && p.sesiones.length > 0){
      var ordenadas = p.sesiones.slice().sort(function(a,b){return (a.fecha||'').localeCompare(b.fecha||'');});
      o+='\nSesiones de entrevista ('+ordenadas.length+'):\n';
      ordenadas.forEach(function(s){
        o+='  · '+(s.fecha||'sin fecha')+(s.titulo?' — '+s.titulo:'')+'\n';
        if(s.notas) o+='    '+s.notas.replace(/\n/g,'\n    ')+'\n';
      });
    }
    var r=p.resp||{};
    var hasResumen = ['trabajo','info_llega','frustracion','informal','mejora','obs'].some(function(k){return r[k];}) || r.actitud || (r.senales&&r.senales.length);
    if(hasResumen) o+='\nResumen vivo:\n';
    ['trabajo','info_llega','frustracion','informal','mejora','obs'].forEach(function(k){if(r[k])o+=k+': '+r[k]+'\n';});
    if(r.actitud)o+='Actitud cambio (1-5): '+r.actitud+'\n';
    if(r.senales&&r.senales.length)o+='Señales: '+r.senales.join(', ')+'\n';
    // Menciones recibidas (lo que otros han dicho sobre esta persona)
    var menciones = findMentionsOf(p.id);
    if(menciones.length > 0){
      o+='\nCómo le ven sus compañeros / Menciones de '+p.nombre+' por otros ('+menciones.length+'):\n';

        var when = h.when ? ' ('+h.when+')' : '';
        o+='  · '+h.sourceLabel+when+':\n';

      });
    }
  });
  o+='\n--- PROCESOS ---\n';['procesos_principales','cuellos','duplicidades','manual','flujo_real'].forEach(function(k){if(d.procesos&&d.procesos[k])o+=k+': '+d.procesos[k]+'\n';});

  o+='\n--- HERRAMIENTAS ---\n';['software_real','duplicidad','procedimientos','formacion'].forEach(function(k){if(d.herramientas&&d.herramientas[k])o+=k+': '+d.herramientas[k]+'\n';});
  if(d.herramientas&&d.herramientas.calidad_datos)o+='Calidad datos (1-5): '+d.herramientas.calidad_datos+'\n';
  if(d.herramientas&&d.herramientas.problemas&&d.herramientas.problemas.length)o+='Problemas: '+d.herramientas.problemas.join(', ')+'\n';
  o+='\n--- SÍNTESIS ---\n';['impresion','fortalezas','urgente','resistencias','quick_wins','cambios'].forEach(function(k){if(d.sintesis&&d.sintesis[k])o+=k+': '+d.sintesis[k]+'\n';});
  if(d.sintesis&&d.sintesis.nivel_disfuncion)o+='Nivel disfunción (1-5): '+d.sintesis.nivel_disfuncion+'\n';
  if(d.sintesis&&d.sintesis.areas_mejora&&d.sintesis.areas_mejora.length)o+='Áreas mejora: '+d.sintesis.areas_mejora.join(', ')+'\n';
  o+='\n--- ARCHIVOS ---\n'+(c.archivos||[]).map(function(f){return '- '+f.name;}).join('\n');
  return o;
}

async function generateReport(opts){
  opts = opts || {};
  var isRegenerate = !!opts.regenerateFrom;
  var reportType, customTitle, customInstructions, selectedFiles, targetPersonaId, previousReportId;

  if(isRegenerate){
    // Regenerar: usamos la configuración del informe anterior
    var prev = opts.regenerateFrom;
    reportType = prev.report_type || 'diagnostico_completo';
    customTitle = (prev.title || '').replace(/\s*\(v\d+\)\s*$/,'') + ' (regenerado ' + new Date().toLocaleDateString('es-ES') + ')';
    customInstructions = prev.custom_instructions || '';
    selectedFiles = Array.isArray(prev.files_used) ? prev.files_used : (typeof prev.files_used === 'string' ? JSON.parse(prev.files_used || '[]') : []);
    targetPersonaId = prev.target_persona_id || '';
    previousReportId = prev.id;
  } else {
    reportType = document.getElementById('reportTypeSel').value;
    customTitle = document.getElementById('reportTitle').value.trim();
    customInstructions = (document.getElementById('customInstructions').value || '').trim();
    selectedFiles = Array.from(document.querySelectorAll('.file-check:checked')).map(function(el){return el.getAttribute('data-id');});
    var personaSel = document.getElementById('targetPersonaSel');
    targetPersonaId = personaSel ? personaSel.value : '';
    previousReportId = null;

    if(reportType === 'personalizado' && !customInstructions){
      alert('Para un informe personalizado necesito que escribas las instrucciones de qué quieres que genere.');
      return;
    }
    if(reportType === 'informe_individual' && !targetPersonaId){
      alert('Para un informe individual selecciona primero la persona del equipo.');
      return;
    }
  }

  S.reportLoading=true;renderContent();
  var summary=buildSummary(S.current);
  var typeInstructions = REPORT_PROMPTS[reportType] || REPORT_PROMPTS.diagnostico_completo;

  var instructionsBlock = '';
  if(customInstructions){
    instructionsBlock = '\n\n--- INSTRUCCIONES DE LA CONSULTORA (prioritarias, respétalas estrictamente) ---\n'+customInstructions+'\n';
  }

  var personaBlock = '';
  if(reportType === 'informe_individual' && targetPersonaId){
    var persona = getPersonas().find(function(p){return p.id===targetPersonaId;});
    if(persona){
      personaBlock = '\n\n--- PERSONA OBJETIVO ---\nEste informe individual es sobre: '+persona.nombre + (persona.cargo?' ('+persona.cargo+')':'') + (persona.antiguedad?', antigüedad: '+persona.antiguedad:'') + '\nCentra TODO el análisis en esta persona concreta. Usa el resto de información del departamento solo como contexto para entenderla mejor.\n';
    }
  }

  var prompt='Eres una consultora de procesos organizacionales con amplia experiencia y mirada humanista. Basándote en los datos de campo de una consultoría real (y en los archivos adjuntos si los hay), genera un informe profesional, creativo, muy personalizado y verdaderamente útil.\n\n'+summary+personaBlock+'\n\n--- TIPO DE INFORME SOLICITADO ---\n'+typeInstructions+instructionsBlock+'\n\n--- FORMATO DE SALIDA (OBLIGATORIO E INNEGOCIABLE) ---\nDevuelve el informe en HTML puro. NUNCA uses Markdown bajo ningún concepto: ni almohadillas (#), ni asteriscos dobles (**), ni guiones para listas (-), ni triples backticks. Todo el formato se hace ÚNICAMENTE con etiquetas HTML.\n\nReglas estrictas:\n- Cada sección principal va envuelta en <div class="report-section">...</div>\n- Títulos de sección: <h2>Texto</h2>\n- Subtítulos: <h3>Texto</h3>\n- Párrafos: <p>Texto</p>\n- Listas con viñetas: <ul><li>Item</li><li>Item</li></ul>\n- Listas numeradas: <ol><li>Item</li></ol>\n- Negritas: <strong>texto</strong>\n- NO incluyas DOCTYPE, ni <html>, ni <head>, ni <body>, ni ```html, ni ```. Solo los divs con el contenido.\n- Empieza directamente con <div class="report-section"><h2>...\n\nEjemplo de inicio CORRECTO:\n<div class="report-section"><h2>Resumen ejecutivo</h2><p>El departamento presenta...</p></div>\n\nEjemplo INCORRECTO (no hagas esto NUNCA):\n# Resumen ejecutivo\n**Punto clave:** El departamento...\n\n--- TONO ---\nProfesional, directo, honesto y empático. Nada de lenguaje corporativo vacío. Sé muy específico usando los datos reales. Usa los nombres reales de las personas cuando aporte valor. El informe debe sentirse escrito para ESTA organización concreta, no genérico. Si hay archivos adjuntos, intégralos naturalmente en el análisis.';

  try {
    var data=await api('/api/generate-report',{method:'POST',body:{
      consultancyId: S.current.id,
      prompt: prompt,
      fileIds: selectedFiles,
      reportType: reportType,
      title: customTitle || null,
      customInstructions: customInstructions || null,
      targetPersonaId: targetPersonaId || null,
      previousReportId: previousReportId || null
    }});
    var content = data.report || '';
    content = ensureHtml(content);
    S.activeReport = { id: data.reportId, title: data.title, content: content, report_type: reportType, custom_instructions: customInstructions, target_persona_id: targetPersonaId, files_used: selectedFiles, created_at: new Date().toISOString() };
  } catch(e){
    S.activeReport = { title: 'Error', content: '<div class="report-section"><h2>Error</h2><p>'+e.message+'</p></div>' };
  }
  S.reportLoading=false;renderContent();
}

// Detecta si el contenido viene en Markdown y lo convierte a HTML
function ensureHtml(content){
  if(!content) return '';
  // Si ya contiene etiquetas HTML del informe, lo dejamos tal cual
  if(/<div\s+class=["']report-section/i.test(content) || /<h2[\s>]/i.test(content)) {
    return content;
  }
  // Si no, parece Markdown — lo convertimos
  var lines = content.split('\n');
  var html = '';
  var inList = false;
  var listType = '';
  var inSection = false;

  function closeList(){
    if(inList){ html += '</'+listType+'>'; inList = false; }
  }
  function closeSection(){
    if(inSection){ html += '</div>'; inSection = false; }
  }
  function openSection(){
    closeSection();
    html += '<div class="report-section">';
    inSection = true;
  }

  for(var i=0;i<lines.length;i++){
    var line = lines[i];
    // H1 con # → ignoramos (es el título global, ya está fuera)
    var m;
    if((m = line.match(/^#\s+(.+)$/))){
      closeList();
      openSection();
      html += '<h2>' + applyInline(m[1].trim()) + '</h2>';
    } else if((m = line.match(/^##\s+(.+)$/))){
      closeList();
      openSection();
      html += '<h2>' + applyInline(m[1].trim()) + '</h2>';
    } else if((m = line.match(/^###\s+(.+)$/))){
      closeList();
      if(!inSection) openSection();
      html += '<h3>' + applyInline(m[1].trim()) + '</h3>';
    } else if((m = line.match(/^####\s+(.+)$/))){
      closeList();
      if(!inSection) openSection();
      html += '<h3>' + applyInline(m[1].trim()) + '</h3>';
    } else if((m = line.match(/^[\-\*]\s+(.+)$/))){
      if(!inSection) openSection();
      if(!inList || listType !== 'ul'){ closeList(); html += '<ul>'; inList = true; listType = 'ul'; }
      html += '<li>' + applyInline(m[1].trim()) + '</li>';
    } else if((m = line.match(/^\d+\.\s+(.+)$/))){
      if(!inSection) openSection();
      if(!inList || listType !== 'ol'){ closeList(); html += '<ol>'; inList = true; listType = 'ol'; }
      html += '<li>' + applyInline(m[1].trim()) + '</li>';
    } else if(line.trim() === '' || line.trim() === '---'){
      closeList();
    } else {
      closeList();
      if(!inSection) openSection();
      html += '<p>' + applyInline(line.trim()) + '</p>';
    }
  }
  closeList();
  closeSection();
  return html || ('<div class="report-section"><p>' + content + '</p></div>');
}

// Convierte **negrita** e _itálica_ inline
function applyInline(s){
  return s
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/__([^_]+)__/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>');
}

async function loadAdminFiles(){
  try {

      return;
    }
    var html = '<div style="overflow-x:auto;"><table style="width:100%;font-size:12px;border-collapse:collapse;">'+
      '<thead><tr style="border-bottom:1px solid var(--border);"><th style="text-align:left;padding:8px 6px;font-weight:500;color:var(--text2);">Archivo</th><th style="text-align:left;padding:8px 6px;font-weight:500;color:var(--text2);">Consultoría</th><th style="text-align:left;padding:8px 6px;font-weight:500;color:var(--text2);">Tamaño</th><th style="text-align:left;padding:8px 6px;font-weight:500;color:var(--text2);">Texto</th><th style="text-align:left;padding:8px 6px;font-weight:500;color:var(--text2);">Subido</th></tr></thead><tbody>'+
      list.map(function(f){
        return '<tr style="border-bottom:1px solid var(--border);"><td style="padding:8px 6px;">'+esc(f.name)+'</td><td style="padding:8px 6px;color:var(--text2);">'+esc(f.consultancy_name||'-')+'</td><td style="padding:8px 6px;color:var(--text2);">'+formatSize(f.size)+'</td><td style="padding:8px 6px;color:'+(f.has_text?'var(--accent)':'var(--text3)')+';">'+(f.has_text?'✓':'—')+'</td><td style="padding:8px 6px;color:var(--text2);">'+formatDate(f.created_at)+'</td></tr>';

}

function formatDate(d){
  if(!d) return '-';
  var dt = new Date(d);
  return dt.toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'})+' '+dt.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
}
